<!doctype html>
<html lang="el">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>NoesisFood</title>
  <style>
    :root{
      --bg:#f4faf5; --card:#ffffff; --card2:#f7fcf8; --text:#173128; --muted:#5f7b71;
      --line:rgba(44,95,77,.12); --accent:#27b7b4; --accent2:#63c88d; --btn:#f6fbf7; --btn2:#e8f7f0;
      --shadow: 0 16px 42px rgba(31, 84, 64, .10);
      --r:18px;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial;
      background: radial-gradient(1200px 800px at 18% -10%, rgba(39,183,180,.12), transparent 58%),
                  radial-gradient(900px 700px at 82% 0%, rgba(99,200,141,.13), transparent 54%),
                  linear-gradient(180deg, #fbfefb 0%, #f1f8f3 100%),
                  var(--bg);
      color:var(--text);
    }
    .wrap{max-width: 920px; margin: 0 auto; padding: 22px 16px 60px;}
    .top{display:flex; gap:14px; align-items:center; justify-content:space-between; margin-bottom: 16px;}
    .brand{display:flex; align-items:center; gap:10px;}
    .logo{
      width:42px; height:42px; border-radius:12px;
      background: linear-gradient(145deg, rgba(123,212,255,.95), rgba(110,255,190,.75));
      box-shadow: var(--shadow);
    }
    .title{display:flex; flex-direction:column; line-height:1.05;}
    .title b{font-size:18px}
    .title span{font-size:12px; color:var(--muted)}
    .step{font-size:12px; color:var(--muted); display:flex; align-items:center; gap:10px;}
    .topRight{display:flex; align-items:center; gap:10px;}
    .langSel{
      border-radius: 10px;
      border:1px solid rgba(44,95,77,.14);
      background: rgba(255,255,255,.92);
      color: var(--text);
      padding:6px 8px;
      font-size:12px;
      font-weight:700;
    }
    .bar{width:160px; height:8px; border-radius:999px; background: rgba(39,183,180,.12); overflow:hidden;}
    .bar > i{display:block; height:100%; width:0%; background: linear-gradient(90deg, rgba(39,183,180,.96), rgba(99,200,141,.92));}

    .card{
      background: linear-gradient(180deg, rgba(255,255,255,.96), rgba(247,252,248,.96));
      border:1px solid rgba(44,95,77,.10);
      border-radius: var(--r);
      box-shadow: var(--shadow);
      overflow:hidden;
    }
    .inner{padding:18px}
    .row{display:flex; gap:14px; flex-wrap:wrap}
    .col{flex:1 1 320px}
    .section{
      background: rgba(255,255,255,.80);
      border:1px solid rgba(44,95,77,.10);
      border-radius: 16px;
      padding:14px;
      margin-top: 12px;
    }
    .sectionTitle{font-weight:800; letter-spacing:.2px; margin-bottom: 10px;}
    .mini{font-size:12px;color:var(--muted);line-height:1.3}
    .btns{display:flex; gap:10px; flex-wrap:wrap; margin-top:12px}
    button{
      cursor:pointer;
      border:1px solid rgba(44,95,77,.12);
      background: linear-gradient(180deg, rgba(255,255,255,.98), rgba(240,249,243,.98));
      color:var(--text);
      padding:10px 12px;
      border-radius: 14px;
      font-weight:700;
    }
    button:hover{border-color: rgba(39,183,180,.35)}
    button.primary{
      background: linear-gradient(180deg, rgba(39,183,180,.20), rgba(99,200,141,.18));
      border-color: rgba(39,183,180,.32);
    }
    button.ghost{background: rgba(255,255,255,.72);}
    input{
      width:100%;
      border-radius: 14px;
      border:1px solid rgba(44,95,77,.14);
      background: rgba(255,255,255,.94);
      padding:12px 12px;
      color:var(--text);
      outline:none;
      font-size:14px;
    }
    input:focus{border-color: rgba(39,183,180,.45)}
    .pillRow{display:flex; gap:8px; flex-wrap:wrap; margin-top:10px}
    .pill{
      font-size:12px;
      padding:6px 10px;
      border-radius: 999px;
      border:1px solid rgba(44,95,77,.12);
      background: rgba(245,250,247,.96);
      color: var(--text);
    }
    .pill.good{border-color: rgba(99,200,141,.34); background: rgba(99,200,141,.15)}
    .pill.warn{border-color: rgba(215,170,77,.36); background: rgba(255,236,188,.62)}
    .pill.bad{border-color: rgba(208,111,98,.34); background: rgba(255,230,224,.84)}

    .err{
      background: rgba(255,241,236,.96);
      border:1px solid rgba(208,111,98,.24);
      color: #8b3d32;
      padding:10px 12px;
      border-radius: 14px;
      font-size:13px;
      margin-top: 10px;
    }
    .ok{
      background: rgba(236,248,240,.96);
      border:1px solid rgba(99,200,141,.24);
      color: #1b5f45;
      padding:10px 12px;
      border-radius: 14px;
      font-size:13px;
      margin-top: 10px;
    }

    .prodHead{display:flex; gap:12px; align-items:center;}
    .prodImg{
      width:72px; height:72px; border-radius: 16px;
      background: rgba(243,250,245,.95);
      border:1px solid rgba(44,95,77,.10);
      object-fit: cover;
      flex:0 0 auto;
    }
    .prodMeta b{display:block; font-size:16px}
    .prodMeta span{display:block; color:var(--muted); font-size:12px; margin-top:2px}

    .scoreWrap{display:flex; align-items:center; justify-content:space-between; gap:12px}
    .score{font-size:42px; font-weight:900; letter-spacing:-.8px;}
    .scoreLine{display:flex; align-items:baseline; gap:8px;}
    .scoreMax{font-size:18px; font-weight:900; letter-spacing:-.2px; color:#6d877d;}
    .tier{
      font-size:12px; font-weight:800;
      padding:6px 10px; border-radius:999px;
      border:1px solid rgba(44,95,77,.12);
    }

    .grid2{display:grid; grid-template-columns: 1fr 1fr; gap:10px; margin-top:10px}
    .scoreSummaryCompact{
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:12px;
      padding:12px 14px;
      background: rgba(248,252,249,.95);
      border:1px solid rgba(44,95,77,.10);
      border-radius: 16px;
      margin-top:12px;
    }
    .scoreSummaryCompactMeta{
      min-width:0;
      flex:1 1 auto;
    }
    .scoreSummaryCompactMeta b{
      display:block;
      font-size:14px;
      line-height:1.35;
    }
    .scoreSummaryCompactScore{
      display:flex;
      align-items:baseline;
      gap:6px;
      margin-top:4px;
      flex-wrap:wrap;
    }
    .scoreSummaryCompactValue{
      font-size:26px;
      font-weight:900;
      letter-spacing:-.04em;
      line-height:1;
    }
    .scoreSummaryCompactAside{
      flex:0 0 auto;
      text-align:right;
      display:flex;
      flex-direction:column;
      align-items:flex-end;
      gap:8px;
    }
    .scoreSummaryCompactAside .pill{
      margin:0;
    }
    @media (max-width: 520px){
      .scoreSummaryCompact{
        flex-direction:column;
      }
      .scoreSummaryCompactAside{
        width:100%;
        align-items:flex-start;
        text-align:left;
      }
    }
    .kv{
      padding:10px 10px;
      background: rgba(248,252,249,.96);
      border:1px solid rgba(44,95,77,.09);
      border-radius: 14px;
    }
    .kv small{display:block; color:var(--muted); font-size:11px}
    .kv b{display:block; margin-top:4px; font-size:13px}

    .whyGrid{display:grid; grid-template-columns: 1fr; gap:8px;}
    .whyRow{
      padding:10px 10px;
      background: rgba(248,252,249,.96);
      border:1px solid rgba(44,95,77,.09);
      border-radius: 14px;
      display:flex;
      justify-content:space-between;
      gap:10px;
      font-size:13px;
    }
    .whyRow span{color: var(--text); font-weight:800}

    .whyFoot{margin-top:10px; font-size:12px; color:var(--muted); line-height:1.35;}

    /* Ingredients UI */
    .split{display:grid; grid-template-columns: 1.1fr .9fr; gap:12px;}
    @media (max-width: 820px){ .split{grid-template-columns: 1fr;} }

    .box{
      background: rgba(249,253,250,.96);
      border:1px solid rgba(44,95,77,.09);
      border-radius: 14px;
      padding:12px;
    }

    .eRow{
      display:flex; justify-content:space-between; gap:10px;
      padding:10px 10px;
      border-radius: 12px;
      border:1px solid rgba(44,95,77,.08);
      background: rgba(255,255,255,.92);
      margin-top:8px;
    }
    .eLeft b{display:block; font-size:13px}
    .eLeft small{display:block; font-size:11px; color:var(--muted); margin-top:3px; line-height:1.35}
    .eRole{font-size:11px; font-weight:900; opacity:.9; align-self:flex-start}

    .ingItem{
      display:flex; justify-content:space-between; gap:10px;
      padding:10px 10px;
      border-radius: 12px;
      border:1px solid rgba(44,95,77,.08);
      background: rgba(255,255,255,.94);
      margin-top:8px;
    }
    .ingLeft b{display:block; font-size:13px}
    .ingLeft small{display:block; font-size:11px; color:var(--muted); margin-top:3px}
    .risk{font-size:11px; font-weight:900; padding:6px 10px; border-radius:999px; border:1px solid rgba(255,255,255,.10);}
    .risk.low{border-color: rgba(99,200,141,.34); background: rgba(99,200,141,.12)}
    .risk.medium{border-color: rgba(215,170,77,.36); background: rgba(255,236,188,.62)}
    .risk.high{border-color: rgba(208,111,98,.34); background: rgba(255,230,224,.84)}

    .groupTitle{
      margin-top:14px;
      font-weight:900;
      font-size:12px;
      letter-spacing:.2px;
      color: var(--text);
      opacity:.92;
    }
    .step.hidden{display:none}
    .homeLayout{display:flex; flex-direction:column; gap:14px}
    .scanHero{
      padding:18px;
      background:
        linear-gradient(180deg, rgba(39,183,180,.10), rgba(255,255,255,.72)),
        rgba(246,252,248,.96);
      border:1px solid rgba(39,183,180,.16);
      border-radius: 18px;
    }
    .homeTitle{
      font-size: 28px;
      line-height: 1.05;
      font-weight: 900;
      letter-spacing: -.02em;
      margin: 0;
    }
    .homeSubtitle{
      margin-top: 8px;
      max-width: 34rem;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.4;
    }
    .homeActions{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      margin-top:16px;
    }
    .actionButton{
      min-height: 48px;
      padding: 12px 16px;
      border-radius: 14px;
    }
    .actionButton.primary{
      min-width: 210px;
    }
    .homeInputBlock{
      margin-top:16px;
      display:flex;
      flex-direction:column;
      gap:10px;
    }
    .inputLabel{
      font-size:12px;
      font-weight:800;
      color:var(--text);
    }
    .homeInputRow{
      display:grid;
      grid-template-columns: minmax(0, 1fr);
      gap:10px;
    }
    .homeInputRow input{
      min-height:50px;
      font-size:16px;
    }
    .helperText{
      font-size:12px;
      line-height:1.45;
      color:var(--muted);
    }
    .secondaryZone{
      display:grid;
      grid-template-columns: minmax(0, 1fr);
      gap:12px;
    }
    .secondarySection{
      background: rgba(251,254,252,.94);
      border:1px solid rgba(44,95,77,.08);
      border-radius: 16px;
      padding:14px;
    }
    .secondarySection .sectionTitle{
      margin-bottom:8px;
    }
    .secondarySection.full{
      grid-column: 1 / -1;
    }
    .historyStack{
      display:flex;
      flex-direction:column;
      gap:10px;
    }
    .historyEntry{
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:10px;
      padding:12px;
      border-radius:14px;
      background: rgba(247,252,248,.96);
      border:1px solid rgba(44,95,77,.08);
    }
    .historyEntryMeta{
      min-width:0;
    }
    .historyEntryMeta b,
    .historyEntryMeta small{
      display:block;
    }
    .historyEntryMeta b{
      font-size:13px;
      line-height:1.35;
    }
    .historyEntryMeta small{
      margin-top:3px;
      color:var(--muted);
      line-height:1.35;
    }
    .historyAction{
      white-space:nowrap;
      align-self:center;
    }
    details.homeHow{
      padding:0;
    }
    details.homeHow summary{
      list-style:none;
      cursor:pointer;
      font-weight:800;
    }
    details.homeHow summary::-webkit-details-marker{display:none}
    details.homeHow[open] summary{
      margin-bottom:10px;
    }
    .howBullets{
      margin:0;
      padding-left:18px;
      color:var(--muted);
      font-size:13px;
      line-height:1.45;
    }
    .scannerOverlay{
      position:fixed;
      inset:0;
      z-index:1000;
      background: rgba(35, 58, 48, .34);
      display:flex;
      align-items:flex-end;
      justify-content:center;
      padding:12px;
      backdrop-filter: blur(10px);
    }
    .scannerSheet{
      width:min(100%, 680px);
      background: linear-gradient(180deg, rgba(255,255,255,.99), rgba(245,251,247,.99));
      border:1px solid rgba(44,95,77,.12);
      border-radius: 22px;
      box-shadow: var(--shadow);
      overflow:hidden;
    }
    .scannerSheetInner{
      padding:16px;
      display:flex;
      flex-direction:column;
      gap:12px;
    }
    .scannerSheetHead{
      display:flex;
      justify-content:space-between;
      align-items:flex-start;
      gap:12px;
    }
    .scannerViewport{
      position:relative;
      min-height:280px;
      border-radius:18px;
      overflow:hidden;
      background:
        radial-gradient(circle at top, rgba(39,183,180,.12), transparent 55%),
        rgba(228,240,232,.88);
      border:1px solid rgba(44,95,77,.10);
    }
    .scannerViewport video{
      width:100%;
      height:100%;
      min-height:280px;
      object-fit:cover;
      display:block;
      background:#05080d;
    }
    .scannerFrame{
      position:absolute;
      inset:16% 10%;
      border:2px solid rgba(123,212,255,.95);
      border-radius:18px;
      box-shadow: 0 0 0 999px rgba(0,0,0,.28);
      pointer-events:none;
    }
    .scannerFrame::after{
      content:"";
      position:absolute;
      inset:10px;
      border:1px dashed rgba(255,255,255,.55);
      border-radius:12px;
    }
    .scannerStatus{
      position:absolute;
      left:12px;
      right:12px;
      bottom:12px;
      padding:10px 12px;
      border-radius:14px;
      background: rgba(255,255,255,.90);
      border:1px solid rgba(44,95,77,.12);
      font-size:13px;
      line-height:1.4;
    }
    .scannerStatus.error{
      color: #8b3d32;
      border-color: rgba(208,111,98,.24);
      background: rgba(255,241,236,.95);
    }
    .scannerStatus.success{
      color: #1b5f45;
      border-color: rgba(99,200,141,.28);
      background: rgba(236,248,240,.96);
    }
    .scannerActions{
      display:flex;
      flex-wrap:wrap;
      gap:10px;
    }
    .scannerActions button{
      flex:1 1 180px;
      min-height:46px;
    }
    @media (min-width: 720px){
      .homeInputRow{
        grid-template-columns: minmax(0, 1fr) auto;
      }
      .secondaryZone{
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }
    @media (max-width: 720px){
      .wrap{padding:16px 12px 40px;}
      .top{margin-bottom:12px;}
      .title b{font-size:17px}
      .scanHero{padding:16px}
      .homeTitle{font-size:24px}
      .scannerOverlay{padding:0}
      .scannerSheet{
        width:100%;
        border-radius:22px 22px 0 0;
      }
      .scannerSheetInner{padding:14px}
      .scannerViewport,
      .scannerViewport video{min-height:340px}
    }
  </style>
</head>

<body>
  <div class="wrap">
    <div class="top">
      <div class="brand">
        <div class="logo"></div>
        <div class="title">
          <b>NoesisFood</b>
          <span>VitaScore Hybrid - Advanced MVP</span>
        </div>
      </div>
      <div class="topRight">
        <select id="langSel" class="langSel" aria-label="Language">
          <option value="el">EL</option>
          <option value="en">EN</option>
          <option value="de">DE</option>
          <option value="fr">FR</option>
        </select>
        <div class="step">
          <span id="stepTxt">1/4</span>
          <div class="bar"><i id="barFill"></i></div>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="inner" id="app"></div>
    </div>
  </div>

    let latestAnalysisRequestId = 0;
    const supportedLangs = ["el", "en", "de", "fr"];
    const languageOptionLabels = { el: "EL", en: "EN", de: "DE", fr: "FR" };
    const RECENT_PRODUCTS_KEY = "nf_recent_products_v1";

    function pickInitialLang(){
      const saved = localStorage.getItem("nf_lang");
      if (saved && supportedLangs.includes(saved)) return saved;
      const browser = String(navigator.language || "en").toLowerCase().slice(0, 2);
      return supportedLangs.includes(browser) ? browser : "en";
    }

    function pickInitialIngredientTranslate(){
      return localStorage.getItem("nf_ing_translate") === "1";
    }

    let lang = pickInitialLang();
    state.translateIngredients = pickInitialIngredientTranslate();

    const app = document.getElementById("app");
    const stepTxt = document.getElementById("stepTxt");
    const barFill = document.getElementById("barFill");
    const langSel = document.getElementById("langSel");
    const titleMeta = document.querySelector(".title span");
    const stepEl = document.querySelector(".step");
    const scannerRuntime = {
      stream: null,
      detector: null,
      rafId: 0,
      sessionId: 0,
      attachedVideo: null,
      attachedStream: null,
      attachedSessionId: 0,
      stableCode: "",
      stableFormat: "",
      stableFrames: 0,
      instabilityScore: 0,
      unstableMode: false,
      lockedCode: "",
      lastCandidateLogKey: ""
    };

    function t(key){
      return i18n[lang]?.[key] || i18n.en[key] || key;
    }

    function updateScannerState(next, opts = {}){
      state.scanner = Object.assign({}, state.scanner || {}, next || {});
      if (opts.syncDom) _syncScannerOverlayState();
    }

    function _stopScannerLoop(){
      if (scannerRuntime.rafId){
        cancelAnimationFrame(scannerRuntime.rafId);
        scannerRuntime.rafId = 0;
      }
    }

    function _stopScannerStream(){
      if (scannerRuntime.stream){
        Array.from(scannerRuntime.stream.getTracks?.() || []).forEach(track => track.stop());
        scannerRuntime.stream = null;
      }
      if (scannerRuntime.attachedVideo){
        try{
          scannerRuntime.attachedVideo.srcObject = null;
        }catch(_e){}
      }
      scannerRuntime.attachedVideo = null;
      scannerRuntime.attachedStream = null;
      scannerRuntime.attachedSessionId = 0;
    }

    function closeScanner(opts = {}){
      scannerRuntime.sessionId += 1;
      _stopScannerLoop();
      _stopScannerStream();
      scannerRuntime.detector = null;
      scannerRuntime.stableCode = "";
      scannerRuntime.stableFormat = "";
      scannerRuntime.stableFrames = 0;
      scannerRuntime.instabilityScore = 0;
      scannerRuntime.unstableMode = false;
      scannerRuntime.lockedCode = "";
      scannerRuntime.lastCandidateLogKey = "";
      updateScannerState({
        open:false,
        opening:false,
        processing:false,
        error:"",
        success:false,
        detectedCode:"",
        candidateCode:"",
        candidateFormat:"",
        stableFrames:0,
        unstable:false
      });
      if (!opts.skipRender) render();
      if (opts.focusInput){
        requestAnimationFrame(() => {
          const input = document.getElementById("keyInput");
          if (input){
            input.focus();
            input.select?.();
          }
        });
      }
    }

    function focusManualEntry(){
      if (state.scanner?.open){
        closeScanner({ focusInput:true });
        return;
      }
      requestAnimationFrame(() => {
        const input = document.getElementById("keyInput");
        if (input){
          input.focus();
          input.select?.();
        }
      });
    }

    async function _attachScannerStream(sessionId){
      const video = document.getElementById("scannerVideo");
      if (!video || sessionId !== scannerRuntime.sessionId || !scannerRuntime.stream) return;
      if (
        scannerRuntime.attachedSessionId === sessionId
        && scannerRuntime.attachedVideo === video
        && scannerRuntime.attachedStream === scannerRuntime.stream
        && video.srcObject === scannerRuntime.stream
      ){
        if (video.paused){
          try{
            await video.play?.();
          }catch(_e){}
        }
        return;
      }
      try{
        if (video.srcObject !== scannerRuntime.stream){
          video.srcObject = scannerRuntime.stream;
        }
        scannerRuntime.attachedVideo = video;
        scannerRuntime.attachedStream = scannerRuntime.stream;
        scannerRuntime.attachedSessionId = sessionId;
        if (video.paused){
          await video.play?.();
        }
      }catch(_e){}
    }

    function _preferredScannerFormatWeight(format){
      const normalized = String(format || "").trim().toLowerCase();
      if (normalized === "ean_13") return 500;
      if (normalized === "upc_a") return 450;
      if (normalized === "ean_8") return 400;
      if (normalized === "upc_e") return 350;
      if (normalized === "code_128") return 200;
      return 0;
    }

    function _normalizeScannerCandidate(detection){
      const rawValue = normalizeLookupKey(detection?.rawValue || "");
      const format = String(detection?.format || "").trim().toLowerCase();
      if (!rawValue || !/^\d+$/.test(rawValue)) return null;
      if (![8, 12, 13, 14].includes(rawValue.length)) return null;
      return {
        rawValue: String(detection?.rawValue || ""),
        normalized: rawValue,
        format,
        formatWeight: _preferredScannerFormatWeight(format)
      };
    }

    function _selectScannerCandidate(detections){
      const rawDetections = Array.from(detections || []).map(item => ({
        rawValue: String(item?.rawValue || ""),
        format: String(item?.format || "").trim().toLowerCase()
      }));
      const candidates = Array.from(detections || [])
        .map(_normalizeScannerCandidate)
        .filter(Boolean)
        .sort((left, right) => {
          if ((right?.formatWeight || 0) !== (left?.formatWeight || 0)) return (right?.formatWeight || 0) - (left?.formatWeight || 0);
          return String(right?.normalized || "").length - String(left?.normalized || "").length;
        });
      return {
        rawDetections,
        selected: candidates[0] || null,
        candidates
      };
    }

    function _logScannerCandidate(eventName, payload){
      try{
        console.info(`[scanner-${eventName}]`, payload);
      }catch(_e){}
    }

    function _scannerStatusClass(){
      if (state.scanner?.error) return "scannerStatus error";
      if (state.scanner?.success) return "scannerStatus success";
      return "scannerStatus";
    }

    function _scannerStatusText(){
      if (state.scanner?.error) return state.scanner.error;
      if (state.scanner?.processing) return scanLoadingHint(false);
      if (state.scanner?.success) return `${t("scanner_success")} ${state.scanner?.detectedCode || ""}`.trim();
      if (state.scanner?.candidateCode) return `${t("scanner_confirming")} ${state.scanner.candidateCode}`.trim();
      if (state.scanner?.opening) return t("scanner_loading");
      return t("scanner_helper");
    }

    function _scannerGuidanceText(){
      if (state.scanner?.unstable) return t("scanner_unstable_guidance");
      return t("scanner_helper");
    }

    function _scannerRequiredStableFrames(){
      return scannerRuntime.unstableMode ? 5 : 3;
    }

    function _scannerNeedsRender(next){
      const prev = state.scanner || {};
      return prev.open !== next.open
        || prev.opening !== next.opening
        || prev.processing !== next.processing
        || prev.error !== next.error
        || prev.success !== next.success
        || prev.detectedCode !== next.detectedCode
        || prev.candidateCode !== next.candidateCode
        || prev.candidateFormat !== next.candidateFormat
        || prev.unstable !== next.unstable;
    }

    function _syncScannerOverlayState(){
      const guidance = document.getElementById("scannerGuidanceText");
      if (guidance) guidance.textContent = _scannerGuidanceText();
      const status = document.getElementById("scannerStatusText");
      if (status){
        status.textContent = _scannerStatusText();
        status.className = _scannerStatusClass();
      }
    }

    async function _scanFrameLoop(sessionId){
      if (sessionId !== scannerRuntime.sessionId || !state.scanner?.open || !scannerRuntime.detector) return;
      if (scannerRuntime.lockedCode) return;
      const video = document.getElementById("scannerVideo");
      if (video && video.readyState >= 2){
        try{
          const detections = await scannerRuntime.detector.detect(video);
          const selection = _selectScannerCandidate(detections);
          const selected = selection.selected;
          const distinctCandidateCount = new Set(selection.candidates.map(item => item.normalized)).size;
          if (selected){
            const switchedCandidate = Boolean(scannerRuntime.stableCode) && scannerRuntime.stableCode !== selected.normalized;
            const multiCandidateFrame = distinctCandidateCount > 1;
            if (switchedCandidate || multiCandidateFrame){
              scannerRuntime.instabilityScore = Math.min(scannerRuntime.instabilityScore + 1, 6);
            } else if (scannerRuntime.instabilityScore > 0){
              scannerRuntime.instabilityScore -= 1;
            }
            scannerRuntime.unstableMode = scannerRuntime.instabilityScore >= 2;
            const requiredStableFrames = _scannerRequiredStableFrames();
            const logKey = `${selected.normalized}::${selected.format}`;
            if (scannerRuntime.lastCandidateLogKey !== logKey){
              scannerRuntime.lastCandidateLogKey = logKey;
              _logScannerCandidate("candidate", {
                raw_candidates: selection.rawDetections.map(item => ({
                  raw_value: item.rawValue,
                  format: item.format,
                  confidence: null
                })),
                normalized_candidates: selection.candidates.map(item => ({
                  raw_value: item.rawValue,
                  normalized: item.normalized,
                  format: item.format,
                  confidence: null
                })),
                selected_candidate: selected.rawValue,
                selected_format: selected.format,
                normalized_barcode: selected.normalized,
                distinct_candidate_count: distinctCandidateCount,
                unstable_mode: scannerRuntime.unstableMode,
                stability_threshold: requiredStableFrames
              });
            }
            if (scannerRuntime.stableCode === selected.normalized){
              scannerRuntime.stableFrames += 1;
            } else {
              scannerRuntime.stableCode = selected.normalized;
              scannerRuntime.stableFormat = selected.format;
              scannerRuntime.stableFrames = 1;
            }
            const nextScannerState = {
              success:false,
              error:"",
              opening:false,
              processing:false,
              detectedCode:"",
              candidateCode: scannerRuntime.stableCode,
              candidateFormat: scannerRuntime.stableFormat,
              stableFrames: scannerRuntime.stableFrames,
              unstable: scannerRuntime.unstableMode
            };
            const shouldRender = _scannerNeedsRender(Object.assign({}, state.scanner || {}, nextScannerState));
            updateScannerState(nextScannerState);
            if (scannerRuntime.stableFrames >= requiredStableFrames){
              const lookupBarcode = scannerRuntime.stableCode;
              scannerRuntime.lockedCode = lookupBarcode;
              updateScannerState({
                success:true,
                error:"",
                opening:false,
                processing:true,
                detectedCode:lookupBarcode,
                candidateCode:lookupBarcode,
                candidateFormat:scannerRuntime.stableFormat,
                stableFrames:scannerRuntime.stableFrames,
                unstable:scannerRuntime.unstableMode
              }, { syncDom:true });
              state.key = lookupBarcode;
              _logScannerCandidate("lock", {
                selected_candidate: selected.rawValue,
                selected_format: selected.format,
                normalized_barcode: selected.normalized,
                final_lookup_barcode: lookupBarcode,
                stable_frames: scannerRuntime.stableFrames,
                stability_threshold: requiredStableFrames,
                unstable_mode: scannerRuntime.unstableMode,
                confidence: null
              });
              _stopScannerLoop();
              try{
                video.pause?.();
              }catch(_e){}
              window.setTimeout(() => {
                if (sessionId !== scannerRuntime.sessionId) return;
                closeScanner({ skipRender:true });
                doScan(lookupBarcode);
              }, 120);
              return;
            }
            if (shouldRender) updateScannerState(nextScannerState, { syncDom:true });
          } else if (scannerRuntime.stableFrames || state.scanner?.candidateCode){
            scannerRuntime.stableCode = "";
            scannerRuntime.stableFormat = "";
            scannerRuntime.stableFrames = 0;
            if (scannerRuntime.instabilityScore > 0) scannerRuntime.instabilityScore -= 1;
            scannerRuntime.unstableMode = scannerRuntime.instabilityScore >= 2;
            const nextScannerState = {
              success:false,
              error:"",
              opening:false,
              processing:false,
              detectedCode:"",
              candidateCode:"",
              candidateFormat:"",
              stableFrames:0,
              unstable:scannerRuntime.unstableMode
            };
            const shouldRender = _scannerNeedsRender(Object.assign({}, state.scanner || {}, nextScannerState));
            updateScannerState(nextScannerState);
            if (shouldRender) updateScannerState(nextScannerState, { syncDom:true });
          }
        }catch(_e){}
      }
      scannerRuntime.rafId = requestAnimationFrame(() => _scanFrameLoop(sessionId));
    }

    async function openScanner(){
      if (state.scanner?.open && (state.scanner?.opening || scannerRuntime.stream)) return;
      closeScanner({ skipRender:true });
      updateScannerState({ open:true, opening:true, processing:false, error:"", success:false, detectedCode:"", candidateCode:"", candidateFormat:"", stableFrames:0, unstable:false });
      render();
      const sessionId = scannerRuntime.sessionId;
      if (!navigator.mediaDevices?.getUserMedia || typeof window.BarcodeDetector === "undefined"){
        updateScannerState({ opening:false, processing:false, error:t("scanner_permission_error") });
        render();
        return;
      }
      try{
        const supportedFormats = typeof window.BarcodeDetector.getSupportedFormats === "function"
          ? await window.BarcodeDetector.getSupportedFormats()
          : [];
        const preferredFormats = ["ean_13", "ean_8", "upc_a", "upc_e", "code_128"];
        const usableFormats = preferredFormats.filter(format => supportedFormats.includes(format));
        scannerRuntime.detector = usableFormats.length
          ? new window.BarcodeDetector({ formats: usableFormats })
          : new window.BarcodeDetector();
        scannerRuntime.stream = await navigator.mediaDevices.getUserMedia({
          audio:false,
          video:{
            facingMode:{ ideal:"environment" },
            width:{ ideal:1280 },
            height:{ ideal:720 }
          }
        });
        if (sessionId !== scannerRuntime.sessionId || !state.scanner?.open){
          closeScanner({ skipRender:true });
          return;
        }
        updateScannerState({ opening:false, processing:false, error:"", success:false }, { syncDom:true });
        await _attachScannerStream(sessionId);
        _stopScannerLoop();
        _scanFrameLoop(sessionId);
      }catch(_e){
        _stopScannerStream();
        scannerRuntime.detector = null;
        if (sessionId !== scannerRuntime.sessionId) return;
        updateScannerState({ opening:false, processing:false, error:t("scanner_permission_error"), success:false });
        render();
      }
    }

    function scanLoadingTitle(){
      if (lang === "el") return "\u0391\u03bd\u03b1\u03bb\u03cd\u03b5\u03c4\u03b1\u03b9 \u03c4\u03bf \u03c0\u03c1\u03bf\u03ca\u03cc\u03bd...";
      if (lang === "de") return "Produkt wird analysiert...";
      if (lang === "fr") return "Analyse du produit...";
      return "Analyzing product...";
    }

    function scanLoadingHint(delayed = false){
      if (delayed){
        if (lang === "el") return "\u03a4\u03b1 \u03c3\u03c4\u03bf\u03b9\u03c7\u03b5\u03af\u03b1 \u03c4\u03bf\u03c5 \u03c0\u03c1\u03bf\u03ca\u03cc\u03bd\u03c4\u03bf\u03c2 \u03b1\u03ba\u03cc\u03bc\u03b7 \u03bf\u03c1\u03b9\u03c3\u03c4\u03b9\u03ba\u03bf\u03c0\u03bf\u03b9\u03bf\u03cd\u03bd\u03c4\u03b1\u03b9. \u0394\u03bf\u03ba\u03af\u03bc\u03b1\u03c3\u03b5 \u03be\u03b1\u03bd\u03ac \u03c3\u03b5 \u03bb\u03af\u03b3\u03bf.";
        if (lang === "de") return "Die Produktdaten werden noch finalisiert. Bitte in einem Moment erneut versuchen.";
        if (lang === "fr") return "Les donn\u00e9es du produit sont encore en cours de finalisation. R\u00e9essayez dans un instant.";
        return "The product data is still being finalized. Please try again in a moment.";
      }
      if (lang === "el") return "\u0393\u03af\u03bd\u03b5\u03c4\u03b1\u03b9 \u03b1\u03bd\u03ac\u03ba\u03c4\u03b7\u03c3\u03b7 \u03ba\u03b1\u03b9 \u03ba\u03b1\u03bd\u03bf\u03bd\u03b9\u03ba\u03bf\u03c0\u03bf\u03af\u03b7\u03c3\u03b7 \u03c3\u03c4\u03bf\u03b9\u03c7\u03b5\u03af\u03c9\u03bd...";
      if (lang === "de") return "Produktdaten werden abgerufen und normalisiert...";
      if (lang === "fr") return "R\u00e9cup\u00e9ration et normalisation des donn\u00e9es produit...";
      return "Retrieving and normalizing product data...";
    }

    function beginAnalysisRequest(){
      latestAnalysisRequestId += 1;
      return latestAnalysisRequestId;
    }

    function isCurrentAnalysisRequest(requestId){
      return Number(requestId) === Number(latestAnalysisRequestId);
    }

    function normalizeLookupKey(value){
      return String(value || "").trim().replace(/\s+/g, "");
    }

    function hasRenderableProductIdentity(data){
      const product = data?.product || {};
      const name = String(product?.name || "").trim();
      const unknowns = [
        String(i18n.en?.unknown_product || "Unknown Product").trim().toLowerCase(),
        String(i18n.el?.unknown_product || "").trim().toLowerCase(),
        String(i18n.de?.unknown_product || "").trim().toLowerCase(),
        String(i18n.fr?.unknown_product || "").trim().toLowerCase()
      ].filter(Boolean);
      if (name && !unknowns.includes(name.toLowerCase())) return true;
      if (String(product?.brand || "").trim()) return true;
      if (String(product?.image_url || "").trim()) return true;
      return false;
    }

    function hasRenderableNutrition(data){
      const nutrition = data?.nutrition_per_100 || {};
      return ["sugar_g", "salt_g", "sat_fat_g", "protein_g", "energy_kcal"].some(key => Number.isFinite(Number(nutrition?.[key])));
    }

    function getScanResolutionState(data){
      const explicit = String(data?.scan_resolution_state || data?.meta?.scan_resolution_state || "").trim().toLowerCase();
      if (explicit) return explicit;
      const lookupState = String(data?.lookup_state || data?.meta?.lookup_state || "").toLowerCase();
      const analysisState = String(data?.analysis_state || data?.meta?.analysis_state || "").toLowerCase();
      const hasIdentity = hasRenderableProductIdentity(data);
      const hasNutrition = hasRenderableNutrition(data);
      const hasStableResult = lookupState === "found_and_analyzable" || analysisState === "full_analysis" || analysisState === "partial_analysis";
      if (hasIdentity && (hasNutrition || hasStableResult) && analysisState !== "insufficient_data") return "final_resolved_product";
      if (analysisState === "limited_estimate" && !hasIdentity && !hasNutrition) return "fallback_estimate_only";
      if (lookupState === "found_but_incomplete" || lookupState === "not_found" || analysisState === "insufficient_data" || !hasIdentity) return "unresolved_scan";
      return "fallback_estimate_only";
    }

    function isFinalResolvedProductData(data){
      return getScanResolutionState(data) === "final_resolved_product";
    }

    function isPlaceholderScanResult(data){
      if (!data || typeof data !== "object") return false;
      const lookupState = String(data?.lookup_state || data?.meta?.lookup_state || "").toLowerCase();
      const source = String(data?.source || "").toLowerCase();
      if (lookupState !== "found_but_incomplete") return false;
      if (source !== "openfoodfacts") return false;
      if (hasRenderableProductIdentity(data)) return false;
      const nutrition = data?.nutrition_per_100 || {};
      const hasNutrition = ["sugar_g", "salt_g", "sat_fat_g", "protein_g", "energy_kcal"].some(key => nutrition?.[key] !== null && nutrition?.[key] !== undefined);
      const hasIngredients = Array.isArray(data?.ingredients) && data.ingredients.length > 0;
      return !hasNutrition && !hasIngredients;
    }

    function wait(ms){
      return new Promise(resolve => setTimeout(resolve, ms));
    }

    async function fetchStableScanResult(key, requestId){
      const delays = [0, 350, 700];
      let lastRes = null;
      let lastData = null;
      for (let attempt = 0; attempt < delays.length; attempt += 1){
        if (attempt > 0){
          state.scanStatusMessage = scanLoadingHint(false);
          render();
          await wait(delays[attempt]);
        }
        const res = await fetch(`/scan/${encodeURIComponent(key)}?lang=${lang}`);
        const data = await res.json().catch(()=> ({}));
        if (!isCurrentAnalysisRequest(requestId) || state.key !== key) return { stale: true };
        lastRes = res;
        lastData = data;
        if (!res.ok || data?.error || !isPlaceholderScanResult(data)) break;
      }
      return { res: lastRes, data: lastData };
    }

    function logScanPerformance(data, startedAt){
      const totalMs = Math.round(performance.now() - Number(startedAt || performance.now()));
      const perfMeta = data?.meta?.performance || {};
      const summary = {
        barcode: state.key,
        total_frontend_ms: totalMs,
        route_total_ms: Number(perfMeta?.route_total_ms || 0),
        scan_total_ms: Number(perfMeta?.total_ms || 0),
        local_data_load_ms: Number(perfMeta?.local_data_load_ms || 0),
        openfoodfacts_fetch_ms: Number(perfMeta?.openfoodfacts_fetch_ms || 0),
        normalize_ms: Number(perfMeta?.normalize_ms || 0),
        analysis_ms: Number(perfMeta?.analysis_ms || 0),
        cache_hit: !!perfMeta?.cache_hit,
        lookup_source: String(perfMeta?.lookup_source || ""),
      };
      try{
        console.info("[scan-perf]", summary);
      }catch(_e){}
    }

    function isSupportedLookupKey(value){
      const key = normalizeLookupKey(value);
      if (!key) return false;
      if (/^\d+$/.test(key)) return [8, 12, 13, 14].includes(key.length);
      return /^[A-Za-z0-9][A-Za-z0-9._-]{1,63}$/.test(key);
    }

    function localizeScanError(data, status){
      const code = String(data?.error_code || "").toUpperCase();
      const rawError = String(data?.error || "").trim();
      const lookupState = String(data?.lookup_state || data?.meta?.lookup_state || "").toLowerCase();
      const analysisState = String(data?.analysis_state || data?.meta?.analysis_state || "").toLowerCase();
      if (code === "INVALID_BARCODE" || status === 400) return t("err_invalid_barcode");
      if (code === "PRODUCT_NOT_FOUND" || status === 404) return t("err_not_found");
      if (code === "PHOTO_PARSING_FAILED") return t("err_photo_parse");
      if (code === "PHOTO_EXTRACTION_UNAVAILABLE") return localizedPhotoUnavailableMessage();
      if (code === "PHOTO_EXTRACTION_FAILED") return t("err_photo_extract");
      if (code === "MISSING_KEY_DATA" && lookupState === "found_but_incomplete" && analysisState === "insufficient_data") return t("err_found_incomplete");
      if (code === "MISSING_KEY_DATA") return t("err_missing_data");
      if (lookupState === "found_but_incomplete" && analysisState === "insufficient_data") return t("err_found_incomplete");
      if (code === "ANALYSIS_UNAVAILABLE" || status === 422 || status === 502) return t("err_unanalyzable");
      if (/internal server error/i.test(rawError)) return t("err_unanalyzable");
      if (/product not found/i.test(rawError)) return t("err_not_found");
      if (/missing product id|invalid barcode|empty barcode/i.test(rawError)) return t("err_invalid_barcode");
      return rawError || t("err_unanalyzable");
    }

    function scanErrorCode(data, status){
      const code = String(data?.error_code || "").toUpperCase();
      const lookupState = String(data?.lookup_state || data?.meta?.lookup_state || "").toLowerCase();
      const analysisState = String(data?.analysis_state || data?.meta?.analysis_state || "").toLowerCase();
      if (code) return code;
      if (lookupState === "found_but_incomplete" && analysisState === "insufficient_data") return "MISSING_KEY_DATA";
      if (status === 400) return "INVALID_BARCODE";
      if (status === 404) return "PRODUCT_NOT_FOUND";
      if (status === 422) return "ANALYSIS_UNAVAILABLE";
      if (status === 502) return "ANALYSIS_UNAVAILABLE";
      return "";
    }

    function isRecoverableScanFailure(code){
      return ["PRODUCT_NOT_FOUND", "MISSING_KEY_DATA", "ANALYSIS_UNAVAILABLE"].includes(String(code || "").toUpperCase());
    }

    function renderRecoveryBlock(){
      if (!isRecoverableScanFailure(state.errorCode)) return "";
      const recoveryLead = state.errorCode === "PRODUCT_NOT_FOUND"
        ? t("fallback_not_found")
        : (state.errorCode === "MISSING_KEY_DATA" ? t("fallback_incomplete") : t("fallback_alt"));
      return `
        <div class="section" style="margin-top:12px;">
          <div class="sectionTitle">${t("fallback_title")}</div>
          <div class="mini">${recoveryLead}</div>
          <div class="mini" style="margin-top:6px;">${t("fallback_continue")}</div>
          ${state.recoveryPhotoMessage ? `<div class="ok">${_escapeHtml(state.recoveryPhotoMessage)}</div>` : ``}
          <div class="btns">
            <button class="ghost" id="ingredientPhotoBtn">${t("fallback_ingredient_photo")}</button>
            <button class="ghost" id="nutritionPhotoBtn">${t("fallback_nutrition_photo")}</button>
            <button class="primary" id="manualEntryBtn">${t("fallback_manual_entry")}</button>
          </div>
          <div class="mini" style="margin-top:8px;">${t("photo_capture_hint")}</div>
          <div class="btns" style="margin-top:8px;">
            <button class="ghost" id="ingredientGalleryBtn">${t("photo_choose_gallery_ingredients")}</button>
            <button class="ghost" id="nutritionGalleryBtn">${t("photo_choose_gallery_nutrition")}</button>
          </div>
          ${renderPhotoCapturePreview()}
          ${state.recoveryOpen ? renderManualEntryForm() : ``}
          ${renderPhotoCaptureInputs()}
        </div>
      `;
    }

    function renderUnresolvedScanBlock(data){
      if (!data || typeof data !== "object" || isFinalResolvedProductData(data)) return "";
      const resolutionState = getScanResolutionState(data);
      const title = resolutionState === "fallback_estimate_only"
        ? t("scan_state_fallback_title")
        : (resolutionState === "loading_processing" ? t("scan_state_processing_title") : t("scan_state_unresolved_title"));
      const body = resolutionState === "fallback_estimate_only"
        ? t("scan_state_fallback_body")
        : (resolutionState === "loading_processing" ? t("scan_state_processing_body") : t("scan_state_unresolved_body"));
      const actions = resolutionState === "loading_processing" ? "" : `
        <div class="mini" style="margin-top:10px;">${t("scan_state_next_actions")}</div>
        ${state.recoveryPhotoMessage ? `<div class="ok">${_escapeHtml(state.recoveryPhotoMessage)}</div>` : ``}
        <div class="btns" style="margin-top:8px;">
          <button class="ghost" id="ingredientPhotoBtn">${t("fallback_ingredient_photo")}</button>
          <button class="ghost" id="nutritionPhotoBtn">${t("fallback_nutrition_photo")}</button>
          <button class="primary" id="manualEntryBtn">${t("fallback_manual_entry")}</button>
        </div>

    function renderEnrichmentBlock(data){
      const analysisState = String(data?.analysis_state || data?.meta?.analysis_state || "").toLowerCase();
      const lookupState = String(data?.lookup_state || data?.meta?.lookup_state || "").toLowerCase();
      if (analysisState === "full_analysis" && lookupState !== "found_but_incomplete") return "";
      const lookupMissing = Array.isArray(data?.lookup_missing_fields)
        ? data.lookup_missing_fields
        : (Array.isArray(data?.meta?.lookup_missing_fields) ? data.meta.lookup_missing_fields : []);
      const missingCoreFields = Array.isArray(data?.data_quality?.missing_core_fields) ? data.data_quality.missing_core_fields : [];
      const photoMeta = data?.photo_extraction || data?.meta?.photo_extraction || {};
      const needsNutrition = missingCoreFields.length > 0 || lookupMissing.includes("nutriments") || lookupMissing.includes("serving_size");
      const needsIngredients = lookupMissing.includes("ingredients") || lookupMissing.includes("additives") || !Array.isArray(data?.ingredients) || !data.ingredients.length;
      const usedNutritionPhoto = Boolean(photoMeta?.used_nutrition_photo) || Boolean(state.photoForm?.nutrition_image_data_url);
      const usedIngredientPhoto = Boolean(photoMeta?.used_ingredient_photo) || Boolean(state.photoForm?.ingredient_image_data_url);
      const missingLabels = summarizedMissingFields(data);
      const reasonItems = [];
      if (!missingLabels.length){
        if (needsNutrition) reasonItems.push(t("enrich_reason_nutrition"));
        if (needsIngredients) reasonItems.push(t("enrich_reason_ingredients"));
        if (lookupMissing.includes("serving_size")) reasonItems.push(t("enrich_reason_serving"));
      }
      const nextStep = needsNutrition && !usedNutritionPhoto
        ? "nutrition"
        : (needsIngredients && !usedIngredientPhoto ? "ingredients" : "refresh");

      const ingredientBtnClass = nextStep === "ingredients" ? "primary" : "ghost";

          <div class="mini" style="margin-top:6px;">${t("enrich_saved_future")}</div>
          ${missingLabels.length ? `<div class="ok" style="margin-top:10px;"><b>${t("missing_now")}:</b> ${_escapeHtml(missingLabels.join(", "))}</div>` : ``}
          ${!missingLabels.length && reasonItems.length ? `<div class="ok" style="margin-top:10px;"><b>${t("missing_now")}:</b><br/>${reasonItems.map(item => `- ${_escapeHtml(item)}`).join("<br/>")}</div>` : ``}
          <div class="mini" style="margin-top:10px;"><b>${t("enrich_next_step")}:</b> ${nextStep === "nutrition" ? t("enrich_step_nutrition") : (nextStep === "ingredients" ? t("enrich_step_ingredients") : t("enrich_step_refresh"))}</div>

          <div class="mini">2. ${t("enrich_step_ingredients")}</div>
          <div class="mini">3. ${t("enrich_step_refresh")}</div>
          <div class="mini">4. ${t("enrich_step_result")}</div>
          ${state.recoveryPhotoMessage ? `<div class="ok">${_escapeHtml(state.recoveryPhotoMessage)}</div>` : ``}
          <div class="btns" style="margin-top:8px;">
            <button class="${nutritionBtnClass}" id="nutritionPhotoBtn">${t("enrich_scan_nutrition")}</button>
            <button class="${ingredientBtnClass}" id="ingredientPhotoBtn">${t("enrich_scan_ingredients")}</button>
            <button class="ghost" id="manualEntryBtn">${t("enrich_manual_entry")}</button>
          </div>
          <div class="mini" style="margin-top:8px;">${t("photo_capture_hint")}</div>
          <div class="btns" style="margin-top:8px;">
            <button class="ghost" id="nutritionGalleryBtn">${t("photo_choose_gallery_nutrition")}</button>
            <button class="ghost" id="ingredientGalleryBtn">${t("photo_choose_gallery_ingredients")}</button>
          </div>
          ${renderPhotoCapturePreview()}
          ${state.recoveryOpen ? renderManualEntryForm() : ``}
          ${renderPhotoCaptureInputs()}
        </div>
      `;
    }

          <div class="sectionTitle">${title}</div>
          <div class="mini">${t("photo_preview_note")}</div>
          <div class="mini" style="margin-top:6px;">${_escapeHtml(pending.fileName || "")}</div>

              <div id="photoCropHandle" style="position:absolute; right:-1px; bottom:-1px; width:22px; height:22px; border-radius:50%; background:#fff; border:2px solid rgba(0,0,0,.25); cursor:nwse-resize; touch-action:none;"></div>

    function renderPhotoCaptureInputs(){
      return `

        <input id="ingredientGalleryInput" type="file" accept="image/*" style="display:none;" />

        <input id="nutritionGalleryInput" type="file" accept="image/*" style="display:none;" />
      `;

    function renderPartialLookupNotice(data){
      const lookupState = String(data?.lookup_state || data?.meta?.lookup_state || "").toLowerCase();
      if (lookupState !== "found_but_incomplete") return "";
      const missingLabels = summarizedMissingFields(data);
      return `
        <div class="ok" style="margin-top:12px;">
          <b>${t("partial_notice_title")}</b><br/>${t("partial_notice_body")}
          ${missingLabels.length ? `<br/><span class="mini">${t("missing_now")}: ${_escapeHtml(missingLabels.join(", "))}</span>` : ``}

      `;

    function localizedAnalysisState(value){
      const key = String(value || "").toLowerCase();
      if (key === "full_analysis") return t("full_analysis");
      if (key === "partial_analysis") return t("partial_analysis");
      if (key === "limited_estimate") return t("limited_estimate_state");
      if (key === "insufficient_data") return t("insufficient_data");
      return value || "-";
    }

    function localizedConfidenceTier(value){
      const key = String(value || "").toLowerCase();
      if (key === "high") return t("confidence_high");
      if (key === "medium") return t("confidence_medium");
      if (key === "low") return t("confidence_low");
      return value || "-";
    }

    function localizedConfidenceBadgeLabel(value){
      const key = String(value || "").toLowerCase();
      if (key === "high") return t("confidence_badge_high");
      if (key === "medium") return t("confidence_badge_medium");
      if (key === "low") return t("confidence_badge_low");
      return value || "-";
    }

    function localizedPhotoUnavailableMessage(){
      if (lang === "el") return "Η εξαγωγή στοιχείων από φωτογραφία δεν είναι προσωρινά διαθέσιμη αυτή τη στιγμή. Δοκίμασε ξανά αργότερα, συνέχισε με χειροκίνητη εισαγωγή ή χρησιμοποίησε φωτογραφία συστατικών αν αυτό βοηθά.";
      if (lang === "de") return "Die Fotoextraktion ist derzeit vorübergehend nicht verfügbar. Versuche es später erneut, fahre mit der manuellen Eingabe fort oder nutze ein Zutatenfoto, falls das hilfreich ist.";
      if (lang === "fr") return "L’extraction à partir d’une photo est temporairement indisponible pour le moment. Réessayez plus tard, poursuivez avec la saisie manuelle ou utilisez une photo des ingrédients si cela peut aider.";
      return "Photo extraction is temporarily unavailable right now. Try again later, continue with manual entry, or use an ingredient photo if that would help.";
    }

    function resolvedAnalysisConfidenceKey(data){
      const analysisState = String(data?.analysis_state || data?.meta?.analysis_state || "").toLowerCase();
      const explicit = String(data?.analysis_confidence || data?.meta?.analysis_confidence || "").toLowerCase();
      const missingCoreFields = Array.isArray(data?.data_quality?.missing_core_fields) ? data.data_quality.missing_core_fields : [];
      const dqConfidence = Number(data?.data_quality?.confidence);
      if (analysisState === "limited_estimate") return "low";
      if (missingCoreFields.length >= 3) return "low";
      if (explicit === "high" && missingCoreFields.length >= 2) return "medium";
      if (Number.isFinite(dqConfidence)){
        if (dqConfidence >= 0.75) return explicit || "high";
        if (dqConfidence >= 0.45) return explicit === "high" ? "medium" : (explicit || "medium");
        return "low";
      }
      return explicit || "low";
    }

    function localizedMissingFieldLabel(value){
      const key = String(value || "").toLowerCase();
      if (key === "sugar_g" || key === "sugar") return t("sugar");
      if (key === "salt_g" || key === "salt") return t("salt");
      if (key === "saturated_fat_g" || key === "sat_fat_g" || key === "saturated-fat") return t("sat_fat");
      if (key === "protein_g" || key === "protein") return t("protein");
      if (key === "ingredients") return t("missing_ingredients");
      if (key === "additives") return t("missing_additives");
      if (key === "serving_size") return t("missing_serving_size");
      if (key === "nutriments") return t("missing_nutriments");
      return "";
    }

    function summarizedMissingFields(data){
      const lookupMissing = Array.isArray(data?.lookup_missing_fields)
        ? data.lookup_missing_fields
        : (Array.isArray(data?.meta?.lookup_missing_fields) ? data.meta.lookup_missing_fields : []);
      const missingCoreFields = Array.isArray(data?.data_quality?.missing_core_fields) ? data.data_quality.missing_core_fields : [];
      const mapped = [...missingCoreFields, ...lookupMissing]
        .map(localizedMissingFieldLabel)
        .filter(Boolean);
      return Array.from(new Set(mapped));
    }

    function fallbackConfidenceReasonItems(data){
      const items = [];
      const push = (message) => {
        const text = String(message || "").trim();
        if (!text) return;
        if (items.includes(text)) return;
        items.push(text);
      };
      const analysisState = String(data?.analysis_state || data?.meta?.analysis_state || "").toLowerCase();
      if (analysisState === "partial_analysis") push(t("partial_assessment_note"));
      if (analysisState === "limited_estimate") push(t("limited_estimate_note"));
      const missing = summarizedMissingFields(data);
      if (missing.length) push(`${t("missing_fields")}: ${missing.join(", ")}`);
      const photoMeta = data?.photo_extraction || data?.meta?.photo_extraction || null;
      if (photoMeta?.confidence) push(`${t("photo_source_note")} (${localizedConfidenceTier(photoMeta.confidence)})`);
      return items.slice(0, 4);
    }

    function renderConfidenceSummary(data){
      const confidenceKey = resolvedAnalysisConfidenceKey(data);
      const badgeLabel = localizedConfidenceBadgeLabel(confidenceKey);
      const badgeClass = confidenceKey === "high" ? "good" : "warn";
      const backendReasons = Array.isArray(data?.confidence_reasons) ? data.confidence_reasons : [];
      const reasons = backendReasons.length ? backendReasons : fallbackConfidenceReasonItems(data);
      return `
        <div style="margin-top:10px;">
          <span class="pill ${badgeClass}">${_escapeHtml(badgeLabel)}</span>
          ${reasons.length ? `<div class="whyFoot" style="margin-top:10px;"><b>${t("confidence_reasons_title")}</b><br/>${reasons.map(item => `- ${_escapeHtml(item)}`).join("<br/>")}</div>` : ``}
        </div>
      `;
    }

    function localizedAllergenSourceLabel(value){
      const key = String(value || "").toLowerCase();
      if (key === "barcode_product_data") return t("allergen_source_barcode_product_data");
      if (key === "ingredient_text") return t("allergen_source_ingredient_text");
      if (key === "ocr_ingredient_photo") return t("allergen_source_ocr_ingredient_photo");
      if (key === "manual_input") return t("allergen_source_manual_input");
      return value || "-";
    }

    function renderAllergenCard(data){
      const allergen = data?.allergen_detection || data?.meta?.allergen_detection || null;
      if (!allergen || typeof allergen !== "object") return "";
      const detected = Array.isArray(allergen?.detected) ? allergen.detected : [];
      const possible = Array.isArray(allergen?.possible_signals) ? allergen.possible_signals : [];
      const coverageKey = String(allergen?.coverage || "").toLowerCase();
      const coverageLabel = localizedConfidenceBadgeLabel(coverageKey) || localizedConfidenceTier(coverageKey);
      const coverageClass = coverageKey === "high" ? "good" : "warn";
      const sourcesChecked = Array.isArray(allergen?.sources_checked) ? allergen.sources_checked : [];
      const coverageNote = String(allergen?.coverage_note || t("allergen_intro")).trim() || t("allergen_intro");
      const warning = String(allergen?.warning || t("allergen_warning_fallback")).trim() || t("allergen_warning_fallback");
      const showNeutralNone = !detected.length && !possible.length && coverageKey !== "low";

      const renderItems = (items) => items.map(item => `
        <div class="eRow">
          <div class="eLeft">
            <b>${_escapeHtml(String(item?.label || "-"))}</b>
            <small>${_escapeHtml(localizedAllergenSourceLabel(item?.source || ""))}</small>
          </div>
          <div class="eRole">${_escapeHtml(localizedConfidenceTier(item?.confidence || ""))}</div>
        </div>
      `).join("");

      return `
        <div class="section" style="margin-top:12px;">
          <div class="sectionTitle">${t("allergen_title")}</div>
          <div class="mini">${_escapeHtml(coverageNote)}</div>
          <div class="pillRow" style="margin-top:10px;">
            <span class="pill ${coverageClass}">${t("allergen_coverage")}: ${_escapeHtml(coverageLabel)}</span>
            ${sourcesChecked.map(source => `<span class="pill">${_escapeHtml(localizedAllergenSourceLabel(source))}</span>`).join("")}
          </div>
          ${detected.length ? `
            <div class="box" style="margin-top:12px;">
              <div class="sectionTitle" style="margin:0 0 8px 0;">${t("allergen_detected_title")}</div>
              ${renderItems(detected)}
            </div>
          ` : ``}
          ${possible.length ? `
            <div class="box" style="margin-top:12px;">
              <div class="sectionTitle" style="margin:0 0 8px 0;">${t("allergen_possible_title")}</div>
              ${renderItems(possible)}
            </div>
          ` : ``}
          ${showNeutralNone ? `
            <div class="box" style="margin-top:12px;">
              <div class="mini">${t("allergen_none_found")}</div>
            </div>
          ` : ``}
          <div class="whyFoot" style="margin-top:12px;"><b>${t("allergen_sources_checked")}</b><br/>${sourcesChecked.length ? sourcesChecked.map(localizedAllergenSourceLabel).map(_escapeHtml).join(", ") : "-"}</div>
          <div class="err" style="margin-top:10px;">${_escapeHtml(warning)}</div>
        </div>
      `;
    }

    function dietarySignalStatusLabel(signalKey, signalData){
      const status = String(signalData?.status || "").toLowerCase();
      if (signalKey === "halal" && status === "certified") return t("dietary_signal_halal_certified");
      if (signalKey === "halal" && status === "possible_not_suitable") return t("dietary_signal_halal_possible_not_suitable");
      if (signalKey === "vegan" && status === "labeled") return t("dietary_signal_vegan_labeled");
      if (signalKey === "vegan" && status === "possible_not_suitable") return t("dietary_signal_vegan_possible_not_suitable");
      if (signalKey === "vegetarian" && status === "labeled") return t("dietary_signal_vegetarian_labeled");
      if (signalKey === "vegetarian" && status === "possible_not_suitable") return t("dietary_signal_vegetarian_possible_not_suitable");
      return t("dietary_signal_status_unclear");
    }

    function dietarySignalName(signalKey){
      if (signalKey === "halal") return t("dietary_signal_halal_name");
      if (signalKey === "vegan") return t("dietary_signal_vegan_name");
      if (signalKey === "vegetarian") return t("dietary_signal_vegetarian_name");
      return signalKey || "-";

    function dietarySignalBadgeClass(signalData){
      const status = String(signalData?.status || "").toLowerCase();

    function dietaryCoverageValueLabel(value){

      if (key === "medium") return t("dietary_signal_coverage_medium");
      if (key === "low") return t("dietary_signal_coverage_low");
      return key || "-";
    }

    function dietarySignalSummaryLabel(signalKey, signalData){
      const status = String(signalData?.status || "").toLowerCase();
      if (status === "possible_not_suitable") return t("dietary_signal_summary_caution");
      if (signalKey === "halal" && status === "certified") return t("dietary_signal_summary_certified");
      if ((signalKey === "vegan" || signalKey === "vegetarian") && status === "labeled") return t("dietary_signal_summary_labeled");
      return t("dietary_signal_summary_unclear");

    function correctionValue(source, keys, fallback = ""){
      if (!source || typeof source !== "object") return fallback;
      for (const key of Array.isArray(keys) ? keys : [keys]){
        const value = source?.[key];
        if (value !== null && value !== undefined && String(value).trim() !== "") return value;
      }
      return fallback;
    }

      return {

        ingredients_text: String(sourceForm.ingredients_text || "").trim(),

        protein_g: sourceForm.protein_g || "",
        serving_size: sourceForm.serving_size || "",
        unit: String(sourceForm.unit || data?.nutrition_per_100?.unit || "g").trim() || "g",
        key: String(sourceForm.key || data?.key || "").trim(),
        barcode: String(sourceForm.barcode || product?.barcode || "").trim(),
        image_url: String(sourceForm.image_url || product?.image_url || "").trim(),

        meta: sourceForm.meta && typeof sourceForm.meta === "object" ? { ...sourceForm.meta } : (data?.meta && typeof data.meta === "object" ? { ...data.meta } : null),
        corrected_in_session: !!sourceForm.corrected_in_session,
        timestamp: sourceForm.timestamp || Date.now(),

    function buildCorrectionFeedbackPayload(currentData){

      const ctx = state.correctionFeedbackContext && typeof state.correctionFeedbackContext === "object"

        : null;

        product: {
          name: String(product?.name || ctx?.product?.name || "").trim(),
          brand: String(product?.brand || ctx?.product?.brand || "").trim(),
          barcode: String(product?.barcode || ctx?.product?.barcode || "").trim(),
          key: String(data?.key || ctx?.key || "").trim(),
        },
        source_type: sourceTypeForFeedback(ctx?.analysis || data),
        lang,

    async function submitCorrectionFeedback(){
      const payload = buildCorrectionFeedbackPayload(state.data || {});
      state.feedbackStatus = null;
      render();
      try{
        const res = await fetch(`/feedback/correction?lang=${lang}`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload),
        });
        const data = await res.json().catch(()=> ({}));
        if (!res.ok || data?.ok === false){
          state.feedbackStatus = { kind: "error", message: t("feedback_failed") };
          render();
          return;
        }
        state.feedbackStatus = { kind: "success", message: t("feedback_thanks") };
        render();
      }catch(_e){
        state.feedbackStatus = { kind: "error", message: t("feedback_failed") };
        render();
      }
    }

    async function doManualAnalysis(){
      const requestId = beginAnalysisRequest();
      state.manualForm = readManualForm();
      const payload = buildCorrectionPayload(state.data, state.manualForm);
      const originalFeedbackContext = payload.corrected_in_session ? (
        state.correctionFeedbackContext || {
          analysis: state.data && typeof state.data === "object" ? { ...state.data } : {},
          key: String(state.data?.key || "").trim(),
          product: state.data?.product && typeof state.data.product === "object" ? { ...state.data.product } : {},
          originalNutrition: nutritionSnapshot(state.data || {}),
        }
      ) : null;
      state.loading = true;
      state.scanStatusMessage = "";
      state.error = "";
      state.refreshNotice = null;
      state.feedbackStatus = null;
      render();
      try{
        const res = await fetch(`/scan/manual?lang=${lang}`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload),
        });
        const data = await res.json().catch(()=> ({}));
        if (!isCurrentAnalysisRequest(requestId)) return;
        if (!res.ok || data?.error){
          state.error = localizeScanError(data, res.status);
          state.errorCode = scanErrorCode(data, res.status);
          state.loading = false;
          state.recoveryOpen = true;
          render();
          return;
        }
        state.data = data;
        state.manualForm = { ...state.manualForm, corrected_in_session: false };
        state.correctionFeedbackContext = data?.corrected_in_session ? originalFeedbackContext : null;
        state.error = "";
        state.errorCode = "";
        state.loading = false;
        state.recoveryOpen = false;
        _storeRecentProduct(data, data?.key || "manual:entry");
        _storeAnalysisHistory(data, data?.key || "manual:entry");
        step = 2;
        render();
      }catch(_e){
        if (!isCurrentAnalysisRequest(requestId)) return;
        state.error = t("err_network");
        state.loading = false;
        render();
      }
    }

    function readFileAsDataUrl(file){
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(String(reader.result || ""));
        reader.onerror = () => reject(new Error("file_read_failed"));
        reader.readAsDataURL(file);
      });
    }

    function loadImageFromDataUrl(dataUrl){
      return new Promise((resolve, reject) => {
        const img = new Image();
        img.onload = () => resolve(img);
        img.onerror = () => reject(new Error("image_load_failed"));
        img.src = dataUrl;
      });
    }

    function defaultPhotoCrop(){
      return { x:0.08, y:0.12, width:0.84, height:0.7 };
    }

    function clampPhotoCrop(crop){
      const next = crop && typeof crop === "object" ? crop : defaultPhotoCrop();
      const width = Math.min(0.96, Math.max(0.2, Number(next.width) || 0.84));
      const height = Math.min(0.96, Math.max(0.2, Number(next.height) || 0.7));
      const x = Math.min(1 - width, Math.max(0, Number(next.x) || 0));
      const y = Math.min(1 - height, Math.max(0, Number(next.y) || 0));
      return { x, y, width, height };
    }

    function getPendingPhotoCrop(){
      return clampPhotoCrop(state.photoCapture?.crop || defaultPhotoCrop());
    }

      const confirmPhotoBtn = document.getElementById("confirmPhotoBtn");

    function setPendingPhotoCrop(nextCrop){
      if (!state.photoCapture || !state.photoCapture.dataUrl) return;
      state.photoCapture.crop = clampPhotoCrop(nextCrop);
      state.photoCapture.confirmMode = "cropped";
      syncPendingPhotoConfirmUi();
      const box = document.getElementById("photoCropBox");
      if (!box) return;
      const crop = state.photoCapture.crop;
      box.style.left = `${(crop.x * 100).toFixed(3)}%`;
      box.style.top = `${(crop.y * 100).toFixed(3)}%`;
      box.style.width = `${(crop.width * 100).toFixed(3)}%`;
      box.style.height = `${(crop.height * 100).toFixed(3)}%`;
      console.debug("[photo-crop-change]", {
        slot: state.photoCapture?.slot || "",
        confirmMode: state.photoCapture?.confirmMode || "cropped",
        crop,
        imageLength: Number((state.photoCapture?.dataUrl || "").length),
        originalImageLength: Number((state.photoCapture?.originalDataUrl || "").length),
        isDistinctFromOriginal: Number((state.photoCapture?.dataUrl || "").length) !== Number((state.photoCapture?.originalDataUrl || "").length),

    async function cropPhotoDataUrl(dataUrl, crop){
      const img = await loadImageFromDataUrl(dataUrl);
      const safeCrop = clampPhotoCrop(crop);
      const width = img.naturalWidth || img.width || 1;
      const height = img.naturalHeight || img.height || 1;
      const sx = Math.max(0, Math.floor(width * safeCrop.x));
      const sy = Math.max(0, Math.floor(height * safeCrop.y));
      const sw = Math.max(1, Math.floor(width * safeCrop.width));
      const sh = Math.max(1, Math.floor(height * safeCrop.height));
      const canvas = document.createElement("canvas");
      canvas.width = sw;
      canvas.height = sh;
      const ctx = canvas.getContext("2d");
      if (!ctx) return dataUrl;
      ctx.imageSmoothingEnabled = true;
      ctx.imageSmoothingQuality = "high";
      ctx.drawImage(img, sx, sy, sw, sh, 0, 0, sw, sh);
      return canvas.toDataURL("image/jpeg", 0.9);
    }

    async function normalizeNutritionPhotoDataUrl(file){
      const sourceDataUrl = await readFileAsDataUrl(file);
      try{
        const img = await loadImageFromDataUrl(sourceDataUrl);
        const maxEdge = 1600;
        const scale = Math.min(1, maxEdge / Math.max(img.naturalWidth || img.width || maxEdge, img.naturalHeight || img.height || maxEdge));
        const targetWidth = Math.max(1, Math.round((img.naturalWidth || img.width || maxEdge) * scale));
        const targetHeight = Math.max(1, Math.round((img.naturalHeight || img.height || maxEdge) * scale));
        const canvas = document.createElement("canvas");
        canvas.width = targetWidth;
        canvas.height = targetHeight;
        const ctx = canvas.getContext("2d");
        if (!ctx) return sourceDataUrl;
        ctx.imageSmoothingEnabled = true;
        ctx.imageSmoothingQuality = "high";
        ctx.drawImage(img, 0, 0, targetWidth, targetHeight);
        return canvas.toDataURL("image/jpeg", 0.86);
      }catch(_e){
        return sourceDataUrl;
      }
    }

    function bindPhotoCropInteractions(){
      const stage = document.getElementById("photoCropStage");
      const box = document.getElementById("photoCropBox");
      const handle = document.getElementById("photoCropHandle");
      if (!stage || !box || !handle || !state.photoCapture?.dataUrl) return;
      let activePointerId = null;
      let mode = "";
      let startX = 0;
      let startY = 0;
      let startCrop = getPendingPhotoCrop();

      const beginPointer = (event, nextMode) => {
        event.preventDefault();
        event.stopPropagation();
        const pointer = event.touches ? event.touches[0] : event;
        if (!pointer) return;
        activePointerId = typeof pointer.pointerId === "number" ? pointer.pointerId : 1;
        mode = nextMode;
        startX = Number(pointer.clientX) || 0;
        startY = Number(pointer.clientY) || 0;
        startCrop = getPendingPhotoCrop();
        if (event.target?.setPointerCapture && typeof pointer.pointerId === "number"){
          try{ event.target.setPointerCapture(pointer.pointerId); }catch(_e){}
        }
      };

      const movePointer = (event) => {
        if (!mode) return;
        const pointer = event.touches ? event.touches[0] : event;
        if (!pointer) return;
        if (!event.touches && activePointerId !== null && typeof pointer.pointerId === "number" && pointer.pointerId !== activePointerId) return;
        const rect = stage.getBoundingClientRect();
        const dx = rect.width ? (Number(pointer.clientX) - startX) / rect.width : 0;
        const dy = rect.height ? (Number(pointer.clientY) - startY) / rect.height : 0;
        if (mode === "move"){
          setPendingPhotoCrop({
            x: startCrop.x + dx,
            y: startCrop.y + dy,
            width: startCrop.width,
            height: startCrop.height,
          });
          return;
        }
        if (mode === "resize"){
          setPendingPhotoCrop({
            x: startCrop.x,
            y: startCrop.y,
            width: startCrop.width + dx,
            height: startCrop.height + dy,
          });
        }
      };

      const endPointer = () => {
        activePointerId = null;
        mode = "";
      };

      box.onpointerdown = (event) => beginPointer(event, "move");
      handle.onpointerdown = (event) => beginPointer(event, "resize");
      stage.onpointermove = movePointer;
      stage.onpointerup = endPointer;
      stage.onpointercancel = endPointer;
      box.ontouchstart = (event) => beginPointer(event, "move");
      handle.ontouchstart = (event) => beginPointer(event, "resize");
      stage.ontouchmove = (event) => { movePointer(event); };
      stage.ontouchend = endPointer;
      stage.ontouchcancel = endPointer;
    }

    function stripDiacritics(value){
      return String(value || "")
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g, "");
    }

    function _normalizeIngredientToken(value){
      return String(value || "")
        .replace(/[.,;:!?()[\]{}"'`´’“”\-_/\\|+*=~]/g, " ")
        .split(/\s+/)
        .map(part => stripDiacritics(part))
        .join(" ")
        .toLowerCase()
        .trim()
        .replace(/\s+/g, " ");
    }

    function _normalizeIngredientTokenLoose(value){
      return stripDiacritics(_normalizeIngredientToken(value))
        .replace(/[.,;:!?()[\]{}"'`´’“”\-_/\\|+*=~]/g, " ")
        .trim()
        .replace(/\s+/g, " ");
    }

    function _escapeHtml(value){
      return String(value || "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;");
    }

    function _ingredientLookupKey(value){
      return String(value || "")
        .normalize("NFC")
        .toLowerCase()
        .trim()
        .replace(/\s+/g, " ");
    }

    function _ingredientLookupVariants(value){
      const raw = String(value || "").trim();
      if (!raw) return [];
      const variants = new Set([raw]);
      const withoutPercentages = raw.replace(/\b\d+(?:[.,]\d+)?\s*%/g, " ").trim();
      if (withoutPercentages) variants.add(withoutPercentages);
      const withoutParens = raw.replace(/\([^)]*\)/g, " ").trim();
      if (withoutParens) variants.add(withoutParens);
      const beforeColon = raw.split(":")[0]?.trim();
      if (beforeColon) variants.add(beforeColon);
      const firstSegment = raw.split(/[;,]/)[0]?.trim();
      if (firstSegment) variants.add(firstSegment);

      return Array.from(variants)
        .map(item => item.replace(/\s+/g, " ").trim())
        .filter(Boolean);
    }

    function _safeJsonParse(raw, fallback){
      if (!raw) return fallback;
      try {
        return JSON.parse(raw);
      } catch (_err) {
        return fallback;
      }
    }

      try {

    function _productIdentity(data, fallbackKey = ""){
      const product = data?.product || {};
      const key = String(fallbackKey || product?.barcode || product?.code || data?.barcode || "").trim();
      return {
        key,
        name: String(product?.name || data?.product_name || "").trim(),
        brand: String(product?.brand || "").trim()
      };
    }

    function _storeRecentProduct(data, key){
      if (!data || typeof data !== "object" || !isFinalResolvedProductData(data)) return;
      const identity = _productIdentity(data, key);
      if (!identity.key) return;
      const existing = _readRecentProducts().filter(item => String(item?.key || "") !== identity.key);
      const next = [{
        key: identity.key,
        name: identity.name,
        brand: identity.brand,
        data
      }, ...existing].slice(0, 6);
      _writeRecentProducts(next);
    }

    function _getComparisonCandidates(currentKey){
      return _readRecentProducts().filter(item => String(item?.key || "") && String(item.key) !== String(currentKey || ""));
    }

    function _isUsableCachedScan(data){
      if (!data || typeof data !== "object" || data?.error) return false;
      if (isPlaceholderScanResult(data)) return false;
      if (!isFinalResolvedProductData(data)) return false;
      return Number.isFinite(Number(data?.vitascore));
    }

    function _findCachedScanResult(key){
      const normalizedKey = String(key || "").trim();
      if (!normalizedKey) return null;
      const historyMatch = _readAnalysisHistory().find(item => String(item?.key || "").trim() === normalizedKey && _isUsableCachedScan(item?.data));
      if (historyMatch?.data) return historyMatch.data;
      const recentMatch = _readRecentProducts().find(item => String(item?.key || "").trim() === normalizedKey && _isUsableCachedScan(item?.data));
      return recentMatch?.data || null;
    }

    function _analysisSnapshot(data, key){
      const product = data?.product || {};
      const intel = data?.ingredients_intelligence || {};
      const markers = intel?.markers || {};
      return {
        key: String(key || product?.barcode || product?.code || "").trim(),
        product_name: String(product?.name || "").trim(),
        brand: String(product?.brand || "").trim(),
        timestamp: new Date().toISOString(),
        vitascore: data?.vitascore ?? null,
        processing_level: String(intel?.processing_label || "").trim(),
        processing_score: intel?.processing_score ?? null,
        flags: {
          caffeine: !!markers?.caffeine,
          sweeteners: Number(markers?.sweeteners || 0),
          colorants: Number(markers?.colorants || 0),
          flavourings: Number(markers?.flavourings || 0),
          e_numbers: Array.isArray(intel?.e_number_details) ? intel.e_number_details.length : 0
        },
        summary: {
          reasons: [...evaluateScoreExplanations(data).negative, ...evaluateScoreExplanations(data).positive, ...evaluateScoreExplanations(data).neutral]
            .slice(0, 2)
            .map(item => item.message)
        },
        data
      };
    }

    function _storeAnalysisHistory(data, key){
      if (!isFinalResolvedProductData(data)) return;
      const snapshot = _analysisSnapshot(data, key);
      if (!snapshot.key) return;
      const existing = _readAnalysisHistory().filter(item => String(item?.key || "") !== snapshot.key);
      _writeAnalysisHistory([snapshot, ...existing]);
    }

    function _storeComparisonHistory(productAData, productBData, productAKey, productBKey){
      if (!productAData || !productBData) return;
      const verdict = determineComparisonVerdict(productAData, productBData);
      const pairKey = `${String(productAKey || verdict.left.key || "").trim()}::${String(productBKey || verdict.right.key || "").trim()}`;
      if (!pairKey || pairKey === "::") return;
      const entry = {
        pair_key: pairKey,
        timestamp: new Date().toISOString(),
        product_a: _analysisSnapshot(productAData, productAKey),
        product_b: _analysisSnapshot(productBData, productBKey),
        verdict: verdict.winner,
        verdict_label: verdict.winner === "tie" ? t("compare_verdict_tie") : t("compare_verdict"),
        reasons: verdict.reasons.slice(0, 4)
      };
      const existing = _readComparisonHistory().filter(item => String(item?.pair_key || "") !== pairKey);
      _writeComparisonHistory([entry, ...existing]);
    }

      state.key = String(entry.key || "");

    function _reopenComparisonFromHistory(pairKey){
      const entry = _readComparisonHistory().find(item => String(item?.pair_key || "") === String(pairKey || ""));
      if (!entry?.product_a?.data || !entry?.product_b?.data) return;
      _storeRecentProduct(entry.product_a.data, entry.product_a.key);
