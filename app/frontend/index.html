      state.key = String(entry.product_a.key || "");
      state.data = entry.product_a.data;
      state.compareTargetKey = String(entry.product_b.key || "");

      step = isFinalResolvedProductData(entry.product_a.data) ? 2 : 1;
      state.recoveryOpen = !isFinalResolvedProductData(entry.product_a.data);
      render();
    }

    function _looksLikeCaptureNoise(value){
      const key = _ingredientLookupKey(value);
      if (!key || key === "-" || key === "unknown") return true;

      if (!/[a-z\u00c0-\u024f\u0370-\u03ff]/i.test(key)) return true;
      if (/^e\s?\d+[a-z]?$/i.test(key)) return true;
      return false;
    }

        const ings = Array.isArray(data?.ingredients) ? data.ingredients : [];
        const textBlob = ings.map(i => i?.name || "").join(" ");

      return sourceLang || "";

    function _recordUnmatchedIngredient(value, context = {}){
      const original = String(value || "").normalize("NFC").trim();
      const normalized = _ingredientLookupKey(original);
      if (_looksLikeCaptureNoise(normalized)) return;
      try {
        const store = _readUnmatchedIngredientStore();
        const sourceLanguage = String(context?.source_language || "").toUpperCase() || "UNKNOWN";
        const recordKey = `${normalized}::${sourceLanguage}`;
        const now = String(context?.captured_at || new Date().toISOString());
        const existing = store[recordKey] || null;
        const productName = String(context?.product_name || "").trim();
        const barcode = String(context?.barcode || "").trim();
        const uiLanguage = String(context?.ui_language || lang || "").toUpperCase();
        const contextSignature = `${barcode || productName || "unknown"}::${uiLanguage || "UNKNOWN"}`;
        const seenContextKeys = Array.isArray(existing?.seen_context_keys) ? existing.seen_context_keys : [];
        const isNewContext = !seenContextKeys.includes(contextSignature);
        const sampleProducts = Array.from(new Set([...(Array.isArray(existing?.sample_products) ? existing.sample_products : []), productName].filter(Boolean))).slice(0, 10);
        const uiLanguages = Array.from(new Set([...(Array.isArray(existing?.ui_languages) ? existing.ui_languages : []), uiLanguage].filter(Boolean))).slice(0, 10);
        store[recordKey] = {
          original_term: existing?.original_term || original,
          normalized_term: normalized,
          source_language: sourceLanguage,
          product_name: existing?.product_name || productName,
          barcode: existing?.barcode || barcode,
          count: Number(existing?.count || 0) + (isNewContext ? 1 : 0),
          first_seen_at: existing?.first_seen_at || now,
          last_seen_at: now,
          ui_languages: uiLanguages,
          sample_products: sampleProducts,
          seen_context_keys: Array.from(new Set([...seenContextKeys, contextSignature])).slice(-25)
        };
        _writeUnmatchedIngredientStore(store);
      } catch (_err) {}
    }

    function _buildGlossaryAliasMaps(obj){
      const entries = {};
      const aliasRaw = {};
      const aliasNormalized = {};
      const aliasStripped = {};

      if (!obj || typeof obj !== "object") return { entries, aliasRaw, aliasNormalized, aliasStripped };

      for (const [canonicalKey, entry] of Object.entries(obj)){
        if (!entry || typeof entry !== "object") continue;
        const translations = {};
        for (const code of supportedLangs){
          if (typeof entry?.translations?.[code] === "string" && entry.translations[code].trim()){
            translations[code] = entry.translations[code].trim();
          }
        }
        if (!Object.keys(translations).length) continue;

        const canonical = _ingredientLookupKey(canonicalKey);
        if (!canonical) continue;

        const aliases = Array.from(new Set([canonicalKey, ...(Array.isArray(entry.aliases) ? entry.aliases : [])]
          .map(value => String(value || "").trim())
          .filter(Boolean)));

        const glossaryEntry = { canonical, translations, aliases };
        entries[canonical] = glossaryEntry;

        for (const alias of aliases){
          const rawKey = _ingredientLookupKey(alias);
          const normalizedKey = _normalizeIngredientToken(alias);
          const strippedKey = _normalizeIngredientTokenLoose(alias);
          if (rawKey) aliasRaw[rawKey] = canonical;
          if (normalizedKey) aliasNormalized[normalizedKey] = canonical;
          if (strippedKey) aliasStripped[strippedKey] = canonical;
        }
      }

      return { entries, aliasRaw, aliasNormalized, aliasStripped };
    }

    async function ensureIngredientGlossaryLoaded(){
      if (ingredientGlossaryEntries && ingredientGlossaryAliasRaw && ingredientGlossaryAliasNormalized && ingredientGlossaryAliasStripped) return true;
      if (ingredientGlossaryPromise) return ingredientGlossaryPromise;
      ingredientGlossaryLoadFailed = false;
      ingredientGlossaryPromise = (async () => {
        const triedUrls = [];
        let lastError = null;

        for (const candidateUrl of INGREDIENT_GLOSSARY_URLS){
          const requestUrl = `${candidateUrl}${candidateUrl.includes("?") ? "&" : "?"}v=${Date.now()}`;
          triedUrls.push(candidateUrl);
          try {
            const response = await fetch(requestUrl);
            if (!response.ok) throw new Error(`HTTP ${response.status}`);
            const obj = await response.json();
            const maps = _buildGlossaryAliasMaps(obj);
            if (Object.keys(maps.entries).length === 0) throw new Error("Glossary JSON empty");

            ingredientGlossary = obj;
            ingredientGlossaryEntries = maps.entries;
            ingredientGlossaryAliasRaw = maps.aliasRaw;
            ingredientGlossaryAliasNormalized = maps.aliasNormalized;
            ingredientGlossaryAliasStripped = maps.aliasStripped;
            ingredientGlossaryResolvedUrl = candidateUrl;
            ingredientGlossaryLoadFailed = false;
            if (!ingredientGlossaryLoadedLogged){
              console.debug(`[ingredients-glossary] loaded from ${candidateUrl} with ${Object.keys(maps.entries).length} entries`);
              ingredientGlossaryLoadedLogged = true;
            }
            render();
            return true;
          } catch (err) {
            lastError = `${candidateUrl}: ${err && err.message ? err.message : err}`;
          }
        }

        throw new Error(`Tried ${triedUrls.join(", ")}; final error: ${lastError || "unknown"}`);
      })()
        .catch((err) => {
          ingredientGlossary = null;
          ingredientGlossaryEntries = null;
          ingredientGlossaryAliasRaw = null;
          ingredientGlossaryAliasNormalized = null;
          ingredientGlossaryAliasStripped = null;
          ingredientGlossaryResolvedUrl = null;
          ingredientGlossaryLoadFailed = true;
          if (!ingredientGlossaryWarned){
            console.warn(`[ingredients-glossary] Failed to load glossary from ${INGREDIENT_GLOSSARY_URLS.join(", ")}. ${err && err.message ? err.message : err}`);
            ingredientGlossaryWarned = true;
          }
          render();
          return false;
        })
        .finally(() => {
          ingredientGlossaryPromise = null;
        });
      return ingredientGlossaryPromise;
    }

    async function ensureScoreExplanationRulesLoaded(){
      if (Array.isArray(scoreExplanationRules) && scoreExplanationRules.length) return true;
      if (scoreExplanationRulesPromise) return scoreExplanationRulesPromise;
      scoreExplanationRulesLoadFailed = false;
      scoreExplanationRulesPromise = (async () => {
        const triedUrls = [];
        let lastError = null;
        for (const candidateUrl of SCORE_EXPLANATION_RULES_URLS){
          const requestUrl = `${candidateUrl}${candidateUrl.includes("?") ? "&" : "?"}v=${Date.now()}`;
          triedUrls.push(candidateUrl);
          try {
            const response = await fetch(requestUrl);
            if (!response.ok) throw new Error(`HTTP ${response.status}`);
            const obj = await response.json();
            if (!Array.isArray(obj) || !obj.length) throw new Error("Score explanation rules JSON empty");
            scoreExplanationRules = obj;
            scoreExplanationRulesResolvedUrl = candidateUrl;
            scoreExplanationRulesLoadFailed = false;
            if (!scoreExplanationRulesLoadedLogged){
              console.debug(`[score-explanation-rules] loaded from ${candidateUrl} with ${obj.length} rules`);
              scoreExplanationRulesLoadedLogged = true;
            }
            render();
            return true;
          } catch (err) {
            lastError = `${candidateUrl}: ${err && err.message ? err.message : err}`;
          }
        }
        throw new Error(`Tried ${triedUrls.join(", ")}; final error: ${lastError || "unknown"}`);
      })()
        .catch((err) => {
          scoreExplanationRules = [];
          scoreExplanationRulesResolvedUrl = null;
          scoreExplanationRulesLoadFailed = true;
          if (!scoreExplanationRulesWarned){
            console.warn(`[score-explanation-rules] Failed to load rules from ${SCORE_EXPLANATION_RULES_URLS.join(", ")}. ${err && err.message ? err.message : err}`);
            scoreExplanationRulesWarned = true;
          }
          render();
          return false;
        })
        .finally(() => {
          scoreExplanationRulesPromise = null;
        });
      return scoreExplanationRulesPromise;
    }

        const strippedAsciiKey = _normalizeIngredientTokenLoose(
          String(candidate || "").normalize("NFD").replace(/[\u0300-\u036f]/g, "")
        );
        const canonical = (ingredientGlossaryAliasRaw || {})[rawKey]
          || (ingredientGlossaryAliasNormalized || {})[normalizedKey]
          || (ingredientGlossaryAliasStripped || {})[strippedKey]
          || (ingredientGlossaryAliasStripped || {})[strippedAsciiKey]
          || "";
        if (canonical) return (ingredientGlossaryEntries || {})[canonical] || null;

        _recordUnmatchedIngredient(value, captureContext || {});

    function buildNutritionInsightEvidence(data){
      const ings = Array.isArray(data?.ingredients) ? data.ingredients : [];
      const product = data?.product || {};
      const canonicalCounts = {};
      const normalizedTerms = [];
      const productCategories = Array.isArray(product?.categories) ? product.categories.map(item => _ingredientLookupKey(item)) : [];
      const productText = _ingredientLookupKey([
        product?.name || "",
        product?.brand || "",
        ...(Array.isArray(product?.categories) ? product.categories : [])
      ].join(" | "));

      for (const ing of ings){
        const raw = String(ing?.name || "").trim();
        if (!raw) continue;
        normalizedTerms.push(_ingredientLookupKey(raw));
        const entry = resolveIngredientGlossaryEntry(raw, false);
        if (entry?.canonical){
          canonicalCounts[entry.canonical] = (canonicalCounts[entry.canonical] || 0) + 1;
        }
      }

      const eNumbers = new Set(
        (Array.isArray(data?.ingredients_intelligence?.e_number_details) ? data.ingredients_intelligence.e_number_details : [])
          .map(ed => _normalizeECode(ed?.code || ""))
          .filter(Boolean)
      );

      return {
        canonicalCounts,
        normalizedTerms,
        eNumbers,
        markers: data?.ingredients_intelligence?.markers || {},
        processingLabel: String(data?.ingredients_intelligence?.processing_label || "").trim(),
        ingredientCount: ings.length,
        productText,
        productCategories,
        data
      };
    }

    function evaluateNutritionInsights(data){
      if (!Array.isArray(nutritionInsightRules) || !nutritionInsightRules.length) return [];

      const evidence = buildNutritionInsightEvidence(data);
      const severityRank = { high: 3, medium: 2, low: 1, info: 0 };

      const matchesRule = (rule) => {
        const conditions = rule?.trigger_conditions || {};
        const triggerTerms = Array.isArray(rule?.trigger_terms) ? rule.trigger_terms : [];
        switch (rule?.trigger_type){
          case "marker_min":
            return Number(evidence.markers?.[conditions.marker] || 0) >= Number(conditions.min || 1);
          case "marker_max":
            return Number(evidence.markers?.[conditions.marker] || 0) <= Number(conditions.max || 0);
          case "e_number_any":
            return triggerTerms.some(code => evidence.eNumbers.has(_normalizeECode(code)));
          case "e_number_count_min":
            return evidence.eNumbers.size >= Number(conditions.min || 1);
          case "e_number_count_max":
            return evidence.eNumbers.size <= Number(conditions.max || 0);
          case "canonical_any":
            return triggerTerms.some(term => Number(evidence.canonicalCounts[_ingredientLookupKey(term)] || 0) > 0);
          case "canonical_none":
            return triggerTerms.every(term => Number(evidence.canonicalCounts[_ingredientLookupKey(term)] || 0) === 0);
          case "canonical_count_min":
            return triggerTerms.reduce((sum, term) => sum + Number(evidence.canonicalCounts[_ingredientLookupKey(term)] || 0), 0) >= Number(conditions.min || 1);
          case "data_threshold": {
            const value = _getValueByPath(evidence.data, conditions.path);
            const numeric = Number(value);
            if (Number.isNaN(numeric)) return false;
            if (conditions.gte !== undefined && numeric < Number(conditions.gte)) return false;
            if (conditions.lte !== undefined && numeric > Number(conditions.lte)) return false;
            return true;
          }
          case "processing_label_any": {
            const current = _ingredientLookupKey(evidence.processingLabel);
            return triggerTerms.some(term => _ingredientLookupKey(term) === current);
          }
          case "ingredient_count_lte":
            return Number(evidence.ingredientCount || 0) <= Number(conditions.max || 0);
          case "ingredient_count_gte":
            return Number(evidence.ingredientCount || 0) >= Number(conditions.min || 0);
          case "product_text_any":
            return triggerTerms.some(term => evidence.productText.includes(_ingredientLookupKey(term)));
          case "product_text_none":
            return triggerTerms.every(term => !evidence.productText.includes(_ingredientLookupKey(term)));
          case "category_any":
            return triggerTerms.some(term => evidence.productCategories.includes(_ingredientLookupKey(term)));
          case "all":
            return (Array.isArray(conditions.conditions) ? conditions.conditions : []).every(condition => matchesRule(condition));
          case "any":
            return (Array.isArray(conditions.conditions) ? conditions.conditions : []).some(condition => matchesRule(condition));
          default:
            return false;
        }
      };

      return nutritionInsightRules
        .filter(rule => rule && matchesRule(rule))
        .map(rule => ({
          rule_id: rule.rule_id,
          category: rule.category || "general",
          severity: rule.severity || "info",
          label: String(rule?.label?.[lang] || rule?.label?.en || rule?.label?.el || "").trim(),
          message: String(rule?.message?.[lang] || rule?.message?.en || rule?.message?.el || "").trim()
        }))
        .filter(item => item.message)
        .sort((a, b) => {
          const bySeverity = Number(severityRank[b.severity] || 0) - Number(severityRank[a.severity] || 0);
          if (bySeverity !== 0) return bySeverity;
          return String(a.rule_id || "").localeCompare(String(b.rule_id || ""));
        });
    }

    function _matchesScoreExplanationTrigger(evidence, trigger){
      if (!trigger || typeof trigger !== "object") return false;
      const triggerType = trigger.trigger_type || trigger.type || "";
      const triggerTerms = Array.isArray(trigger.trigger_terms || trigger.terms) ? (trigger.trigger_terms || trigger.terms) : [];
      const conditions = trigger.trigger_conditions || trigger.conditions || {};

      switch (triggerType){
        case "marker_min":
          return Number(evidence.markers?.[conditions.marker] || 0) >= Number(conditions.min || 1);
        case "marker_max":
          return Number(evidence.markers?.[conditions.marker] || 0) <= Number(conditions.max || 0);
        case "e_number_any":
          return triggerTerms.some(code => evidence.eNumbers.has(_normalizeECode(code)));
        case "e_number_count_min":
          return evidence.eNumbers.size >= Number(conditions.min || 1);
        case "e_number_count_max":
          return evidence.eNumbers.size <= Number(conditions.max || 0);
        case "canonical_any":
          return triggerTerms.some(term => Number(evidence.canonicalCounts[_ingredientLookupKey(term)] || 0) > 0);
        case "canonical_none":
          return triggerTerms.every(term => Number(evidence.canonicalCounts[_ingredientLookupKey(term)] || 0) === 0);
        case "canonical_count_min":
          return triggerTerms.reduce((sum, term) => sum + Number(evidence.canonicalCounts[_ingredientLookupKey(term)] || 0), 0) >= Number(conditions.min || 1);
        case "data_threshold": {
          const value = _getValueByPath(evidence.data, conditions.path);
          const numeric = Number(value);
          if (Number.isNaN(numeric)) return false;
          if (conditions.gte !== undefined && numeric < Number(conditions.gte)) return false;
          if (conditions.lte !== undefined && numeric > Number(conditions.lte)) return false;
          return true;
        }
        case "processing_label_any": {
          const current = _ingredientLookupKey(evidence.processingLabel);
          return triggerTerms.some(term => _ingredientLookupKey(term) === current);
        }
        case "ingredient_count_lte":
          return Number(evidence.ingredientCount || 0) <= Number(conditions.max || 0);
        case "ingredient_count_gte":
          return Number(evidence.ingredientCount || 0) >= Number(conditions.min || 0);
        case "product_text_any":
          return triggerTerms.some(term => evidence.productText.includes(_ingredientLookupKey(term)));
        case "product_text_none":
          return triggerTerms.every(term => !evidence.productText.includes(_ingredientLookupKey(term)));
        case "category_any":
          return triggerTerms.some(term => evidence.productCategories.includes(_ingredientLookupKey(term)));
        case "all":
          return (Array.isArray(conditions.conditions) ? conditions.conditions : []).every(condition => _matchesScoreExplanationTrigger(evidence, condition));
        case "any":
          return (Array.isArray(conditions.conditions) ? conditions.conditions : []).some(condition => _matchesScoreExplanationTrigger(evidence, condition));
        default:
          return false;
      }
    }

    function _capScoreExplanationGroups(groups, maxItems = 5){
      const order = ["negative", "positive", "neutral"];
      const totalCount = () => order.reduce((sum, key) => sum + groups[key].length, 0);
      while (totalCount() > maxItems){
        let removed = false;
        for (const key of ["neutral", "positive", "negative"]){
          if (groups[key].length > 1 || (key !== "negative" && groups[key].length > 0)){
            groups[key].pop();
            removed = true;
            break;
          }
        }
        if (!removed) break;
      }
      return groups;
    }

    function evaluateScoreExplanations(data){
      const groups = { negative: [], positive: [], neutral: [] };
      if (Array.isArray(scoreExplanationRules) && scoreExplanationRules.length){
        const evidence = buildNutritionInsightEvidence(data);
        for (const rule of scoreExplanationRules){
          if (!rule || !_matchesScoreExplanationTrigger(evidence, rule)) continue;
          const direction = ["negative", "positive", "neutral"].includes(rule.impact_direction) ? rule.impact_direction : "neutral";
          const message = String(rule?.message?.[lang] || rule?.message?.en || rule?.message?.el || "").trim();
          if (!message) continue;
          groups[direction].push({
            rule_id: rule.rule_id,
            impact_weight: Number(rule.impact_weight || 0),
            message
          });
        }
      }

      const backendBalanceReasons = Array.isArray(data?.vitascore_breakdown?.balance_adjustments?.applied)
        ? data.vitascore_breakdown.balance_adjustments.applied
        : [];
      const backendFloorReasons = Array.isArray(data?.vitascore_breakdown?.floor_adjustments?.applied)
        ? data.vitascore_breakdown.floor_adjustments.applied
        : [];
      for (const item of [...backendBalanceReasons, ...backendFloorReasons]){
        const message = String(item?.message || "").trim();
        if (!message) continue;
        const direction = ["negative", "positive", "neutral"].includes(item?.impact_direction) ? item.impact_direction : "positive";
        groups[direction].push({
          rule_id: String(item?.rule_id || "balance_adjustment"),
          impact_weight: Number(item?.impact_weight || 0),
          message
        });
      }

      for (const key of Object.keys(groups)){
        groups[key] = groups[key]
          .sort((a, b) => Number(b.impact_weight || 0) - Number(a.impact_weight || 0))
          .slice(0, key === "negative" ? 3 : 2);
      }

      return _capScoreExplanationGroups(groups, 5);
    }

    function _renderWhyRows(items){
      if (!items.length) return "";
      return `<div class="whyGrid">${items.map(item => `<div class="whyRow"><span>${_escapeHtml(item.message || "")}</span></div>`).join("")}</div>`;
    }

    function _comparisonBooleanValue(value){
      return value ? t("yes") : t("no");
    }

    function _ingredientClassCount(intel, classNames){
      const targets = new Set((Array.isArray(classNames) ? classNames : [classNames]).map(name => _ingredientLookupKey(name)));
      const items = Array.isArray(intel?.sanitized_ingredients) ? intel.sanitized_ingredients : [];
      let count = 0;
      for (const item of items){
        const cls = _ingredientLookupKey(item?.class || "");
        if (targets.has(cls)) count += 1;
      }
      return count;
    }

    function _flavouringIngredientCount(intel){
      const items = Array.isArray(intel?.sanitized_ingredients) ? intel.sanitized_ingredients : [];
      const seen = new Set();
      let count = 0;
      for (const item of items){
        const cls = _ingredientLookupKey(item?.class || "");
        const name = String(item?.name || "").trim();
        const nameKey = _ingredientLookupKey(name);
        const flavourLike = (
          cls === "flavoring"
          || cls === "flavouring"
          || nameKey === "flavoring"
          || nameKey === "flavouring"
          || nameKey === "flavorings"
          || nameKey === "flavourings"
          || nameKey.includes("flavor")
          || nameKey.includes("flavour")
          || nameKey.includes("aroma")
          || nameKey.includes("arôme")
        );
        if (!flavourLike || seen.has(nameKey)) continue;
        seen.add(nameKey);
        count += 1;
      }
      return count;
    }

    function _flavouringCount(intel){
      return Math.max(
        Number(intel?.markers?.flavourings || 0),
        _ingredientClassCount(intel, ["Flavoring", "Flavouring"]),
        _flavouringIngredientCount(intel)
      );
    }

    function _comparisonSummary(data, key){
      const product = data?.product || {};
      const intel = data?.ingredients_intelligence || {};
      const markers = intel?.markers || {};
      const scoreReasons = evaluateScoreExplanations(data);
      const warnings = Number(!!markers?.sweeteners) + Number(!!markers?.caffeine) + Number(!!markers?.colorants) + Number(!!markers?.flavourings) + Number(!!markers?.preservatives);
      const ingredientCount = Array.isArray(data?.ingredients) ? data.ingredients.length : 0;
      return {
        key: String(key || product?.barcode || product?.code || "").trim(),
        name: String(product?.name || t("unknown_product")).trim() || t("unknown_product"),
        brand: String(product?.brand || "").trim(),
        score: Number(data?.vitascore ?? -999),
        processingScore: Number(intel?.processing_score ?? 999),
        processingLabel: String(intel?.processing_label || "").trim(),
        eCount: Array.isArray(intel?.e_number_details) ? intel.e_number_details.length : 0,
        sweeteners: Number(markers?.sweeteners || 0),
        caffeine: Number(markers?.caffeine || 0),
        colorants: Number(markers?.colorants || 0),
        flavourings: _flavouringCount(intel),
        preservatives: Number(markers?.preservatives || 0),
        ingredientCount,
        warnings,
        reasons: [...scoreReasons.negative, ...scoreReasons.positive, ...scoreReasons.neutral].slice(0, 3)
      };
    }

    function determineComparisonVerdict(currentData, compareData){
      const left = _comparisonSummary(currentData, state.key);
      const right = _comparisonSummary(compareData, state.compareTargetKey);
      const scoredReasons = [];
      const scoreGap = Math.abs(Number(left.score || 0) - Number(right.score || 0));

      if (left.score !== right.score){
        const winner = left.score > right.score ? "left" : "right";
        scoredReasons.push({ winner, weight: 100, message: t("compare_reason_score") });
      }
      if (left.processingScore !== right.processingScore){
        const winner = left.processingScore < right.processingScore ? "left" : "right";
        scoredReasons.push({ winner, weight: 90, message: t("compare_reason_processing") });
      }
      if (left.eCount !== right.eCount){
        const winner = left.eCount < right.eCount ? "left" : "right";
        scoredReasons.push({ winner, weight: 80, message: t("compare_reason_additives") });
      }
      if (!!left.sweeteners !== !!right.sweeteners){
        const winner = !left.sweeteners ? "left" : "right";
        scoredReasons.push({ winner, weight: 70, message: t("compare_reason_sweeteners") });
      }
      if (!!left.caffeine !== !!right.caffeine){
        const winner = !left.caffeine ? "left" : "right";
        scoredReasons.push({ winner, weight: 65, message: t("compare_reason_caffeine") });
      }
      if (left.colorants !== right.colorants){
        const winner = left.colorants < right.colorants ? "left" : "right";
        scoredReasons.push({ winner, weight: 60, message: t("compare_reason_colorants") });
      }
      if (left.flavourings !== right.flavourings){
        const winner = left.flavourings < right.flavourings ? "left" : "right";
        scoredReasons.push({ winner, weight: 55, message: t("compare_reason_flavourings") });
      }
      if (left.ingredientCount !== right.ingredientCount){
        const winner = left.ingredientCount < right.ingredientCount ? "left" : "right";
        scoredReasons.push({ winner, weight: 50, message: t("compare_reason_simplicity") });
      }

      let leftPoints = 0;
      let rightPoints = 0;
      for (const reason of scoredReasons){
        if (reason.winner === "left") leftPoints += reason.weight;
        if (reason.winner === "right") rightPoints += reason.weight;
      }

      let winner = "tie";
      if (scoreGap >= 8 && left.score !== right.score){
        winner = left.score > right.score ? "left" : "right";
      } else if (leftPoints > rightPoints) winner = "left";
      else if (rightPoints > leftPoints) winner = "right";
      else if (left.score !== right.score) winner = left.score > right.score ? "left" : "right";

      const reasons = scoredReasons
        .filter(reason => winner !== "tie" && reason.winner === winner)
        .sort((a, b) => Number(b.weight || 0) - Number(a.weight || 0))
        .slice(0, 4)
        .map(reason => reason.message);

      return { winner, reasons, left, right };
    }

          </div>
          ${verdict.reasons.length ? `<div class="whyFoot" style="margin-top:12px;"><b>${t("compare_reason_title")}</b><br/>${verdict.reasons.map(reason => `- ${_escapeHtml(reason)}`).join("<br/>")}</div>` : ``}

    function quickVerdictLabel(score){

    function usageContextData(data){

    function usageContextPrimaryLabel(data){

    function quickReasonItems(data){
      const backend = data?.vitascore_explanation || {};
      const items = [];
      const pushMessage = (message) => {
        const text = String(message || "").trim();
        if (!text) return;
        if (items.some(item => item.message === text)) return;
        items.push({ message: text });
      };

      for (const item of Array.isArray(backend?.score_adjustments) ? backend.score_adjustments : []){
        const reason = String(item?.reason || "").trim();
        const impact = Number(item?.impact);
        if (!reason) continue;
        const suffix = Number.isFinite(impact) ? ` (${impact > 0 ? "+" : ""}${impact})` : "";
        pushMessage(`${reason}${suffix}`);
      }
      for (const message of Array.isArray(backend?.negative_factors) ? backend.negative_factors : []){
        pushMessage(message);
      }
      for (const message of Array.isArray(backend?.positive_factors) ? backend.positive_factors : []){
        pushMessage(message);
      }
      for (const message of Array.isArray(backend?.confidence_notes) ? backend.confidence_notes : []){
        pushMessage(message);
      }
      const usage = usageContextData(data);
      if (usage?.applies){
        pushMessage(usage?.message || "");
        for (const note of Array.isArray(usage?.notes) ? usage.notes : []){
          pushMessage(note);
        }
      }
      if (items.length) return items.slice(0, 5);

      const structured = evaluateScoreExplanations(data);
      return [...structured.negative, ...structured.positive, ...structured.neutral].slice(0, 5);
    }

    function quickSignalItems(data){
      const intel = data?.ingredients_intelligence || {};
      const markers = intel?.markers || {};
      const eCount = Array.isArray(intel?.e_number_details) ? intel.e_number_details.length : 0;

      const items = [];
      if (markers?.sweeteners) items.push(`${t("sweeteners")}: ${markers.sweeteners}`);
      if (markers?.caffeine) items.push(t("caffeine"));
      if (eCount >= 3) items.push(`${t("e_numbers")}: ${eCount}`);
      if (markers?.colorants) items.push(`${t("group_colorant")}: ${markers.colorants}`);
      if (flavouringCount) items.push(`${t("group_flavoring")}: ${flavouringCount}`);
      if (intel?.processing_score !== null && intel?.processing_score !== undefined){
        items.push(`${t("processing")}: ${localizeProcessingLabel(intel?.processing_label || "")}`);
      }
      return items.slice(0, 5);

            </div>

            <div class="box">
              <div class="sectionTitle" style="margin:0 0 8px 0;">${t("ingredients_grouped")}</div>
              ${groupOrder.length ? groupOrder.map(cls => `
                <div class="groupTitle">${localizedIngredientGroup(cls)}</div>
                ${groups[cls].filter(ing => {
                  const groupKey = _ingredientLookupKey(localizedIngredientGroup(cls));
                  const itemKey = _ingredientLookupKey(ing?._display?.primary || "");
                  return itemKey !== groupKey;
                }).map(ing => {
                  translationStats.total += 1;
                  if (ing?._display?.translated) translationStats.translated += 1;
                  const note = localizeIngredientNote(ing?.note || "");
                  const risk = (ing?.risk || "low").toLowerCase();
                  const riskLabel = (risk === "high" ? t("risk_high") : (risk === "medium" ? t("risk_medium") : t("risk_low")));
                  const riskCls = (risk === "high" ? "risk high" : (risk === "medium" ? "risk medium" : "risk low"));
                  return `
                    <div class="ingItem">
                      <div class="ingLeft">
                        <b>${ing?._display?.primary || ""}</b>
                        ${note ? `<small>${note}</small>` : ``}
                      </div>
                      <div class="${riskCls}">${riskLabel}</div>
                    </div>
                  `;
                }).join("")}
              `).join("") : `<div class="mini">${t("ingredients_none")}</div>`}
            </div>
          </div>

          <div class="btns">
            <button class="ghost" id="backBtn">${t("back")}</button>
            <button class="primary" id="nextBtn">${t("next")}</button>
          </div>
        </div>
      `;
      ingredientTranslationStats = translationStats;
      if (supportedLangs.includes(lang) && state.translateIngredients && ingredientGlossaryEntries && ingredientGlossaryResolvedUrl) {
        const unmatchedPreview = unmatchedIngredientNames.filter(Boolean).slice(0, 10);
        let unmatchedCount = 0;
        try {
          unmatchedCount = _listCapturedUnknownIngredientTerms().length;
        } catch (_err) {}
        console.debug(
          `[ingredients-glossary] toggle enabled; url=${ingredientGlossaryResolvedUrl}; entries=${Object.keys(ingredientGlossaryEntries).length}; unmatched=${unmatchedPreview.join(" | ")}; unmatched_store=${unmatchedCount}`
        );
      }
      return html
        .replace("__TRANSLATED_COUNT__", String(ingredientTranslationStats.translated))
        .replace("__TOTAL_COUNT__", String(ingredientTranslationStats.total));
    }

    function render(){
      stepTxt.textContent = `${step}/4`;
      barFill.style.width = `${(step/4)*100}%`;
      if (titleMeta) titleMeta.textContent = t("tagline");
      if (stepEl) stepEl.classList.toggle("hidden", step === 1);
      document.documentElement.lang = lang;
      syncLanguageSelector();
      if (step !== 1 && state.scanner?.open){
        closeScanner({ skipRender:true });
      }
      if (step > 1 && state.data && !isFinalResolvedProductData(state.data)){
        step = 1;
        state.recoveryOpen = true;
      }

      if (step === 1){
        app.innerHTML = `
          <div class="homeLayout">
            <div class="scanHero">
              <h1 class="homeTitle">${t("home_title")}</h1>
              <div class="homeSubtitle">${t("home_subtitle")}</div>
              ${renderBetaNotice("home")}
              ${state.error ? `<div class="err">${state.error}</div>` : ``}
              ${(state.loading || state.scanStatusMessage) ? `<div class="ok"><b>${_escapeHtml(scanLoadingTitle())}</b><br/>${_escapeHtml(state.scanStatusMessage || scanLoadingHint(false))}</div>` : ``}
              <div class="homeActions">
                <button class="primary actionButton" id="scanCameraBtn">${t("home_camera_cta")}</button>
                <button class="ghost actionButton" id="manualFocusBtn">${t("home_manual_cta")}</button>
              </div>
              <div class="homeInputBlock">
                <label class="inputLabel" for="keyInput">${t("home_input_label")}</label>
                <div class="homeInputRow">
                  <input id="keyInput" inputmode="numeric" enterkeyhint="search" autocapitalize="off" spellcheck="false" placeholder="${t("home_input_placeholder")}" value="${_escapeHtml(state.key || "")}"/>
                  <button class="primary actionButton" id="scanBtn">${state.loading ? t("scanning_btn") : t("home_analyze")}</button>
                </div>
                <div class="helperText">${t("home_helper")}</div>
              </div>
              ${renderUnresolvedScanBlock(state.data)}
              ${renderRecoveryBlock()}
            </div>
            <div class="secondaryZone">
              ${renderHomeList("analyses")}
              ${renderHomeList("comparisons")}
              ${renderHomeHowSection()}
            </div>
          </div>
          ${renderScannerOverlay()}
        `;
        const scanBtn = document.getElementById("scanBtn");
        const keyInput = document.getElementById("keyInput");
        const scanCameraBtn = document.getElementById("scanCameraBtn");
        const manualFocusBtn = document.getElementById("manualFocusBtn");
        const scannerCloseBtn = document.getElementById("scannerCloseBtn");
        const scannerManualBtn = document.getElementById("scannerManualBtn");
        if (scanBtn && keyInput){
          scanBtn.onclick = () => doScan(keyInput.value);
          keyInput.onkeydown = (e) => { if (e.key === "Enter") doScan(keyInput.value); };
        }
        if (scanCameraBtn) scanCameraBtn.onclick = () => openScanner();
        if (manualFocusBtn) manualFocusBtn.onclick = () => focusManualEntry();
        if (scannerCloseBtn) scannerCloseBtn.onclick = () => closeScanner();
        if (scannerManualBtn) scannerManualBtn.onclick = () => focusManualEntry();
        if (state.scanner?.open){
          requestAnimationFrame(() => _attachScannerStream(scannerRuntime.sessionId));
        }
        bindEnrichmentActions();
        Array.from(document.querySelectorAll(".historyAnalysisBtn")).forEach(btn => {
          btn.onclick = () => _reopenAnalysisFromHistory(btn.getAttribute("data-key"));
        });
        Array.from(document.querySelectorAll(".historyComparisonBtn")).forEach(btn => {
          btn.onclick = () => _reopenComparisonFromHistory(btn.getAttribute("data-pair-key"));
        });
        return;
      }

      if (step === 2){
        const d = state.data || {};
        const p = d.product || {};
        const compareCandidates = _getComparisonCandidates(state.key);
        const compareTarget = compareCandidates.find(item => String(item?.key || "") === String(state.compareTargetKey || "")) || compareCandidates[0] || null;
        const compareTargetKey = String(compareTarget?.key || "");
        const score = d?.vitascore;
        const baselineScore = d?.vitascore_breakdown?.pre_pattern_score ?? d?.vitascore_breakdown?.who_baseline?.score;
        const baselineScoreText = Number.isFinite(Number(baselineScore)) ? `${baselineScore}/100` : "-";
        const analysisState = String(d?.analysis_state || d?.meta?.analysis_state || "full_analysis").toLowerCase();
        const assessmentLabel = t("final_assessment");
        const assessmentSubline = t("final_vita_explainer");
        const quickReasons = quickReasonItems(d);
        const quickSignals = quickSignalItems(d);
        const quickVerdict = usageContextApplies(d) ? usageContextPrimaryLabel(d) : quickVerdictLabel(score);
        const tier = tierFromScore(score);
        const per100 = d?.vitascore_breakdown?.per_100?.inputs || {};
        const unit = d?.meta?.serving?.unit || (p?.quantity?.toLowerCase?.().includes("ml") ? "ml" : "g");
        const sugar = per100.sugar_g_per_100 ?? d?.nutrition_per_100?.sugar_g;
        const salt = per100.salt_g_per_100 ?? d?.nutrition_per_100?.salt_g;
        const sat = per100.saturated_fat_g_per_100 ?? d?.nutrition_per_100?.sat_fat_g;
        const prot = per100.protein_g_per_100 ?? d?.nutrition_per_100?.protein_g;

        app.innerHTML = `
          <div class="section">
            <div class="prodHead">
              ${p?.image_url ? `<img class="prodImg" src="${p.image_url}" alt="product"/>` : `<div class="prodImg"></div>`}
              <div class="prodMeta">
                <b>${p?.name || t("unknown_product")}</b>
                <span>${p?.brand ? p.brand + " | " : ""}${d?.vitascore_version || ""}</span>
              </div>
            </div>
            <div class="section" style="margin-top:12px;">
              <div class="sectionTitle">${t("quick_verdict_title")}</div>
              <div class="scoreWrap">
                <div>
                  <div class="mini">${assessmentLabel}</div>
                  <div class="scoreLine"><div class="score">${score ?? "-"}</div><div class="scoreMax">/100</div></div>
                  <div class="mini">${assessmentSubline}</div>
                  ${renderConfidenceSummary(d)}
                </div>
                <div class="tier" style="background:${tier.color}; border-color:${tier.border};">${tier.label}</div>
              </div>
              <div class="ok" style="margin-top:12px;"><b>${quickVerdict}</b></div>
              ${renderUsageContextBlock(d)}
              <div class="grid2">
                <div class="kv"><small>${t("baseline_score_label")}</small><b>${baselineScoreText}</b></div>
                <div class="kv"><small>${t("sugar")}</small><b>${fmtNum(sugar)} g/100${unit === "ml" ? "ml" : "g"}</b></div>
                <div class="kv"><small>${t("salt")}</small><b>${fmtNum(salt)} g/100${unit === "ml" ? "ml" : "g"}</b></div>
                <div class="kv"><small>${t("sat_fat")}</small><b>${fmtNum(sat)} g/100${unit === "ml" ? "ml" : "g"}</b></div>
                <div class="kv"><small>${t("protein")}</small><b>${fmtNum(prot)} g/100${unit === "ml" ? "ml" : "g"}</b></div>
              </div>
              ${quickReasons.length ? `<div class="whyFoot" style="margin-top:12px;"><b>${t("quick_reasons_title")}</b><br/>${quickReasons.map(item => `- ${_escapeHtml(item.message || "")}`).join("<br/>")}</div>` : ``}
              ${quickSignals.length ? `<div class="whyFoot" style="margin-top:12px;"><b>${t("quick_signals_title")}</b><br/>${quickSignals.map(item => `- ${_escapeHtml(item)}`).join("<br/>")}</div>` : ``}
              <div class="whyFoot" style="margin-top:10px;"><b>${t("baseline_score_label")}</b><br/>${t("baseline_score_explainer")}<br/>${t("final_vita_explainer")}</div>
              <div class="mini" style="margin-top:8px;">${t("quick_verdict_note")}</div>
              <div class="btns" style="margin-top:10px;">
                <button class="ghost" id="correctNutritionBtn">${t("correct_nutrition_values")}</button>
                ${d?.corrected_in_session ? `<button class="ghost" id="submitCorrectionFeedbackBtn">${t("submit_correction_feedback")}</button>` : ``}
              </div>
            </div>
            ${renderCorrectedSessionNotice(d)}
            ${renderFeedbackStatusNotice()}
            ${renderBetaNotice("result")}
            ${renderRefreshNotice()}
            ${renderPhotoExtractionNotice(d)}
            ${renderAllergenCard(d)}
            ${renderDietarySignalsCard(d)}
            ${renderEnrichmentBlock(d)}
            ${state.recoveryOpen ? renderManualEntryForm() : ``}
            <div class="section" style="margin-top:12px;">
              <div class="sectionTitle">${t("full_details_title")}</div>
              <div class="mini">${t("full_details_note")}</div>
              <div class="btns" style="margin-top:8px;">
                <button class="primary" id="nextBtn">${t("full_details_cta")}</button>
              </div>
            </div>
            <div class="section" style="margin-top:12px;">
              <div class="sectionTitle">${t("compare_title")}</div>
              ${compareCandidates.length ? `
                <div class="mini">${t("compare_with")}</div>
                <div class="btns" style="margin-top:8px;">
                  <select id="compareSelect" style="flex:1;">
                    ${compareCandidates.map(item => `<option value="${_escapeHtml(String(item?.key || ""))}" ${String(item?.key || "") === compareTargetKey ? "selected" : ""}>${_escapeHtml(String(item?.name || t("unknown_product")))}${item?.brand ? ` | ${_escapeHtml(String(item.brand))}` : ""}</option>`).join("")}
                  </select>
                  <button class="ghost" id="compareBtn">${t("compare_action")}</button>
                </div>
                ${compareTarget ? renderComparisonPanel(d, compareTarget.data) : ``}
              ` : `<div class="mini">${t("compare_none")}</div>`}
            </div>
            <div class="btns">
              <button class="ghost" id="backBtn">${t("back")}</button>
            </div>
          </div>
        `;
        ensureScoreExplanationRulesLoaded();
        const compareSelect = document.getElementById("compareSelect");
        const compareBtn = document.getElementById("compareBtn");
        const submitCorrectionFeedbackBtn = document.getElementById("submitCorrectionFeedbackBtn");
        bindEnrichmentActions();
        if (compareSelect){
          compareSelect.onchange = (e) => {
            state.compareTargetKey = String(e.target.value || "");
          };
        }
        if (compareBtn){
          compareBtn.onclick = () => {
            if (compareSelect) state.compareTargetKey = String(compareSelect.value || "");
            const targetEntry = compareCandidates.find(item => String(item?.key || "") === String(state.compareTargetKey || ""));
            if (targetEntry?.data){
              _storeComparisonHistory(d, targetEntry.data, state.key, targetEntry.key);
            }
            render();
          };
        }
        if (submitCorrectionFeedbackBtn){
          submitCorrectionFeedbackBtn.onclick = () => {
            submitCorrectionFeedback();
          };
        }
        document.getElementById("backBtn").onclick = () => { step = 1; render(); };
        document.getElementById("nextBtn").onclick = () => { step = 3; render(); };
        return;
      }

      if (step === 3){
        app.innerHTML = `
          <div class="section">
            <div class="sectionTitle">${t("full_details_title")}</div>
            <div class="mini">${t("full_details_note")}</div>
            ${renderDetailsScoreSummary(state.data || {})}
          </div>
          ${buildWhyScoreHTML(state.data || {})}
          ${whoServingBlock(state.data || {})}
          ${renderIngredientsIntel(state.data || {})}
        `;
        const eDetails = Array.isArray(state.data?.ingredients_intelligence?.e_number_details) ? state.data.ingredients_intelligence.e_number_details : [];
        if (eDetails.length){
          ensureENumberKnowledgeBaseLoaded();
        }
        ensureNutritionInsightRulesLoaded();
        const translateToggle = document.getElementById("translateIngredientsToggle");
        if (translateToggle){
          translateToggle.onchange = (e) => {
            const nextEnabled = !!e.target.checked;
            if (!nextEnabled){
              state.translateIngredients = false;
              localStorage.setItem("nf_ing_translate", "0");
              render();
              return;
            }
            state.translateIngredients = true;
            localStorage.setItem("nf_ing_translate", "1");
            render();
            ensureIngredientGlossaryLoaded().then(ok => {
              if (!ok){
                state.translateIngredients = false;
                localStorage.setItem("nf_ing_translate", "0");
                render();
                return;
              }
              render();
            });
          };
        }
        if (supportedLangs.includes(lang) && state.translateIngredients){
          ensureIngredientGlossaryLoaded().then(ok => {
            if (!ok){
              state.translateIngredients = false;
              localStorage.setItem("nf_ing_translate", "0");
              render();
            }
          });
        }
        document.getElementById("backBtn").onclick = () => { step = 2; render(); };
        document.getElementById("nextBtn").onclick = () => { step = 4; render(); };
        return;
      }

      if (step === 4){
        const d = state.data || {};
        const dq = d?.data_quality || {};
        const missingFields = Array.isArray(dq?.missing_core_fields)
          ? dq.missing_core_fields.map(localizedMissingFieldLabel).filter(Boolean)
          : [];
        const beverageValue = dq?.beverage_detection?.value === true
          ? t("yes")
          : (dq?.beverage_detection?.value === false ? t("no") : "-");
        app.innerHTML = `
          <div class="section">
            <div class="sectionTitle">${t("safety_title")}</div>
            ${renderSafetyAlertsPanel(d)}
            <div class="section" style="margin-top:12px;">
              <div class="sectionTitle">${t("data_quality")}</div>
              <div class="mini">
                ${t("data_quality_summary")}: <b>${localizedDataQualitySummary(d)}</b><br/>
                ${t("data_quality_source")}: <b>${localizedDataQualitySource(d)}</b><br/>
                ${t("has_serving")}: <b>${dq?.has_serving ? t("yes") : t("no")}</b>
              </div>
              <details style="margin-top:10px;">
                <summary class="mini" style="cursor:pointer;">${t("data_quality_more")}</summary>
                <div class="mini" style="margin-top:8px;">
                  ${t("confidence")}: <b>${dq?.confidence ?? "-"}</b><br/>
                  ${t("missing_fields")}: <b>${missingFields.length ? missingFields.join(", ") : "-"}</b><br/>
                  ${t("beverage")}: <b>${beverageValue}</b><br/>
                  ${t("signal")}: <b>${dq?.beverage_detection?.signal || "-"}</b>
                </div>
              </details>
            </div>
            <div class="btns">
              <button class="ghost" id="backBtn">${t("back")}</button>
              <button class="primary" id="againBtn">${t("scan_another")}</button>
            </div>
          </div>
        `;
        document.getElementById("backBtn").onclick = () => { step = 3; render(); };
        document.getElementById("againBtn").onclick = () => {
          step = 1;
          state.error = "";
          state.errorCode = "";
          state.data = null;
          state.scanStatusMessage = "";
          state.refreshNotice = null;
          state.compareTargetKey = "";
          state.recoveryOpen = false;
          state.recoveryPhotoMessage = "";
          state.photoForm = {
            ingredient_image_data_url:"",
            nutrition_image_data_url:"",
            ingredient_file_name:"",
            nutrition_file_name:"",
            ingredient_crop_applied:false,
            nutrition_crop_applied:false,
            ingredient_image_variant:"",
            nutrition_image_variant:"",
            ingredient_image_state_source:"",
            nutrition_image_state_source:"",
            ingredient_original_image_length:0,
            nutrition_original_image_length:0,
          };
          state.photoCapture = emptyPhotoCapture();
          render();
        };
      }
    }

    async function doScan(key){
      const nextKey = normalizeLookupKey(key);
      const requestId = beginAnalysisRequest();
      const startedAt = performance.now();
      const cachedResult = _findCachedScanResult(nextKey);
      state.key = nextKey;
      if (!state.key){
        state.error = t("err_enter_key");
        state.errorCode = "INVALID_BARCODE";
        state.scanStatusMessage = "";
        state.data = null;
        state.compareTargetKey = "";
        state.recoveryOpen = false;
        render();
        return;
      }
      if (!isSupportedLookupKey(state.key)){
        state.error = t("err_invalid_barcode");
        state.errorCode = "INVALID_BARCODE";
        state.scanStatusMessage = "";
        state.data = null;
        state.compareTargetKey = "";
        state.recoveryOpen = false;
        render();
        return;
      }
      if (_isUsableCachedScan(cachedResult)){
        state.loading = false;
        state.scanStatusMessage = "";
        state.error = "";
        state.errorCode = "";
        state.data = cachedResult;
        state.recoveryOpen = false;
        state.refreshNotice = null;
        state.recoveryPhotoMessage = "";
        if (!state.compareTargetKey){
          const nextCompare = _getComparisonCandidates(nextKey)[0] || null;
          state.compareTargetKey = String(nextCompare?.key || "");
        }
        step = 2;
        render();
        requestAnimationFrame(() => logScanPerformance(cachedResult, startedAt));
        void (async () => {
          try{
            const { res, data, stale } = await fetchStableScanResult(nextKey, requestId);
            if (stale || !isCurrentAnalysisRequest(requestId) || state.key !== nextKey) return;
            if (!res?.ok || data?.error || isPlaceholderScanResult(data)) return;
            if (!isFinalResolvedProductData(data)) return;
            state.data = data;
            state.error = "";
            state.errorCode = "";
            _storeRecentProduct(data, nextKey);
            _storeAnalysisHistory(data, nextKey);
            render();
            requestAnimationFrame(() => logScanPerformance(data, startedAt));
          }catch(_e){}
        })();
        return;
      }
      state.loading = true;
      state.scanStatusMessage = scanLoadingHint(false);
      state.error = "";
      state.errorCode = "";
      state.data = null;
      state.compareTargetKey = "";
      state.recoveryOpen = false;
      state.refreshNotice = null;
      state.recoveryPhotoMessage = "";
      state.photoForm = {
        ingredient_image_data_url:"",
        nutrition_image_data_url:"",
        ingredient_file_name:"",
        nutrition_file_name:"",
        ingredient_crop_applied:false,
        nutrition_crop_applied:false,
        ingredient_image_variant:"",
        nutrition_image_variant:"",
        ingredient_image_state_source:"",
        nutrition_image_state_source:"",
        ingredient_original_image_length:0,
        nutrition_original_image_length:0,
      };
      state.photoCapture = emptyPhotoCapture();
      state.photoForm = state.photoForm || {
        ingredient_image_data_url:"",
        nutrition_image_data_url:"",
        ingredient_file_name:"",
        nutrition_file_name:"",
        ingredient_crop_applied:false,
        nutrition_crop_applied:false,
        ingredient_image_variant:"",
        nutrition_image_variant:"",
        ingredient_image_state_source:"",
        nutrition_image_state_source:"",
        ingredient_original_image_length:0,
        nutrition_original_image_length:0,
      };
      render();
      try{
        const { res, data, stale } = await fetchStableScanResult(state.key, requestId);
        if (stale) return;
        if (!isCurrentAnalysisRequest(requestId) || state.key !== nextKey) return;
        if (isPlaceholderScanResult(data)){
          state.loading = false;
          state.scanStatusMessage = scanLoadingHint(true);
          state.data = null;
          render();
          return;
        }
        if (!res.ok || data?.error){
          state.error = localizeScanError(data, res.status);
          state.errorCode = scanErrorCode(data, res.status);
          state.data = null;
          state.loading = false;
          state.scanStatusMessage = "";
          state.recoveryOpen = isRecoverableScanFailure(state.errorCode);
          render();
          return;
        }
        if (!isFinalResolvedProductData(data)){
          state.data = data;
          state.error = "";
          state.errorCode = "";
          state.loading = false;
          state.scanStatusMessage = "";
          state.recoveryOpen = true;
          step = 1;
          render();
          requestAnimationFrame(() => logScanPerformance(data, startedAt));
          return;
        }
        state.data = data;
        state.errorCode = "";
        state.scanStatusMessage = "";
        state.recoveryOpen = false;
        state.recoveryPhotoMessage = "";
        _storeRecentProduct(data, state.key);
        _storeAnalysisHistory(data, state.key);
        if (!state.compareTargetKey){
          const nextCompare = _getComparisonCandidates(state.key)[0] || null;
          state.compareTargetKey = String(nextCompare?.key || "");
        }
        state.loading = false;
        step = 2;
        render();
        requestAnimationFrame(() => logScanPerformance(data, startedAt));
      }catch(e){
        if (!isCurrentAnalysisRequest(requestId) || state.key !== nextKey) return;
        state.error = t("err_network");
        state.errorCode = "";
        state.loading = false;
        state.scanStatusMessage = "";
        render();
      }
    }

    async function refreshCurrentDataForLanguage(){
      if (!state.key || !state.data) return;
      const requestId = beginAnalysisRequest();
      const currentKey = state.key;
      const preservedStep = step;
      try{
        const res = await fetch(`/scan/${encodeURIComponent(currentKey)}?lang=${lang}`);
        const data = await res.json().catch(()=> ({}));
        if (!isCurrentAnalysisRequest(requestId) || state.key !== currentKey) return;
        if (!res.ok || data?.error) throw new Error(localizeScanError(data, res.status));
        state.data = data;
        if (isFinalResolvedProductData(data)){
          _storeRecentProduct(data, currentKey);
        } else {
          state.recoveryOpen = true;
          step = 1;
        }
      }catch(e){
        if (!isCurrentAnalysisRequest(requestId) || state.key !== currentKey) return;
        console.warn(`[lang-switch] Failed to refresh data for ${lang}: ${e && e.message ? e.message : e}`);
      }finally{
        if (!isCurrentAnalysisRequest(requestId) || state.key !== currentKey) return;
        step = preservedStep;
        render();
      }
    }

    _registerUnknownIngredientDebugHelpers();

    if (langSel){
      syncLanguageSelector();
      langSel.onchange = (e) => {
        const next = String(e.target.value || "en").toLowerCase();
        const resolved = supportedLangs.includes(next) ? next : "en";
        if (resolved === lang){
          syncLanguageSelector();
          return;
        }
        lang = resolved;
        localStorage.setItem("nf_lang", lang);
        render();
        refreshCurrentDataForLanguage();
      };
    }

    render();
  </script>
</body>
</html>
