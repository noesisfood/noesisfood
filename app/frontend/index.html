<!doctype html>
<html lang="el">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>NoesisFood</title>
  <style>
    :root{
      --bg:#0b0f14; --card:#0f1622; --card2:#0c121c; --text:#e8eef7; --muted:#9fb0c3;
      --line:rgba(255,255,255,.08); --accent:#7bd4ff; --btn:#131c2a; --btn2:#1a2740;
      --shadow: 0 12px 40px rgba(0,0,0,.55);
      --r:18px;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial;
      background: radial-gradient(1200px 800px at 20% -10%, rgba(123,212,255,.14), transparent 60%),
                  radial-gradient(900px 700px at 80% 0%, rgba(110,255,190,.08), transparent 55%),
                  var(--bg);
      color:var(--text);
    }
    .wrap{max-width: 920px; margin: 0 auto; padding: 22px 16px 60px;}
    .top{display:flex; gap:14px; align-items:center; justify-content:space-between; margin-bottom: 16px;}
    .brand{display:flex; align-items:center; gap:10px;}
    .logo{
      width:42px; height:42px; border-radius:12px;
      background: linear-gradient(145deg, rgba(123,212,255,.95), rgba(110,255,190,.75));
      box-shadow: var(--shadow);
    }
    .title{display:flex; flex-direction:column; line-height:1.05;}
    .title b{font-size:18px}
    .title span{font-size:12px; color:var(--muted)}
    .step{font-size:12px; color:var(--muted); display:flex; align-items:center; gap:10px;}
    .topRight{display:flex; align-items:center; gap:10px;}
    .langSel{
      border-radius: 10px;
      border:1px solid rgba(255,255,255,.12);
      background: rgba(0,0,0,.18);
      color: var(--text);
      padding:6px 8px;
      font-size:12px;
      font-weight:700;
    }
    .bar{width:160px; height:8px; border-radius:999px; background: rgba(255,255,255,.08); overflow:hidden;}
    .bar > i{display:block; height:100%; width:0%; background: linear-gradient(90deg, rgba(123,212,255,.95), rgba(110,255,190,.9));}

    .card{
      background: linear-gradient(180deg, rgba(255,255,255,.03), rgba(255,255,255,.015));
      border:1px solid rgba(255,255,255,.08);
      border-radius: var(--r);
      box-shadow: var(--shadow);
      overflow:hidden;
    }
    .inner{padding:18px}
    .row{display:flex; gap:14px; flex-wrap:wrap}
    .col{flex:1 1 320px}
    .section{
      background: rgba(0,0,0,.18);
      border:1px solid rgba(255,255,255,.07);
      border-radius: 16px;
      padding:14px;
      margin-top: 12px;
    }
    .sectionTitle{font-weight:800; letter-spacing:.2px; margin-bottom: 10px;}
    .mini{font-size:12px;color:var(--muted);line-height:1.3}
    .btns{display:flex; gap:10px; flex-wrap:wrap; margin-top:12px}
    button{
      cursor:pointer;
      border:1px solid rgba(255,255,255,.10);
      background: linear-gradient(180deg, rgba(255,255,255,.04), rgba(255,255,255,.02));
      color:var(--text);
      padding:10px 12px;
      border-radius: 14px;
      font-weight:700;
    }
    button:hover{border-color: rgba(123,212,255,.35)}
    button.primary{
      background: linear-gradient(180deg, rgba(123,212,255,.32), rgba(123,212,255,.12));
      border-color: rgba(123,212,255,.35);
    }
    button.ghost{background: rgba(255,255,255,.02);}
    input{
      width:100%;
      border-radius: 14px;
      border:1px solid rgba(255,255,255,.10);
      background: rgba(0,0,0,.22);
      padding:12px 12px;
      color:var(--text);
      outline:none;
      font-size:14px;
    }
    input:focus{border-color: rgba(123,212,255,.45)}
    .pillRow{display:flex; gap:8px; flex-wrap:wrap; margin-top:10px}
    .pill{
      font-size:12px;
      padding:6px 10px;
      border-radius: 999px;
      border:1px solid rgba(255,255,255,.10);
      background: rgba(255,255,255,.04);
      color: rgba(232,238,247,.92);
    }
    .pill.good{border-color: rgba(110,255,190,.35); background: rgba(110,255,190,.10)}
    .pill.warn{border-color: rgba(255,210,110,.35); background: rgba(255,210,110,.10)}
    .pill.bad{border-color: rgba(255,120,120,.35); background: rgba(255,120,120,.10)}

    .err{
      background: rgba(255,60,60,.08);
      border:1px solid rgba(255,60,60,.24);
      color: rgba(255,210,210,.95);
      padding:10px 12px;
      border-radius: 14px;
      font-size:13px;
      margin-top: 10px;
    }
    .ok{
      background: rgba(110,255,190,.08);
      border:1px solid rgba(110,255,190,.22);
      color: rgba(210,255,235,.95);
      padding:10px 12px;
      border-radius: 14px;
      font-size:13px;
      margin-top: 10px;
    }

    .prodHead{display:flex; gap:12px; align-items:center;}
    .prodImg{
      width:72px; height:72px; border-radius: 16px;
      background: rgba(255,255,255,.05);
      border:1px solid rgba(255,255,255,.08);
      object-fit: cover;
      flex:0 0 auto;
    }
    .prodMeta b{display:block; font-size:16px}
    .prodMeta span{display:block; color:var(--muted); font-size:12px; margin-top:2px}

    .scoreWrap{display:flex; align-items:center; justify-content:space-between; gap:12px}
    .score{font-size:42px; font-weight:900; letter-spacing:-.8px;}
    .scoreLine{display:flex; align-items:baseline; gap:8px;}
    .scoreMax{font-size:18px; font-weight:900; letter-spacing:-.2px; color:rgba(159,176,195,.95);}
    .tier{
      font-size:12px; font-weight:800;
      padding:6px 10px; border-radius:999px;
      border:1px solid rgba(255,255,255,.10);
    }

    .grid2{display:grid; grid-template-columns: 1fr 1fr; gap:10px; margin-top:10px}
    .kv{
      padding:10px 10px;
      background: rgba(255,255,255,.03);
      border:1px solid rgba(255,255,255,.08);
      border-radius: 14px;
    }
    .kv small{display:block; color:var(--muted); font-size:11px}
    .kv b{display:block; margin-top:4px; font-size:13px}

    .whyGrid{display:grid; grid-template-columns: 1fr; gap:8px;}
    .whyRow{
      padding:10px 10px;
      background: rgba(255,255,255,.03);
      border:1px solid rgba(255,255,255,.08);
      border-radius: 14px;
      display:flex;
      justify-content:space-between;
      gap:10px;
      font-size:13px;
    }
    .whyRow span{color: rgba(232,238,247,.92); font-weight:800}

    .whyFoot{margin-top:10px; font-size:12px; color:var(--muted); line-height:1.35;}

    /* Ingredients UI */
    .split{display:grid; grid-template-columns: 1.1fr .9fr; gap:12px;}
    @media (max-width: 820px){ .split{grid-template-columns: 1fr;} }

    .box{
      background: rgba(255,255,255,.03);
      border:1px solid rgba(255,255,255,.08);
      border-radius: 14px;
      padding:12px;
    }

    .eRow{
      display:flex; justify-content:space-between; gap:10px;
      padding:10px 10px;
      border-radius: 12px;
      border:1px solid rgba(255,255,255,.08);
      background: rgba(0,0,0,.16);
      margin-top:8px;
    }
    .eLeft b{display:block; font-size:13px}
    .eLeft small{display:block; font-size:11px; color:var(--muted); margin-top:3px; line-height:1.35}
    .eRole{font-size:11px; font-weight:900; opacity:.9; align-self:flex-start}

    .ingItem{
      display:flex; justify-content:space-between; gap:10px;
      padding:10px 10px;
      border-radius: 12px;
      border:1px solid rgba(255,255,255,.08);
      background: rgba(0,0,0,.14);
      margin-top:8px;
    }
    .ingLeft b{display:block; font-size:13px}
    .ingLeft small{display:block; font-size:11px; color:var(--muted); margin-top:3px}
    .risk{font-size:11px; font-weight:900; padding:6px 10px; border-radius:999px; border:1px solid rgba(255,255,255,.10);}
    .risk.low{border-color: rgba(110,255,190,.35); background: rgba(110,255,190,.08)}
    .risk.medium{border-color: rgba(255,210,110,.35); background: rgba(255,210,110,.08)}
    .risk.high{border-color: rgba(255,120,120,.35); background: rgba(255,120,120,.08)}

    .groupTitle{
      margin-top:14px;
      font-weight:900;
      font-size:12px;
      letter-spacing:.2px;
      color: rgba(232,238,247,.92);
      opacity:.92;
    }
    .step.hidden{display:none}
    .homeLayout{display:flex; flex-direction:column; gap:14px}
    .scanHero{
      padding:18px;
      background:
        linear-gradient(180deg, rgba(123,212,255,.10), rgba(255,255,255,.02)),
        rgba(0,0,0,.18);
      border:1px solid rgba(123,212,255,.16);
      border-radius: 18px;
    }
    .homeTitle{
      font-size: 28px;
      line-height: 1.05;
      font-weight: 900;
      letter-spacing: -.02em;
      margin: 0;
    }
    .homeSubtitle{
      margin-top: 8px;
      max-width: 34rem;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.4;
    }
    .homeActions{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      margin-top:16px;
    }
    .actionButton{
      min-height: 48px;
      padding: 12px 16px;
      border-radius: 14px;
    }
    .actionButton.primary{
      min-width: 210px;
    }
    .homeInputBlock{
      margin-top:16px;
      display:flex;
      flex-direction:column;
      gap:10px;
    }
    .inputLabel{
      font-size:12px;
      font-weight:800;
      color:rgba(232,238,247,.92);
    }
    .homeInputRow{
      display:grid;
      grid-template-columns: minmax(0, 1fr);
      gap:10px;
    }
    .homeInputRow input{
      min-height:50px;
      font-size:16px;
    }
    .helperText{
      font-size:12px;
      line-height:1.45;
      color:var(--muted);
    }
    .secondaryZone{
      display:grid;
      grid-template-columns: minmax(0, 1fr);
      gap:12px;
    }
    .secondarySection{
      background: rgba(0,0,0,.12);
      border:1px solid rgba(255,255,255,.06);
      border-radius: 16px;
      padding:14px;
    }
    .secondarySection .sectionTitle{
      margin-bottom:8px;
    }
    .secondarySection.full{
      grid-column: 1 / -1;
    }
    .historyStack{
      display:flex;
      flex-direction:column;
      gap:10px;
    }
    .historyEntry{
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:10px;
      padding:12px;
      border-radius:14px;
      background: rgba(255,255,255,.03);
      border:1px solid rgba(255,255,255,.07);
    }
    .historyEntryMeta{
      min-width:0;
    }
    .historyEntryMeta b,
    .historyEntryMeta small{
      display:block;
    }
    .historyEntryMeta b{
      font-size:13px;
      line-height:1.35;
    }
    .historyEntryMeta small{
      margin-top:3px;
      color:var(--muted);
      line-height:1.35;
    }
    .historyAction{
      white-space:nowrap;
      align-self:center;
    }
    details.homeHow{
      padding:0;
    }
    details.homeHow summary{
      list-style:none;
      cursor:pointer;
      font-weight:800;
    }
    details.homeHow summary::-webkit-details-marker{display:none}
    details.homeHow[open] summary{
      margin-bottom:10px;
    }
    .howBullets{
      margin:0;
      padding-left:18px;
      color:var(--muted);
      font-size:13px;
      line-height:1.45;
    }
    .scannerOverlay{
      position:fixed;
      inset:0;
      z-index:1000;
      background: rgba(4, 8, 14, .86);
      display:flex;
      align-items:flex-end;
      justify-content:center;
      padding:12px;
      backdrop-filter: blur(10px);
    }
    .scannerSheet{
      width:min(100%, 680px);
      background: linear-gradient(180deg, rgba(16,23,35,.98), rgba(10,15,24,.98));
      border:1px solid rgba(255,255,255,.10);
      border-radius: 22px;
      box-shadow: var(--shadow);
      overflow:hidden;
    }
    .scannerSheetInner{
      padding:16px;
      display:flex;
      flex-direction:column;
      gap:12px;
    }
    .scannerSheetHead{
      display:flex;
      justify-content:space-between;
      align-items:flex-start;
      gap:12px;
    }
    .scannerViewport{
      position:relative;
      min-height:280px;
      border-radius:18px;
      overflow:hidden;
      background:
        radial-gradient(circle at top, rgba(123,212,255,.14), transparent 55%),
        rgba(0,0,0,.40);
      border:1px solid rgba(255,255,255,.08);
    }
    .scannerViewport video{
      width:100%;
      height:100%;
      min-height:280px;
      object-fit:cover;
      display:block;
      background:#05080d;
    }
    .scannerFrame{
      position:absolute;
      inset:16% 10%;
      border:2px solid rgba(123,212,255,.95);
      border-radius:18px;
      box-shadow: 0 0 0 999px rgba(0,0,0,.28);
      pointer-events:none;
    }
    .scannerFrame::after{
      content:"";
      position:absolute;
      inset:10px;
      border:1px dashed rgba(255,255,255,.55);
      border-radius:12px;
    }
    .scannerStatus{
      position:absolute;
      left:12px;
      right:12px;
      bottom:12px;
      padding:10px 12px;
      border-radius:14px;
      background: rgba(3,8,14,.74);
      border:1px solid rgba(255,255,255,.10);
      font-size:13px;
      line-height:1.4;
    }
    .scannerStatus.error{
      color: rgba(255,210,210,.95);
      border-color: rgba(255,60,60,.24);
      background: rgba(90,10,18,.68);
    }
    .scannerStatus.success{
      color: rgba(210,255,235,.96);
      border-color: rgba(110,255,190,.30);
      background: rgba(10,62,42,.68);
    }
    .scannerActions{
      display:flex;
      flex-wrap:wrap;
      gap:10px;
    }
    .scannerActions button{
      flex:1 1 180px;
      min-height:46px;
    }
    @media (min-width: 720px){
      .homeInputRow{
        grid-template-columns: minmax(0, 1fr) auto;
      }
      .secondaryZone{
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }
    @media (max-width: 720px){
      .wrap{padding:16px 12px 40px;}
      .top{margin-bottom:12px;}
      .title b{font-size:17px}
      .scanHero{padding:16px}
      .homeTitle{font-size:24px}
      .scannerOverlay{padding:0}
      .scannerSheet{
        width:100%;
        border-radius:22px 22px 0 0;
      }
      .scannerSheetInner{padding:14px}
      .scannerViewport,
      .scannerViewport video{min-height:340px}
    }
  </style>
</head>

    function pickInitialLang(){
      const saved = localStorage.getItem("nf_lang");
      if (saved && supportedLangs.includes(saved)) return saved;
      const browser = String(navigator.language || "en").toLowerCase().slice(0, 2);
      return supportedLangs.includes(browser) ? browser : "en";
    }

    function pickInitialIngredientTranslate(){
      return localStorage.getItem("nf_ing_translate") === "1";
    }

    let lang = pickInitialLang();
    state.translateIngredients = pickInitialIngredientTranslate();

    const app = document.getElementById("app");
    const stepTxt = document.getElementById("stepTxt");
    const barFill = document.getElementById("barFill");
    const langSel = document.getElementById("langSel");
    const titleMeta = document.querySelector(".title span");
    const stepEl = document.querySelector(".step");
    const scannerRuntime = {
      stream: null,
      detector: null,
      rafId: 0,
      sessionId: 0,
      stableCode: "",
      stableFormat: "",
      stableFrames: 0,
      instabilityScore: 0,
      unstableMode: false,
      lockedCode: "",
      lastCandidateLogKey: ""
    };

    function t(key){
      return i18n[lang]?.[key] || i18n.en[key] || key;
    }

    function updateScannerState(next){
      state.scanner = Object.assign({}, state.scanner || {}, next || {});
    }

    function _stopScannerLoop(){
      if (scannerRuntime.rafId){
        cancelAnimationFrame(scannerRuntime.rafId);
        scannerRuntime.rafId = 0;
      }
    }

    function _stopScannerStream(){
      if (scannerRuntime.stream){
        Array.from(scannerRuntime.stream.getTracks?.() || []).forEach(track => track.stop());
        scannerRuntime.stream = null;
      }
    }

    function closeScanner(opts = {}){
      scannerRuntime.sessionId += 1;
      _stopScannerLoop();
      _stopScannerStream();
      scannerRuntime.detector = null;
      scannerRuntime.stableCode = "";
      scannerRuntime.stableFormat = "";
      scannerRuntime.stableFrames = 0;
      scannerRuntime.instabilityScore = 0;
      scannerRuntime.unstableMode = false;
      scannerRuntime.lockedCode = "";
      scannerRuntime.lastCandidateLogKey = "";
      updateScannerState({
        open:false,
        opening:false,
        error:"",
        success:false,
        detectedCode:"",
        candidateCode:"",
        candidateFormat:"",
        stableFrames:0,
        unstable:false
      });
      if (!opts.skipRender) render();
      if (opts.focusInput){
        requestAnimationFrame(() => {
          const input = document.getElementById("keyInput");
          if (input){
            input.focus();
            input.select?.();
          }
        });
      }
    }

    function focusManualEntry(){
      if (state.scanner?.open){
        closeScanner({ focusInput:true });
        return;
      }
      requestAnimationFrame(() => {
        const input = document.getElementById("keyInput");
        if (input){
          input.focus();
          input.select?.();
        }
      });
    }

    async function _attachScannerStream(sessionId){
      const video = document.getElementById("scannerVideo");
      if (!video || sessionId !== scannerRuntime.sessionId || !scannerRuntime.stream) return;
      try{
        video.srcObject = scannerRuntime.stream;
        await video.play?.();
      }catch(_e){}
    }

    function _preferredScannerFormatWeight(format){
      const normalized = String(format || "").trim().toLowerCase();
      if (normalized === "ean_13") return 500;
      if (normalized === "upc_a") return 450;
      if (normalized === "ean_8") return 400;
      if (normalized === "upc_e") return 350;
      if (normalized === "code_128") return 200;
      return 0;
    }

    function _normalizeScannerCandidate(detection){
      const rawValue = normalizeLookupKey(detection?.rawValue || "");
      const format = String(detection?.format || "").trim().toLowerCase();
      if (!rawValue || !/^\d+$/.test(rawValue)) return null;
      if (![8, 12, 13, 14].includes(rawValue.length)) return null;
      return {
        rawValue: String(detection?.rawValue || ""),
        normalized: rawValue,
        format,
        formatWeight: _preferredScannerFormatWeight(format)
      };
    }

    function _selectScannerCandidate(detections){
      const rawDetections = Array.from(detections || []).map(item => ({
        rawValue: String(item?.rawValue || ""),
        format: String(item?.format || "").trim().toLowerCase()
      }));
      const candidates = Array.from(detections || [])
        .map(_normalizeScannerCandidate)
        .filter(Boolean)
        .sort((left, right) => {
          if ((right?.formatWeight || 0) !== (left?.formatWeight || 0)) return (right?.formatWeight || 0) - (left?.formatWeight || 0);
          return String(right?.normalized || "").length - String(left?.normalized || "").length;
        });
      return {
        rawDetections,
        selected: candidates[0] || null,
        candidates
      };
    }

    function _logScannerCandidate(eventName, payload){
      try{
        console.info(`[scanner-${eventName}]`, payload);
      }catch(_e){}
    }

    function _scannerStatusClass(){
      if (state.scanner?.error) return "scannerStatus error";
      if (state.scanner?.success) return "scannerStatus success";
      return "scannerStatus";
    }

    function _scannerStatusText(){
      if (state.scanner?.error) return state.scanner.error;
      if (state.scanner?.success) return `${t("scanner_success")} ${state.scanner?.detectedCode || ""}`.trim();
      if (state.scanner?.candidateCode) return `${t("scanner_confirming")} ${state.scanner.candidateCode}`.trim();
      if (state.scanner?.opening) return t("scanner_loading");
      return t("scanner_helper");
    }

    function _scannerGuidanceText(){
      if (state.scanner?.unstable) return t("scanner_unstable_guidance");
      return t("scanner_helper");
    }

    function _scannerRequiredStableFrames(){
      return scannerRuntime.unstableMode ? 5 : 3;
    }

    async function _scanFrameLoop(sessionId){
      if (sessionId !== scannerRuntime.sessionId || !state.scanner?.open || !scannerRuntime.detector) return;
      if (scannerRuntime.lockedCode) return;
      const video = document.getElementById("scannerVideo");
      if (video && video.readyState >= 2){
        try{
          const detections = await scannerRuntime.detector.detect(video);
          const selection = _selectScannerCandidate(detections);
          const selected = selection.selected;
          const distinctCandidateCount = new Set(selection.candidates.map(item => item.normalized)).size;
          if (selected){
            const switchedCandidate = Boolean(scannerRuntime.stableCode) && scannerRuntime.stableCode !== selected.normalized;
            const multiCandidateFrame = distinctCandidateCount > 1;
            if (switchedCandidate || multiCandidateFrame){
              scannerRuntime.instabilityScore = Math.min(scannerRuntime.instabilityScore + 1, 6);
            } else if (scannerRuntime.instabilityScore > 0){
              scannerRuntime.instabilityScore -= 1;
            }
            scannerRuntime.unstableMode = scannerRuntime.instabilityScore >= 2;
            const requiredStableFrames = _scannerRequiredStableFrames();
            const logKey = `${selected.normalized}::${selected.format}`;
            if (scannerRuntime.lastCandidateLogKey !== logKey){
              scannerRuntime.lastCandidateLogKey = logKey;
              _logScannerCandidate("candidate", {
                raw_candidates: selection.rawDetections.map(item => ({
                  raw_value: item.rawValue,
                  format: item.format,
                  confidence: null
                })),
                normalized_candidates: selection.candidates.map(item => ({
                  raw_value: item.rawValue,
                  normalized: item.normalized,
                  format: item.format,
                  confidence: null
                })),
                selected_candidate: selected.rawValue,
                selected_format: selected.format,
                normalized_barcode: selected.normalized,
                distinct_candidate_count: distinctCandidateCount,
                unstable_mode: scannerRuntime.unstableMode,
                stability_threshold: requiredStableFrames
              });
            }
            if (scannerRuntime.stableCode === selected.normalized){
              scannerRuntime.stableFrames += 1;
            } else {
              scannerRuntime.stableCode = selected.normalized;
              scannerRuntime.stableFormat = selected.format;
              scannerRuntime.stableFrames = 1;
            }
            updateScannerState({
              success:false,
              error:"",
              opening:false,
              detectedCode:"",
              candidateCode: scannerRuntime.stableCode,
              candidateFormat: scannerRuntime.stableFormat,
              stableFrames: scannerRuntime.stableFrames,
              unstable: scannerRuntime.unstableMode
            });
            if (scannerRuntime.stableFrames >= requiredStableFrames){
              const lookupBarcode = scannerRuntime.stableCode;
              scannerRuntime.lockedCode = lookupBarcode;
              updateScannerState({
                success:true,
                error:"",
                opening:false,
                detectedCode:lookupBarcode,
                candidateCode:lookupBarcode,
                candidateFormat:scannerRuntime.stableFormat,
                stableFrames:scannerRuntime.stableFrames,
                unstable:scannerRuntime.unstableMode
              });
              state.key = lookupBarcode;
              _logScannerCandidate("lock", {
                selected_candidate: selected.rawValue,
                selected_format: selected.format,
                normalized_barcode: selected.normalized,
                final_lookup_barcode: lookupBarcode,
                stable_frames: scannerRuntime.stableFrames,
                stability_threshold: requiredStableFrames,
                unstable_mode: scannerRuntime.unstableMode,
                confidence: null
              });
              render();
              window.setTimeout(() => {
                if (sessionId !== scannerRuntime.sessionId) return;
                closeScanner({ skipRender:true });
                doScan(lookupBarcode);
              }, 260);
              return;
            }
            render();
          } else if (scannerRuntime.stableFrames || state.scanner?.candidateCode){
            scannerRuntime.stableCode = "";
            scannerRuntime.stableFormat = "";
            scannerRuntime.stableFrames = 0;
            if (scannerRuntime.instabilityScore > 0) scannerRuntime.instabilityScore -= 1;
            scannerRuntime.unstableMode = scannerRuntime.instabilityScore >= 2;
            updateScannerState({
              success:false,
              error:"",
              opening:false,
              detectedCode:"",
              candidateCode:"",
              candidateFormat:"",
              stableFrames:0,
              unstable:scannerRuntime.unstableMode
            });
            render();
          }
        }catch(_e){}
      }
      scannerRuntime.rafId = requestAnimationFrame(() => _scanFrameLoop(sessionId));
    }

    async function openScanner(){
      closeScanner({ skipRender:true });
      updateScannerState({ open:true, opening:true, error:"", success:false, detectedCode:"", candidateCode:"", candidateFormat:"", stableFrames:0, unstable:false });
      render();
      const sessionId = scannerRuntime.sessionId;
      if (!navigator.mediaDevices?.getUserMedia || typeof window.BarcodeDetector === "undefined"){
        updateScannerState({ opening:false, error:t("scanner_permission_error") });
        render();
        return;
      }
      try{
        const supportedFormats = typeof window.BarcodeDetector.getSupportedFormats === "function"
          ? await window.BarcodeDetector.getSupportedFormats()
          : [];
        const preferredFormats = ["ean_13", "ean_8", "upc_a", "upc_e", "code_128"];
        const usableFormats = preferredFormats.filter(format => supportedFormats.includes(format));
        scannerRuntime.detector = usableFormats.length
          ? new window.BarcodeDetector({ formats: usableFormats })
          : new window.BarcodeDetector();
        scannerRuntime.stream = await navigator.mediaDevices.getUserMedia({
          audio:false,
          video:{
            facingMode:{ ideal:"environment" },
            width:{ ideal:1280 },
            height:{ ideal:720 }
          }
        });
        if (sessionId !== scannerRuntime.sessionId || !state.scanner?.open){
          closeScanner({ skipRender:true });
          return;
        }
        updateScannerState({ opening:false, error:"", success:false });
        render();
        await _attachScannerStream(sessionId);
        _scanFrameLoop(sessionId);
      }catch(_e){
        _stopScannerStream();
        scannerRuntime.detector = null;
        if (sessionId !== scannerRuntime.sessionId) return;
        updateScannerState({ opening:false, error:t("scanner_permission_error"), success:false });
        render();
      }
    }

        return "The product data is still being finalized. Please try again in a moment.";
      }
      if (lang === "el") return "\u0393\u03af\u03bd\u03b5\u03c4\u03b1\u03b9 \u03b1\u03bd\u03ac\u03ba\u03c4\u03b7\u03c3\u03b7 \u03ba\u03b1\u03b9 \u03ba\u03b1\u03bd\u03bf\u03bd\u03b9\u03ba\u03bf\u03c0\u03bf\u03af\u03b7\u03c3\u03b7 \u03c3\u03c4\u03bf\u03b9\u03c7\u03b5\u03af\u03c9\u03bd...";
      if (lang === "de") return "Produktdaten werden abgerufen und normalisiert...";
      if (lang === "fr") return "R\u00e9cup\u00e9ration et normalisation des donn\u00e9es produit...";
      return "Retrieving and normalizing product data...";
    }

    function beginAnalysisRequest(){
      latestAnalysisRequestId += 1;
      return latestAnalysisRequestId;
    }

    function isCurrentAnalysisRequest(requestId){
      return Number(requestId) === Number(latestAnalysisRequestId);
    }

    function normalizeLookupKey(value){
      return String(value || "").trim().replace(/\s+/g, "");
    }

    function hasRenderableProductIdentity(data){
      const product = data?.product || {};
      const name = String(product?.name || "").trim();
      const unknowns = [
        String(i18n.en?.unknown_product || "Unknown Product").trim().toLowerCase(),
        String(i18n.el?.unknown_product || "").trim().toLowerCase(),
        String(i18n.de?.unknown_product || "").trim().toLowerCase(),
        String(i18n.fr?.unknown_product || "").trim().toLowerCase()
      ].filter(Boolean);
      if (name && !unknowns.includes(name.toLowerCase())) return true;
      if (String(product?.brand || "").trim()) return true;
      if (String(product?.image_url || "").trim()) return true;
      return false;
    }

    function hasRenderableNutrition(data){
      const nutrition = data?.nutrition_per_100 || {};
      return ["sugar_g", "salt_g", "sat_fat_g", "protein_g", "energy_kcal"].some(key => Number.isFinite(Number(nutrition?.[key])));
    }

    function getScanResolutionState(data){
      const explicit = String(data?.scan_resolution_state || data?.meta?.scan_resolution_state || "").trim().toLowerCase();
      if (explicit) return explicit;
      const lookupState = String(data?.lookup_state || data?.meta?.lookup_state || "").toLowerCase();
      const analysisState = String(data?.analysis_state || data?.meta?.analysis_state || "").toLowerCase();
      const hasIdentity = hasRenderableProductIdentity(data);
      const hasNutrition = hasRenderableNutrition(data);
      const hasStableResult = lookupState === "found_and_analyzable" || analysisState === "full_analysis" || analysisState === "partial_analysis";
      if (hasIdentity && (hasNutrition || hasStableResult) && analysisState !== "insufficient_data") return "final_resolved_product";
      if (analysisState === "limited_estimate" && !hasIdentity && !hasNutrition) return "fallback_estimate_only";
      if (lookupState === "found_but_incomplete" || lookupState === "not_found" || analysisState === "insufficient_data" || !hasIdentity) return "unresolved_scan";
      return "fallback_estimate_only";
    }

    function isFinalResolvedProductData(data){
      return getScanResolutionState(data) === "final_resolved_product";
    }

    function isPlaceholderScanResult(data){
      if (!data || typeof data !== "object") return false;
      const lookupState = String(data?.lookup_state || data?.meta?.lookup_state || "").toLowerCase();
      const source = String(data?.source || "").toLowerCase();
      if (lookupState !== "found_but_incomplete") return false;
      if (source !== "openfoodfacts") return false;
      if (hasRenderableProductIdentity(data)) return false;
      const nutrition = data?.nutrition_per_100 || {};
      const hasNutrition = ["sugar_g", "salt_g", "sat_fat_g", "protein_g", "energy_kcal"].some(key => nutrition?.[key] !== null && nutrition?.[key] !== undefined);
      const hasIngredients = Array.isArray(data?.ingredients) && data.ingredients.length > 0;
      return !hasNutrition && !hasIngredients;
    }

    function wait(ms){
      return new Promise(resolve => setTimeout(resolve, ms));
    }

    async function fetchStableScanResult(key, requestId){
      const delays = [0, 350, 700];
      let lastRes = null;
      let lastData = null;
      for (let attempt = 0; attempt < delays.length; attempt += 1){
        if (attempt > 0){
          state.scanStatusMessage = scanLoadingHint(false);
          render();
          await wait(delays[attempt]);
        }
        const res = await fetch(`/scan/${encodeURIComponent(key)}?lang=${lang}`);
        const data = await res.json().catch(()=> ({}));
        if (!isCurrentAnalysisRequest(requestId) || state.key !== key) return { stale: true };
        lastRes = res;
        lastData = data;
        if (!res.ok || data?.error || !isPlaceholderScanResult(data)) break;
      }
      return { res: lastRes, data: lastData };
    }

    function logScanPerformance(data, startedAt){
      const totalMs = Math.round(performance.now() - Number(startedAt || performance.now()));
      const perfMeta = data?.meta?.performance || {};
      const summary = {
        barcode: state.key,
        total_frontend_ms: totalMs,
        route_total_ms: Number(perfMeta?.route_total_ms || 0),
        scan_total_ms: Number(perfMeta?.total_ms || 0),
        local_data_load_ms: Number(perfMeta?.local_data_load_ms || 0),
        openfoodfacts_fetch_ms: Number(perfMeta?.openfoodfacts_fetch_ms || 0),
        normalize_ms: Number(perfMeta?.normalize_ms || 0),
        analysis_ms: Number(perfMeta?.analysis_ms || 0),
        cache_hit: !!perfMeta?.cache_hit,
        lookup_source: String(perfMeta?.lookup_source || ""),
      };
      try{
        console.info("[scan-perf]", summary);
      }catch(_e){}
    }

    function isSupportedLookupKey(value){
      const key = normalizeLookupKey(value);
      if (!key) return false;
      if (/^\d+$/.test(key)) return [8, 12, 13, 14].includes(key.length);
      return /^[A-Za-z0-9][A-Za-z0-9._-]{1,63}$/.test(key);
    }

    function localizeScanError(data, status){
      const code = String(data?.error_code || "").toUpperCase();
      const rawError = String(data?.error || "").trim();
      const lookupState = String(data?.lookup_state || data?.meta?.lookup_state || "").toLowerCase();
      const analysisState = String(data?.analysis_state || data?.meta?.analysis_state || "").toLowerCase();
      if (code === "INVALID_BARCODE" || status === 400) return t("err_invalid_barcode");
      if (code === "PRODUCT_NOT_FOUND" || status === 404) return t("err_not_found");
      if (code === "PHOTO_EXTRACTION_UNAVAILABLE" || code === "PHOTO_EXTRACTION_FAILED") return `${t("err_photo_extract")} ${t("err_photo_retry")}`;
      if (code === "MISSING_KEY_DATA" && lookupState === "found_but_incomplete" && analysisState === "insufficient_data") return t("err_found_incomplete");
      if (code === "MISSING_KEY_DATA") return t("err_missing_data");
      if (lookupState === "found_but_incomplete" && analysisState === "insufficient_data") return t("err_found_incomplete");
      if (code === "ANALYSIS_UNAVAILABLE" || status === 422 || status === 502) return t("err_unanalyzable");
      if (/internal server error/i.test(rawError)) return t("err_unanalyzable");
      if (/product not found/i.test(rawError)) return t("err_not_found");
      if (/missing product id|invalid barcode|empty barcode/i.test(rawError)) return t("err_invalid_barcode");
      return rawError || t("err_unanalyzable");
    }

    function scanErrorCode(data, status){
      const code = String(data?.error_code || "").toUpperCase();
      const lookupState = String(data?.lookup_state || data?.meta?.lookup_state || "").toLowerCase();
      const analysisState = String(data?.analysis_state || data?.meta?.analysis_state || "").toLowerCase();
      if (code) return code;
      if (lookupState === "found_but_incomplete" && analysisState === "insufficient_data") return "MISSING_KEY_DATA";
      if (status === 400) return "INVALID_BARCODE";
      if (status === 404) return "PRODUCT_NOT_FOUND";
      if (status === 422) return "ANALYSIS_UNAVAILABLE";
      if (status === 502) return "ANALYSIS_UNAVAILABLE";
      return "";
    }

    function isRecoverableScanFailure(code){
      return ["PRODUCT_NOT_FOUND", "MISSING_KEY_DATA", "ANALYSIS_UNAVAILABLE"].includes(String(code || "").toUpperCase());
    }

    function renderRecoveryBlock(){
      if (!isRecoverableScanFailure(state.errorCode)) return "";
      const recoveryLead = state.errorCode === "PRODUCT_NOT_FOUND"
        ? t("fallback_not_found")

      return `

      const analysisState = String(data?.analysis_state || data?.meta?.analysis_state || "").toLowerCase();

      if (key === "full_analysis") return t("full_analysis");

      if (key === "limited_estimate") return t("limited_estimate_state");

      return value || "-";
    }

    function localizedConfidenceTier(value){
      const key = String(value || "").toLowerCase();
      if (key === "high") return t("confidence_high");
      if (key === "medium") return t("confidence_medium");
      if (key === "low") return t("confidence_low");
      return value || "-";
    }

    function renderAnalysisStateNotice(data){
      const analysisState = String(data?.analysis_state || data?.meta?.analysis_state || "").toLowerCase();
      if (analysisState !== "partial_analysis" && analysisState !== "limited_estimate") return "";
      const confidenceTier = localizedConfidenceTier(data?.analysis_confidence || data?.meta?.analysis_confidence || "");
      const missing = Array.isArray(data?.lookup_missing_fields)

    async function doManualAnalysis(){
      const requestId = beginAnalysisRequest();
      state.manualForm = readManualForm();
      state.loading = true;
      state.scanStatusMessage = "";
      state.error = "";
      state.refreshNotice = null;
      render();
      try{
        const res = await fetch(`/scan/manual?lang=${lang}`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(state.manualForm),
        });
        const data = await res.json().catch(()=> ({}));
        if (!isCurrentAnalysisRequest(requestId)) return;
        if (!res.ok || data?.error){
          state.error = localizeScanError(data, res.status);
          state.errorCode = scanErrorCode(data, res.status);
          state.loading = false;
          state.recoveryOpen = true;
          render();
          return;
        }
        state.data = data;
        state.error = "";
        state.errorCode = "";
        state.loading = false;
        _storeRecentProduct(data, data?.key || "manual:entry");
        _storeAnalysisHistory(data, data?.key || "manual:entry");
        step = 2;
        render();
      }catch(_e){
        if (!isCurrentAnalysisRequest(requestId)) return;
        state.error = t("err_network");
        state.loading = false;
        render();
      }
    }

    function localizedSafetySeverity(value){

      if (key === "low") return t("safety_severity_low");
      return t("safety_severity_medium");

    function localizedSafetyConfidence(value){
      const key = String(value || "").toLowerCase();
      if (key === "high") return t("safety_confidence_high");
      if (key === "low") return t("safety_severity_low");
      if (key === "conditional") return t("safety_confidence_conditional");
      return t("safety_confidence_medium");

    function readFileAsDataUrl(file){
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(String(reader.result || ""));
        reader.onerror = () => reject(new Error("file_read_failed"));
        reader.readAsDataURL(file);
      });
    }

    async function doPhotoAnalysis(){
      const requestId = beginAnalysisRequest();
      const previousData = state.data && typeof state.data === "object" ? state.data : null;
      state.loading = true;
      state.scanStatusMessage = "";
      state.error = "";
      state.errorCode = "";
      state.recoveryPhotoMessage = t("photo_processing");
      render();
      try{
        const existingProduct = state.data?.product || {};
        const payload = {
          ingredient_image_data_url: state.photoForm?.ingredient_image_data_url || "",
          nutrition_image_data_url: state.photoForm?.nutrition_image_data_url || "",
          existing_analysis: previousData || {},
          existing_key: state.key || previousData?.key || "",
          existing_product: {
            name: existingProduct?.name || "",
            brand: existingProduct?.brand || "",
            categories: existingProduct?.categories || [],
            image_url: existingProduct?.image_url || "",
            quantity: existingProduct?.quantity || "",
          },
          timestamp: Date.now(),
        };
        const res = await fetch(`/scan/photo?lang=${lang}`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload),
        });
        const data = await res.json().catch(()=> ({}));
        if (!isCurrentAnalysisRequest(requestId)) return;
        if (!res.ok || data?.error){
          state.error = localizeScanError(data, res.status);
          state.errorCode = scanErrorCode(data, res.status);
          state.loading = false;
          state.recoveryOpen = true;
          state.recoveryPhotoMessage = t("err_photo_retry");
          render();
          return;
        }
        state.data = data;
        const previousScore = previousData?.vitascore;
        const currentScore = data?.vitascore;
        const previousState = localizedAnalysisState(previousData?.analysis_state || previousData?.meta?.analysis_state || "");
        const currentState = localizedAnalysisState(data?.analysis_state || data?.meta?.analysis_state || "");
        const previousConfidence = localizedConfidenceTier(previousData?.analysis_confidence || previousData?.meta?.analysis_confidence || "");
        const currentConfidence = localizedConfidenceTier(data?.analysis_confidence || data?.meta?.analysis_confidence || "");
        const confidenceRank = { low: 1, medium: 2, high: 3 };
        const previousConfidenceKey = String(previousData?.analysis_confidence || previousData?.meta?.analysis_confidence || "").toLowerCase();
        const currentConfidenceKey = String(data?.analysis_confidence || data?.meta?.analysis_confidence || "").toLowerCase();
        state.refreshNotice = {
          previousScore: previousScore ?? "-",
          currentScore: currentScore ?? "-",
          previousState,
          currentState,
          previousConfidence,
          currentConfidence,
          confidenceImproved: Number(confidenceRank[currentConfidenceKey] || 0) > Number(confidenceRank[previousConfidenceKey] || 0),
        };
        state.error = "";
        state.errorCode = "";
        state.loading = false;
        state.recoveryOpen = false;
        state.recoveryPhotoMessage = "";
        _storeRecentProduct(data, data?.key || "photo:entry");
        _storeAnalysisHistory(data, data?.key || "photo:entry");
        step = 2;
        render();
      }catch(_e){
        if (!isCurrentAnalysisRequest(requestId)) return;
        state.error = t("err_network");
        state.loading = false;
        state.recoveryOpen = true;
        state.recoveryPhotoMessage = t("err_photo_retry");
        render();
      }
    }

    function stripDiacritics(value){
      return String(value || "")
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g, "");
    }

    function _normalizeIngredientToken(value){
      return String(value || "")
        .replace(/[.,;:!?()[\]{}"'`´’“”\-_/\\|+*=~]/g, " ")
        .split(/\s+/)
        .map(part => stripDiacritics(part))
        .join(" ")
        .toLowerCase()
        .trim()
        .replace(/\s+/g, " ");
    }

    function _normalizeIngredientTokenLoose(value){
      return stripDiacritics(_normalizeIngredientToken(value))
        .replace(/[.,;:!?()[\]{}"'`´’“”\-_/\\|+*=~]/g, " ")
        .trim()
        .replace(/\s+/g, " ");
    }

    function _escapeHtml(value){
      return String(value || "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;");
    }

    function _ingredientLookupKey(value){
      return String(value || "")
        .normalize("NFC")
        .toLowerCase()
        .trim()
        .replace(/\s+/g, " ");
    }

    function _ingredientLookupVariants(value){
      const raw = String(value || "").trim();
      if (!raw) return [];
      const variants = new Set([raw]);
      const withoutPercentages = raw.replace(/\b\d+(?:[.,]\d+)?\s*%/g, " ").trim();
      if (withoutPercentages) variants.add(withoutPercentages);
      const withoutParens = raw.replace(/\([^)]*\)/g, " ").trim();
      if (withoutParens) variants.add(withoutParens);
      const beforeColon = raw.split(":")[0]?.trim();
      if (beforeColon) variants.add(beforeColon);
      const firstSegment = raw.split(/[;,]/)[0]?.trim();
      if (firstSegment) variants.add(firstSegment);

      return Array.from(variants)
        .map(item => item.replace(/\s+/g, " ").trim())
        .filter(Boolean);
    }

    function _safeJsonParse(raw, fallback){
      if (!raw) return fallback;
      try {
        return JSON.parse(raw);
      } catch (_err) {
        return fallback;
      }
    }

    function _productIdentity(data, fallbackKey = ""){
      const product = data?.product || {};
      const key = String(fallbackKey || product?.barcode || product?.code || data?.barcode || "").trim();
      return {
        key,
        name: String(product?.name || data?.product_name || "").trim(),
        brand: String(product?.brand || "").trim()
      };
    }

    function _storeRecentProduct(data, key){
      if (!data || typeof data !== "object" || !isFinalResolvedProductData(data)) return;
      const identity = _productIdentity(data, key);
      if (!identity.key) return;
      const existing = _readRecentProducts().filter(item => String(item?.key || "") !== identity.key);
      const next = [{
        key: identity.key,
        name: identity.name,
        brand: identity.brand,
        data
      }, ...existing].slice(0, 6);
      _writeRecentProducts(next);
    }

    function _getComparisonCandidates(currentKey){
      return _readRecentProducts().filter(item => String(item?.key || "") && String(item.key) !== String(currentKey || ""));
    }

    function _isUsableCachedScan(data){
      if (!data || typeof data !== "object" || data?.error) return false;
      if (isPlaceholderScanResult(data)) return false;
      if (!isFinalResolvedProductData(data)) return false;
      return Number.isFinite(Number(data?.vitascore));
    }

    function _findCachedScanResult(key){
      const normalizedKey = String(key || "").trim();
      if (!normalizedKey) return null;
      const historyMatch = _readAnalysisHistory().find(item => String(item?.key || "").trim() === normalizedKey && _isUsableCachedScan(item?.data));
      if (historyMatch?.data) return historyMatch.data;
      const recentMatch = _readRecentProducts().find(item => String(item?.key || "").trim() === normalizedKey && _isUsableCachedScan(item?.data));
      return recentMatch?.data || null;
    }

    function _analysisSnapshot(data, key){
      const product = data?.product || {};
      const intel = data?.ingredients_intelligence || {};
      const markers = intel?.markers || {};
      return {
        key: String(key || product?.barcode || product?.code || "").trim(),
        product_name: String(product?.name || "").trim(),
        brand: String(product?.brand || "").trim(),
        timestamp: new Date().toISOString(),
        vitascore: data?.vitascore ?? null,
        processing_level: String(intel?.processing_label || "").trim(),
        processing_score: intel?.processing_score ?? null,
        flags: {
          caffeine: !!markers?.caffeine,
          sweeteners: Number(markers?.sweeteners || 0),
          colorants: Number(markers?.colorants || 0),
          flavourings: Number(markers?.flavourings || 0),
          e_numbers: Array.isArray(intel?.e_number_details) ? intel.e_number_details.length : 0
        },
        summary: {
          reasons: [...evaluateScoreExplanations(data).negative, ...evaluateScoreExplanations(data).positive, ...evaluateScoreExplanations(data).neutral]
            .slice(0, 2)
            .map(item => item.message)
        },
        data
      };
    }

    function _storeAnalysisHistory(data, key){
      if (!isFinalResolvedProductData(data)) return;
      const snapshot = _analysisSnapshot(data, key);
      if (!snapshot.key) return;
      const existing = _readAnalysisHistory().filter(item => String(item?.key || "") !== snapshot.key);
      _writeAnalysisHistory([snapshot, ...existing]);
    }

    function _storeComparisonHistory(productAData, productBData, productAKey, productBKey){
      if (!productAData || !productBData) return;
      const verdict = determineComparisonVerdict(productAData, productBData);
      const pairKey = `${String(productAKey || verdict.left.key || "").trim()}::${String(productBKey || verdict.right.key || "").trim()}`;
      if (!pairKey || pairKey === "::") return;
      const entry = {
        pair_key: pairKey,
        timestamp: new Date().toISOString(),
        product_a: _analysisSnapshot(productAData, productAKey),
        product_b: _analysisSnapshot(productBData, productBKey),
        verdict: verdict.winner,
        verdict_label: verdict.winner === "tie" ? t("compare_verdict_tie") : t("compare_verdict"),
        reasons: verdict.reasons.slice(0, 4)
      };
      const existing = _readComparisonHistory().filter(item => String(item?.pair_key || "") !== pairKey);
      _writeComparisonHistory([entry, ...existing]);
    }

    function _looksLikeCaptureNoise(value){
      const key = _ingredientLookupKey(value);
      if (!key || key === "-" || key === "unknown") return true;
      if (key.length < 2) return true;
      if (!/[a-z\u00c0-\u024f\u0370-\u03ff]/i.test(key)) return true;
      if (/^e\s?\d+[a-z]?$/i.test(key)) return true;
      return false;
    }

    function _inferIngredientSourceLanguage(data){
      const meta = data?.ingredients_meta || {};
      let sourceLang = meta?.source_language ? String(meta.source_language).toUpperCase() : null;
      if (!sourceLang){
        const ings = Array.isArray(data?.ingredients) ? data.ingredients : [];
        const textBlob = ings.map(i => i?.name || "").join(" ");
        sourceLang = inferLanguageCode(textBlob);
      }
      return sourceLang || "";
    }

    function _buildUnmatchedIngredientContext(data){
      const product = data?.product || {};
      const productName = String(product?.name || data?.product_name || "").trim();
      const barcode = String(state?.key || data?.barcode || product?.barcode || product?.code || data?.code || "").trim();
      return {
        product_name: productName,
        barcode,
        source_language: _inferIngredientSourceLanguage(data),
        ui_language: String(lang || "").toUpperCase(),
        captured_at: new Date().toISOString()
      };
    }

    function _recordUnmatchedIngredient(value, context = {}){
      const original = String(value || "").normalize("NFC").trim();
      const normalized = _ingredientLookupKey(original);
      if (_looksLikeCaptureNoise(normalized)) return;
      try {
        const store = _readUnmatchedIngredientStore();
        const sourceLanguage = String(context?.source_language || "").toUpperCase() || "UNKNOWN";
        const recordKey = `${normalized}::${sourceLanguage}`;
        const now = String(context?.captured_at || new Date().toISOString());
        const existing = store[recordKey] || null;
        const productName = String(context?.product_name || "").trim();
        const barcode = String(context?.barcode || "").trim();
        const uiLanguage = String(context?.ui_language || lang || "").toUpperCase();
        const contextSignature = `${barcode || productName || "unknown"}::${uiLanguage || "UNKNOWN"}`;
        const seenContextKeys = Array.isArray(existing?.seen_context_keys) ? existing.seen_context_keys : [];
        const isNewContext = !seenContextKeys.includes(contextSignature);
        const sampleProducts = Array.from(new Set([...(Array.isArray(existing?.sample_products) ? existing.sample_products : []), productName].filter(Boolean))).slice(0, 10);

    function _buildGlossaryAliasMaps(obj){
      const entries = {};
      const aliasRaw = {};
      const aliasNormalized = {};
      const aliasStripped = {};

      if (!obj || typeof obj !== "object") return { entries, aliasRaw, aliasNormalized, aliasStripped };

      for (const [canonicalKey, entry] of Object.entries(obj)){
        if (!entry || typeof entry !== "object") continue;
        const translations = {};
        for (const code of supportedLangs){
          if (typeof entry?.translations?.[code] === "string" && entry.translations[code].trim()){
            translations[code] = entry.translations[code].trim();
          }
        }
        if (!Object.keys(translations).length) continue;

        const canonical = _ingredientLookupKey(canonicalKey);
        if (!canonical) continue;

        const aliases = Array.from(new Set([canonicalKey, ...(Array.isArray(entry.aliases) ? entry.aliases : [])]
          .map(value => String(value || "").trim())
          .filter(Boolean)));

        const glossaryEntry = { canonical, translations, aliases };
        entries[canonical] = glossaryEntry;

        for (const alias of aliases){
          const rawKey = _ingredientLookupKey(alias);
          const normalizedKey = _normalizeIngredientToken(alias);
          const strippedKey = _normalizeIngredientTokenLoose(alias);
          if (rawKey) aliasRaw[rawKey] = canonical;
          if (normalizedKey) aliasNormalized[normalizedKey] = canonical;
          if (strippedKey) aliasStripped[strippedKey] = canonical;
        }
      }

      return { entries, aliasRaw, aliasNormalized, aliasStripped };
    }

    async function ensureIngredientGlossaryLoaded(){
      if (ingredientGlossaryEntries && ingredientGlossaryAliasRaw && ingredientGlossaryAliasNormalized && ingredientGlossaryAliasStripped) return true;
      if (ingredientGlossaryPromise) return ingredientGlossaryPromise;
      ingredientGlossaryLoadFailed = false;
      ingredientGlossaryPromise = (async () => {
        const triedUrls = [];
        let lastError = null;

        for (const candidateUrl of INGREDIENT_GLOSSARY_URLS){
          const requestUrl = `${candidateUrl}${candidateUrl.includes("?") ? "&" : "?"}v=${Date.now()}`;
          triedUrls.push(candidateUrl);
          try {
            const response = await fetch(requestUrl);
            if (!response.ok) throw new Error(`HTTP ${response.status}`);
            const obj = await response.json();
            const maps = _buildGlossaryAliasMaps(obj);
            if (Object.keys(maps.entries).length === 0) throw new Error("Glossary JSON empty");

            ingredientGlossary = obj;
            ingredientGlossaryEntries = maps.entries;
            ingredientGlossaryAliasRaw = maps.aliasRaw;
            ingredientGlossaryAliasNormalized = maps.aliasNormalized;
            ingredientGlossaryAliasStripped = maps.aliasStripped;
            ingredientGlossaryResolvedUrl = candidateUrl;
            ingredientGlossaryLoadFailed = false;
            if (!ingredientGlossaryLoadedLogged){
              console.debug(`[ingredients-glossary] loaded from ${candidateUrl} with ${Object.keys(maps.entries).length} entries`);
              ingredientGlossaryLoadedLogged = true;
            }
            render();
            return true;
          } catch (err) {
            lastError = `${candidateUrl}: ${err && err.message ? err.message : err}`;
          }
        }

        throw new Error(`Tried ${triedUrls.join(", ")}; final error: ${lastError || "unknown"}`);
      })()
        .catch((err) => {
          ingredientGlossary = null;
          ingredientGlossaryEntries = null;
          ingredientGlossaryAliasRaw = null;
          ingredientGlossaryAliasNormalized = null;
          ingredientGlossaryAliasStripped = null;
          ingredientGlossaryResolvedUrl = null;
          ingredientGlossaryLoadFailed = true;

          }
          render();
          return false;

        .finally(() => {
          ingredientGlossaryPromise = null;
        });

    }

    function resolveIngredientGlossaryEntry(value, captureContext = null){
      for (const candidate of _ingredientLookupVariants(value)){
        const rawKey = _ingredientLookupKey(candidate);
        const normalizedKey = _normalizeIngredientToken(candidate);
        const strippedKey = _normalizeIngredientTokenLoose(candidate);
        const strippedAsciiKey = _normalizeIngredientTokenLoose(
          String(candidate || "").normalize("NFD").replace(/[\u0300-\u036f]/g, "")
        );
        const canonical = (ingredientGlossaryAliasRaw || {})[rawKey]
          || (ingredientGlossaryAliasNormalized || {})[normalizedKey]
          || (ingredientGlossaryAliasStripped || {})[strippedKey]
          || (ingredientGlossaryAliasStripped || {})[strippedAsciiKey]
          || "";
        if (canonical) return (ingredientGlossaryEntries || {})[canonical] || null;
      }
      if (!(captureContext === false || captureContext?.suppress_capture)) {
        _recordUnmatchedIngredient(value, captureContext || {});
      }
      return null;
    }

        .split("/")

    function inferLanguageCode(text){
      const s = String(text || "").toLowerCase();
      if (!s.trim()) return null;
      if (/[\u0370-\u03ff]/.test(s)) return "EL";
      if (/\bund\b|\bzutaten\b|\bzucker\b/.test(s)) return "DE";
      if (/\boraz\b|\bcukier\b|\bskladniki\b|\bskładniki\b|\bkwas\b|\bkofeina\b|\bkwasowosci\b|\bkwasowości\b/.test(s)) return "PL";
      if (/\bet\b|\bsucre\b|\bingredients\b/.test(s)) return "FR";
      return null;
    }

    function ingredientLanguageBadge(data){
      const meta = data?.ingredients_meta || {};
      const uiLang = meta?.language ? String(meta.language).toUpperCase() : null;
      let sourceLang = _inferIngredientSourceLanguage(data) || null;
      if (!sourceLang) sourceLang = t("unknown");

      if (uiLang){
        return `${t("ingredients_ui_label")}: ${uiLang} | ${t("ingredients_source_label")}: ${sourceLang}`;
      }
      return `${t("ingredients_source_language")}: ${sourceLang}`;
    }

    function _getValueByPath(obj, path){
      return String(path || "").split(".").reduce((acc, key) => (
        acc && typeof acc === "object" ? acc[key] : undefined
      ), obj);
    }

    function buildNutritionInsightEvidence(data){
      const ings = Array.isArray(data?.ingredients) ? data.ingredients : [];
      const product = data?.product || {};
      const canonicalCounts = {};
      const normalizedTerms = [];
      const productCategories = Array.isArray(product?.categories) ? product.categories.map(item => _ingredientLookupKey(item)) : [];
      const productText = _ingredientLookupKey([
        product?.name || "",
        product?.brand || "",
        ...(Array.isArray(product?.categories) ? product.categories : [])
      ].join(" | "));

      for (const ing of ings){
        const raw = String(ing?.name || "").trim();
        if (!raw) continue;
        normalizedTerms.push(_ingredientLookupKey(raw));
        const entry = resolveIngredientGlossaryEntry(raw, false);
        if (entry?.canonical){
          canonicalCounts[entry.canonical] = (canonicalCounts[entry.canonical] || 0) + 1;
        }
      }

      const eNumbers = new Set(
        (Array.isArray(data?.ingredients_intelligence?.e_number_details) ? data.ingredients_intelligence.e_number_details : [])
          .map(ed => _normalizeECode(ed?.code || ""))
          .filter(Boolean)
      );

      return {
        canonicalCounts,
        normalizedTerms,
        eNumbers,
        markers: data?.ingredients_intelligence?.markers || {},
        processingLabel: String(data?.ingredients_intelligence?.processing_label || "").trim(),
        ingredientCount: ings.length,
        productText,
        productCategories,
        data
      };
    }

    function evaluateNutritionInsights(data){
      if (!Array.isArray(nutritionInsightRules) || !nutritionInsightRules.length) return [];

      const evidence = buildNutritionInsightEvidence(data);
      const severityRank = { high: 3, medium: 2, low: 1, info: 0 };

      const matchesRule = (rule) => {
        const conditions = rule?.trigger_conditions || {};
        const triggerTerms = Array.isArray(rule?.trigger_terms) ? rule.trigger_terms : [];
        switch (rule?.trigger_type){
          case "marker_min":
            return Number(evidence.markers?.[conditions.marker] || 0) >= Number(conditions.min || 1);
          case "marker_max":
            return Number(evidence.markers?.[conditions.marker] || 0) <= Number(conditions.max || 0);
          case "e_number_any":
            return triggerTerms.some(code => evidence.eNumbers.has(_normalizeECode(code)));
          case "e_number_count_min":
            return evidence.eNumbers.size >= Number(conditions.min || 1);
          case "e_number_count_max":
            return evidence.eNumbers.size <= Number(conditions.max || 0);
          case "canonical_any":
            return triggerTerms.some(term => Number(evidence.canonicalCounts[_ingredientLookupKey(term)] || 0) > 0);
          case "canonical_none":
            return triggerTerms.every(term => Number(evidence.canonicalCounts[_ingredientLookupKey(term)] || 0) === 0);
          case "canonical_count_min":
            return triggerTerms.reduce((sum, term) => sum + Number(evidence.canonicalCounts[_ingredientLookupKey(term)] || 0), 0) >= Number(conditions.min || 1);
          case "data_threshold": {
            const value = _getValueByPath(evidence.data, conditions.path);
            const numeric = Number(value);
            if (Number.isNaN(numeric)) return false;
            if (conditions.gte !== undefined && numeric < Number(conditions.gte)) return false;
            if (conditions.lte !== undefined && numeric > Number(conditions.lte)) return false;
            return true;
          }
          case "processing_label_any": {
            const current = _ingredientLookupKey(evidence.processingLabel);
            return triggerTerms.some(term => _ingredientLookupKey(term) === current);
          }
          case "ingredient_count_lte":
            return Number(evidence.ingredientCount || 0) <= Number(conditions.max || 0);
          case "ingredient_count_gte":
            return Number(evidence.ingredientCount || 0) >= Number(conditions.min || 0);
          case "product_text_any":
            return triggerTerms.some(term => evidence.productText.includes(_ingredientLookupKey(term)));
          case "product_text_none":
            return triggerTerms.every(term => !evidence.productText.includes(_ingredientLookupKey(term)));
          case "category_any":
            return triggerTerms.some(term => evidence.productCategories.includes(_ingredientLookupKey(term)));
          case "all":
            return (Array.isArray(conditions.conditions) ? conditions.conditions : []).every(condition => matchesRule(condition));
          case "any":
            return (Array.isArray(conditions.conditions) ? conditions.conditions : []).some(condition => matchesRule(condition));
          default:
            return false;
        }
      };

      return nutritionInsightRules
        .filter(rule => rule && matchesRule(rule))
        .map(rule => ({
          rule_id: rule.rule_id,
          category: rule.category || "general",
          severity: rule.severity || "info",
          label: String(rule?.label?.[lang] || rule?.label?.en || rule?.label?.el || "").trim(),
          message: String(rule?.message?.[lang] || rule?.message?.en || rule?.message?.el || "").trim()
        }))
        .filter(item => item.message)
        .sort((a, b) => {
          const bySeverity = Number(severityRank[b.severity] || 0) - Number(severityRank[a.severity] || 0);
          if (bySeverity !== 0) return bySeverity;
          return String(a.rule_id || "").localeCompare(String(b.rule_id || ""));
        });
    }

    function _matchesScoreExplanationTrigger(evidence, trigger){
      if (!trigger || typeof trigger !== "object") return false;
      const triggerType = trigger.trigger_type || trigger.type || "";
      const triggerTerms = Array.isArray(trigger.trigger_terms || trigger.terms) ? (trigger.trigger_terms || trigger.terms) : [];
      const conditions = trigger.trigger_conditions || trigger.conditions || {};

      switch (triggerType){
        case "marker_min":
          return Number(evidence.markers?.[conditions.marker] || 0) >= Number(conditions.min || 1);
        case "marker_max":
          return Number(evidence.markers?.[conditions.marker] || 0) <= Number(conditions.max || 0);
        case "e_number_any":
          return triggerTerms.some(code => evidence.eNumbers.has(_normalizeECode(code)));
        case "e_number_count_min":
          return evidence.eNumbers.size >= Number(conditions.min || 1);
        case "e_number_count_max":
          return evidence.eNumbers.size <= Number(conditions.max || 0);
        case "canonical_any":
          return triggerTerms.some(term => Number(evidence.canonicalCounts[_ingredientLookupKey(term)] || 0) > 0);
        case "canonical_none":
          return triggerTerms.every(term => Number(evidence.canonicalCounts[_ingredientLookupKey(term)] || 0) === 0);
        case "canonical_count_min":
          return triggerTerms.reduce((sum, term) => sum + Number(evidence.canonicalCounts[_ingredientLookupKey(term)] || 0), 0) >= Number(conditions.min || 1);
        case "data_threshold": {
          const value = _getValueByPath(evidence.data, conditions.path);
          const numeric = Number(value);
          if (Number.isNaN(numeric)) return false;
          if (conditions.gte !== undefined && numeric < Number(conditions.gte)) return false;
          if (conditions.lte !== undefined && numeric > Number(conditions.lte)) return false;
          return true;
        }
        case "processing_label_any": {
          const current = _ingredientLookupKey(evidence.processingLabel);
          return triggerTerms.some(term => _ingredientLookupKey(term) === current);
        }
        case "ingredient_count_lte":
          return Number(evidence.ingredientCount || 0) <= Number(conditions.max || 0);
        case "ingredient_count_gte":
          return Number(evidence.ingredientCount || 0) >= Number(conditions.min || 0);
        case "product_text_any":
          return triggerTerms.some(term => evidence.productText.includes(_ingredientLookupKey(term)));
        case "product_text_none":
          return triggerTerms.every(term => !evidence.productText.includes(_ingredientLookupKey(term)));
        case "category_any":
          return triggerTerms.some(term => evidence.productCategories.includes(_ingredientLookupKey(term)));
        case "all":
          return (Array.isArray(conditions.conditions) ? conditions.conditions : []).every(condition => _matchesScoreExplanationTrigger(evidence, condition));
        case "any":
          return (Array.isArray(conditions.conditions) ? conditions.conditions : []).some(condition => _matchesScoreExplanationTrigger(evidence, condition));
        default:
          return false;
      }
    }

    function _capScoreExplanationGroups(groups, maxItems = 5){
      const order = ["negative", "positive", "neutral"];
      const totalCount = () => order.reduce((sum, key) => sum + groups[key].length, 0);
      while (totalCount() > maxItems){
        let removed = false;
        for (const key of ["neutral", "positive", "negative"]){
          if (groups[key].length > 1 || (key !== "negative" && groups[key].length > 0)){
            groups[key].pop();
            removed = true;
            break;
          }
        }
        if (!removed) break;
      }
      return groups;
    }

    function evaluateScoreExplanations(data){
      const groups = { negative: [], positive: [], neutral: [] };
      if (Array.isArray(scoreExplanationRules) && scoreExplanationRules.length){
        const evidence = buildNutritionInsightEvidence(data);
        for (const rule of scoreExplanationRules){
          if (!rule || !_matchesScoreExplanationTrigger(evidence, rule)) continue;
          const direction = ["negative", "positive", "neutral"].includes(rule.impact_direction) ? rule.impact_direction : "neutral";
          const message = String(rule?.message?.[lang] || rule?.message?.en || rule?.message?.el || "").trim();
          if (!message) continue;
          groups[direction].push({
            rule_id: rule.rule_id,
            impact_weight: Number(rule.impact_weight || 0),
            message
          });
        }
      }

      const backendBalanceReasons = Array.isArray(data?.vitascore_breakdown?.balance_adjustments?.applied)
        ? data.vitascore_breakdown.balance_adjustments.applied
        : [];
      const backendFloorReasons = Array.isArray(data?.vitascore_breakdown?.floor_adjustments?.applied)
        ? data.vitascore_breakdown.floor_adjustments.applied
        : [];
      for (const item of [...backendBalanceReasons, ...backendFloorReasons]){
        const message = String(item?.message || "").trim();
        if (!message) continue;
        const direction = ["negative", "positive", "neutral"].includes(item?.impact_direction) ? item.impact_direction : "positive";
        groups[direction].push({
          rule_id: String(item?.rule_id || "balance_adjustment"),
          impact_weight: Number(item?.impact_weight || 0),
          message
        });
      }

      for (const key of Object.keys(groups)){
        groups[key] = groups[key]
          .sort((a, b) => Number(b.impact_weight || 0) - Number(a.impact_weight || 0))
          .slice(0, key === "negative" ? 3 : 2);
      }

      return _capScoreExplanationGroups(groups, 5);
    }

    function _renderWhyRows(items){
      if (!items.length) return "";
      return `<div class="whyGrid">${items.map(item => `<div class="whyRow"><span>${_escapeHtml(item.message || "")}</span></div>`).join("")}</div>`;
    }

    function _comparisonBooleanValue(value){
      return value ? t("yes") : t("no");
    }

    function _ingredientClassCount(intel, classNames){
      const targets = new Set((Array.isArray(classNames) ? classNames : [classNames]).map(name => _ingredientLookupKey(name)));
      const items = Array.isArray(intel?.sanitized_ingredients) ? intel.sanitized_ingredients : [];
      let count = 0;
      for (const item of items){
        const cls = _ingredientLookupKey(item?.class || "");
        if (targets.has(cls)) count += 1;
      }
      return count;
    }

    function _flavouringIngredientCount(intel){
      const items = Array.isArray(intel?.sanitized_ingredients) ? intel.sanitized_ingredients : [];
      const seen = new Set();
      let count = 0;
      for (const item of items){
        const cls = _ingredientLookupKey(item?.class || "");
        const name = String(item?.name || "").trim();
        const nameKey = _ingredientLookupKey(name);
        const flavourLike = (
          cls === "flavoring"
          || cls === "flavouring"
          || nameKey === "flavoring"
          || nameKey === "flavouring"
          || nameKey === "flavorings"
          || nameKey === "flavourings"
          || nameKey.includes("flavor")
          || nameKey.includes("flavour")
          || nameKey.includes("aroma")
          || nameKey.includes("arôme")
        );
        if (!flavourLike || seen.has(nameKey)) continue;
        seen.add(nameKey);
        count += 1;
      }
      return count;
    }

    function _flavouringCount(intel){
      return Math.max(
        Number(intel?.markers?.flavourings || 0),
        _ingredientClassCount(intel, ["Flavoring", "Flavouring"]),
        _flavouringIngredientCount(intel)
      );
    }

    function _comparisonSummary(data, key){
      const product = data?.product || {};
      const intel = data?.ingredients_intelligence || {};
      const markers = intel?.markers || {};
      const scoreReasons = evaluateScoreExplanations(data);
      const warnings = Number(!!markers?.sweeteners) + Number(!!markers?.caffeine) + Number(!!markers?.colorants) + Number(!!markers?.flavourings) + Number(!!markers?.preservatives);
      const ingredientCount = Array.isArray(data?.ingredients) ? data.ingredients.length : 0;
      return {
        key: String(key || product?.barcode || product?.code || "").trim(),
        name: String(product?.name || t("unknown_product")).trim() || t("unknown_product"),
        brand: String(product?.brand || "").trim(),
        score: Number(data?.vitascore ?? -999),
        processingScore: Number(intel?.processing_score ?? 999),
        processingLabel: String(intel?.processing_label || "").trim(),
        eCount: Array.isArray(intel?.e_number_details) ? intel.e_number_details.length : 0,
        sweeteners: Number(markers?.sweeteners || 0),
        caffeine: Number(markers?.caffeine || 0),
        colorants: Number(markers?.colorants || 0),
        flavourings: _flavouringCount(intel),
        preservatives: Number(markers?.preservatives || 0),
        ingredientCount,
        warnings,
        reasons: [...scoreReasons.negative, ...scoreReasons.positive, ...scoreReasons.neutral].slice(0, 3)
      };
    }

    function determineComparisonVerdict(currentData, compareData){
      const left = _comparisonSummary(currentData, state.key);
      const right = _comparisonSummary(compareData, state.compareTargetKey);
      const scoredReasons = [];
      const scoreGap = Math.abs(Number(left.score || 0) - Number(right.score || 0));

      if (left.score !== right.score){
        const winner = left.score > right.score ? "left" : "right";
        scoredReasons.push({ winner, weight: 100, message: t("compare_reason_score") });
      }
      if (left.processingScore !== right.processingScore){
        const winner = left.processingScore < right.processingScore ? "left" : "right";
        scoredReasons.push({ winner, weight: 90, message: t("compare_reason_processing") });
      }
      if (left.eCount !== right.eCount){
        const winner = left.eCount < right.eCount ? "left" : "right";
        scoredReasons.push({ winner, weight: 80, message: t("compare_reason_additives") });
      }
      if (!!left.sweeteners !== !!right.sweeteners){
        const winner = !left.sweeteners ? "left" : "right";
        scoredReasons.push({ winner, weight: 70, message: t("compare_reason_sweeteners") });
      }
      if (!!left.caffeine !== !!right.caffeine){
        const winner = !left.caffeine ? "left" : "right";
        scoredReasons.push({ winner, weight: 65, message: t("compare_reason_caffeine") });
      }
      if (left.colorants !== right.colorants){
        const winner = left.colorants < right.colorants ? "left" : "right";
        scoredReasons.push({ winner, weight: 60, message: t("compare_reason_colorants") });
      }
      if (left.flavourings !== right.flavourings){
        const winner = left.flavourings < right.flavourings ? "left" : "right";
        scoredReasons.push({ winner, weight: 55, message: t("compare_reason_flavourings") });
      }
      if (left.ingredientCount !== right.ingredientCount){
        const winner = left.ingredientCount < right.ingredientCount ? "left" : "right";
        scoredReasons.push({ winner, weight: 50, message: t("compare_reason_simplicity") });
      }

      let leftPoints = 0;
      let rightPoints = 0;
      for (const reason of scoredReasons){
        if (reason.winner === "left") leftPoints += reason.weight;
        if (reason.winner === "right") rightPoints += reason.weight;
      }

      let winner = "tie";
      if (scoreGap >= 8 && left.score !== right.score){
        winner = left.score > right.score ? "left" : "right";
      } else if (leftPoints > rightPoints) winner = "left";
      else if (rightPoints > leftPoints) winner = "right";
      else if (left.score !== right.score) winner = left.score > right.score ? "left" : "right";

      const reasons = scoredReasons
        .filter(reason => winner !== "tie" && reason.winner === winner)
        .sort((a, b) => Number(b.weight || 0) - Number(a.weight || 0))
        .slice(0, 4)
        .map(reason => reason.message);

      return { winner, reasons, left, right };
    }
