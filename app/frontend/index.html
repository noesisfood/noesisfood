<!doctype html>
<html lang="el">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>NoesisFood</title>
  <style>
    :root{
      --bg:#0b0f14; --card:#0f1622; --card2:#0c121c; --text:#e8eef7; --muted:#9fb0c3;
      --line:rgba(255,255,255,.08); --accent:#7bd4ff; --btn:#131c2a; --btn2:#1a2740;
      --shadow: 0 12px 40px rgba(0,0,0,.55);
      --r:18px;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial;
      background: radial-gradient(1200px 800px at 20% -10%, rgba(123,212,255,.14), transparent 60%),
                  radial-gradient(900px 700px at 80% 0%, rgba(110,255,190,.08), transparent 55%),
                  var(--bg);
      color:var(--text);
    }
    .wrap{max-width: 920px; margin: 0 auto; padding: 22px 16px 60px;}
    .top{display:flex; gap:14px; align-items:center; justify-content:space-between; margin-bottom: 16px;}
    .brand{display:flex; align-items:center; gap:10px;}
    .logo{
      width:42px; height:42px; border-radius:12px;
      background: linear-gradient(145deg, rgba(123,212,255,.95), rgba(110,255,190,.75));
      box-shadow: var(--shadow);
    }
    .title{display:flex; flex-direction:column; line-height:1.05;}
    .title b{font-size:18px}
    .title span{font-size:12px; color:var(--muted)}
    .step{font-size:12px; color:var(--muted); display:flex; align-items:center; gap:10px;}
    .bar{width:160px; height:8px; border-radius:999px; background: rgba(255,255,255,.08); overflow:hidden;}
    .bar > i{display:block; height:100%; width:0%; background: linear-gradient(90deg, rgba(123,212,255,.95), rgba(110,255,190,.9));}

    .card{
      background: linear-gradient(180deg, rgba(255,255,255,.03), rgba(255,255,255,.015));
      border:1px solid rgba(255,255,255,.08);
      border-radius: var(--r);
      box-shadow: var(--shadow);
      overflow:hidden;
    }
    .inner{padding:18px}
    .row{display:flex; gap:14px; flex-wrap:wrap}
    .col{flex:1 1 320px}
    .section{
      background: rgba(0,0,0,.18);
      border:1px solid rgba(255,255,255,.07);
      border-radius: 16px;
      padding:14px;
      margin-top: 12px;
    }
    .sectionTitle{font-weight:800; letter-spacing:.2px; margin-bottom: 10px;}
    .mini{font-size:12px;color:var(--muted);line-height:1.3}
    .btns{display:flex; gap:10px; flex-wrap:wrap; margin-top:12px}
    button{
      cursor:pointer;
      border:1px solid rgba(255,255,255,.10);
      background: linear-gradient(180deg, rgba(255,255,255,.04), rgba(255,255,255,.02));
      color:var(--text);
      padding:10px 12px;
      border-radius: 14px;
      font-weight:700;
    }
    button:hover{border-color: rgba(123,212,255,.35)}
    button.primary{
      background: linear-gradient(180deg, rgba(123,212,255,.32), rgba(123,212,255,.12));
      border-color: rgba(123,212,255,.35);
    }
    button.ghost{background: rgba(255,255,255,.02);}
    input{
      width:100%;
      border-radius: 14px;
      border:1px solid rgba(255,255,255,.10);
      background: rgba(0,0,0,.22);
      padding:12px 12px;
      color:var(--text);
      outline:none;
      font-size:14px;
    }
    input:focus{border-color: rgba(123,212,255,.45)}
    .pillRow{display:flex; gap:8px; flex-wrap:wrap; margin-top:10px}
    .pill{
      font-size:12px;
      padding:6px 10px;
      border-radius: 999px;
      border:1px solid rgba(255,255,255,.10);
      background: rgba(255,255,255,.04);
      color: rgba(232,238,247,.92);
    }
    .pill.good{border-color: rgba(110,255,190,.35); background: rgba(110,255,190,.10)}
    .pill.warn{border-color: rgba(255,210,110,.35); background: rgba(255,210,110,.10)}
    .pill.bad{border-color: rgba(255,120,120,.35); background: rgba(255,120,120,.10)}

    .err{
      background: rgba(255,60,60,.08);
      border:1px solid rgba(255,60,60,.24);
      color: rgba(255,210,210,.95);
      padding:10px 12px;
      border-radius: 14px;
      font-size:13px;
      margin-top: 10px;
    }
    .ok{
      background: rgba(110,255,190,.08);
      border:1px solid rgba(110,255,190,.22);
      color: rgba(210,255,235,.95);
      padding:10px 12px;
      border-radius: 14px;
      font-size:13px;
      margin-top: 10px;
    }

    .prodHead{display:flex; gap:12px; align-items:center;}
    .prodImg{
      width:72px; height:72px; border-radius: 16px;
      background: rgba(255,255,255,.05);
      border:1px solid rgba(255,255,255,.08);
      object-fit: cover;
      flex:0 0 auto;
    }
    .prodMeta b{display:block; font-size:16px}
    .prodMeta span{display:block; color:var(--muted); font-size:12px; margin-top:2px}

    .scoreWrap{display:flex; align-items:center; justify-content:space-between; gap:12px}
    .score{font-size:42px; font-weight:900; letter-spacing:-.8px;}
    .scoreLine{display:flex; align-items:baseline; gap:8px;}
    .scoreMax{font-size:18px; font-weight:900; letter-spacing:-.2px; color:rgba(159,176,195,.95);}
    .tier{
      font-size:12px; font-weight:800;
      padding:6px 10px; border-radius:999px;
      border:1px solid rgba(255,255,255,.10);
    }

    .grid2{display:grid; grid-template-columns: 1fr 1fr; gap:10px; margin-top:10px}
    .kv{
      padding:10px 10px;
      background: rgba(255,255,255,.03);
      border:1px solid rgba(255,255,255,.08);
      border-radius: 14px;
    }
    .kv small{display:block; color:var(--muted); font-size:11px}
    .kv b{display:block; margin-top:4px; font-size:13px}

    .whyGrid{display:grid; grid-template-columns: 1fr; gap:8px;}
    .whyRow{
      padding:10px 10px;
      background: rgba(255,255,255,.03);
      border:1px solid rgba(255,255,255,.08);
      border-radius: 14px;
      display:flex;
      justify-content:space-between;
      gap:10px;
      font-size:13px;
    }
    .whyRow span{color: rgba(232,238,247,.92); font-weight:800}

    .whyFoot{margin-top:10px; font-size:12px; color:var(--muted); line-height:1.35;}

    /* Ingredients UI */
    .split{display:grid; grid-template-columns: 1.1fr .9fr; gap:12px;}
    @media (max-width: 820px){ .split{grid-template-columns: 1fr;} }

    .box{
      background: rgba(255,255,255,.03);
      border:1px solid rgba(255,255,255,.08);
      border-radius: 14px;
      padding:12px;
    }

    .eRow{
      display:flex; justify-content:space-between; gap:10px;
      padding:10px 10px;
      border-radius: 12px;
      border:1px solid rgba(255,255,255,.08);
      background: rgba(0,0,0,.16);
      margin-top:8px;
    }
    .eLeft b{display:block; font-size:13px}
    .eLeft small{display:block; font-size:11px; color:var(--muted); margin-top:3px; line-height:1.35}
    .eRole{font-size:11px; font-weight:900; opacity:.9; align-self:flex-start}

    .ingItem{
      display:flex; justify-content:space-between; gap:10px;
      padding:10px 10px;
      border-radius: 12px;
      border:1px solid rgba(255,255,255,.08);
      background: rgba(0,0,0,.14);
      margin-top:8px;
    }
    .ingLeft b{display:block; font-size:13px}
    .ingLeft small{display:block; font-size:11px; color:var(--muted); margin-top:3px}
    .risk{font-size:11px; font-weight:900; padding:6px 10px; border-radius:999px; border:1px solid rgba(255,255,255,.10);}
    .risk.low{border-color: rgba(110,255,190,.35); background: rgba(110,255,190,.08)}
    .risk.medium{border-color: rgba(255,210,110,.35); background: rgba(255,210,110,.08)}
    .risk.high{border-color: rgba(255,120,120,.35); background: rgba(255,120,120,.08)}

    .groupTitle{
      margin-top:14px;
      font-weight:900;
      font-size:12px;
      letter-spacing:.2px;
      color: rgba(232,238,247,.92);
      opacity:.92;
    }
  </style>
</head>

<body>
  <div class="wrap">
    <div class="top">
      <div class="brand">
        <div class="logo"></div>
        <div class="title">
          <b>NoesisFood</b>
          <span>VitaScore Hybrid • Advanced MVP</span>
        </div>
      </div>
      <div class="step">
        <span id="stepTxt">1/4</span>
        <div class="bar"><i id="barFill"></i></div>
      </div>
    </div>

    <div class="card">
      <div class="inner" id="app"></div>
    </div>
  </div>

  <script>
    let step = 1;
    let state = { key:"", loading:false, error:"", data:null };

    const app = document.getElementById("app");
    const stepTxt = document.getElementById("stepTxt");
    const barFill = document.getElementById("barFill");

    const fmtNum = (x) => {
      if (x === null || x === undefined || Number.isNaN(Number(x))) return "—";
      const n = Number(x);
      return (Math.round(n * 10) / 10).toString();
    };

    function tierFromScore(score){
      if (score === null || score === undefined) return {label:"N/A", cls:"tier"};
      if (score >= 80) return {label:"Excellent", cls:"tier", color:"rgba(110,255,190,.18)", border:"rgba(110,255,190,.35)"};
      if (score >= 60) return {label:"Good", cls:"tier", color:"rgba(123,212,255,.14)", border:"rgba(123,212,255,.35)"};
      if (score >= 40) return {label:"Okay", cls:"tier", color:"rgba(255,210,110,.12)", border:"rgba(255,210,110,.32)"};
      return {label:"Caution", cls:"tier", color:"rgba(255,120,120,.12)", border:"rgba(255,120,120,.32)"};
    }

    function whoServingBlock(data){
      const who = data?.who_impact;
      if (!who) return ``;

      // supports both shapes
      const sugar = who?.sugar?.g_per_serving ?? who?.sugar_per_serving_g;
      const pctIdeal = who?.sugar?.percent_of_ideal_25g ?? who?.percent_of_ideal;
      const pctUpper = who?.sugar?.percent_of_upper_50g ?? who?.percent_of_upper;

      const flags = [];
      if ((who?.sugar?.percent_of_ideal_25g ?? 0) >= 100 || who?.exceeds_ideal) flags.push(`<span class="pill bad">Exceeds ideal 25g</span>`);
      if ((who?.sugar?.percent_of_upper_50g ?? 0) >= 100 || who?.exceeds_upper) flags.push(`<span class="pill bad">Exceeds upper 50g</span>`);

      return `
        <div class="section">
          <div class="sectionTitle">WHO sugar impact</div>
          <div class="grid2">
            <div class="kv"><small>Sugar per serving</small><b>${fmtNum(sugar)} g</b></div>
            <div class="kv"><small>% of ideal (25g/day)</small><b>${fmtNum(pctIdeal)}%</b></div>
            <div class="kv"><small>% of upper (50g/day)</small><b>${fmtNum(pctUpper)}%</b></div>
            <div class="kv"><small>Limits</small><b>25g ideal • 50g upper</b></div>
          </div>
          ${flags.length ? `<div class="pillRow">${flags.join("")}</div>` : ``}
          <div class="whyFoot">Per-serving calculation based on declared serving size.</div>
        </div>
      `;
    }

    function buildWhyScoreHTML(data){
      const why = Array.isArray(data?.why_this_score) ? data.why_this_score : [];
      const tips = Array.isArray(data?.tips) ? data.tips : [];

      return `
        <div class="section">
          <div class="sectionTitle">Why this score?</div>

          ${
            why.length
            ? `<div class="whyGrid">${why.map(line => `<div class="whyRow"><span>${line}</span></div>`).join("")}</div>`
            : `<div class="mini">No explanation available.</div>`
          }

          ${
            tips.length
            ? `<div class="whyFoot" style="margin-top:12px;">
                <b>Tips</b><br/>
                ${tips.map(t => `• ${t}`).join("<br/>")}
              </div>`
            : ``
          }

          <div class="whyFoot" style="margin-top:12px;">
            Based on WHO guidance & EU reference intakes.
            Educational tool — not medical advice.
          </div>
        </div>
      `;
    }

    function renderIngredientsIntel(data){
      const ings = Array.isArray(data?.ingredients) ? data.ingredients : [];
      const intel = data?.ingredients_intelligence || null;
      const eDetails = Array.isArray(intel?.e_number_details) ? intel.e_number_details : [];
      const flags = Array.isArray(intel?.flags) ? intel.flags : [];
      const markers = intel?.markers || {};
      const score = intel?.processing_score;
      const label = intel?.processing_label;

      // group ingredients by class
      const groups = {};
      for (const ing of ings){
        const cls = (ing?.class || "Other");
        if (!groups[cls]) groups[cls] = [];
        groups[cls].push(ing);
      }
      const groupOrder = Object.keys(groups).sort((a,b)=> a.localeCompare(b));

      const scorePill = (score === null || score === undefined) ? `` : (
        score <= 2 ? `<span class="pill good">Processing: ${score}/10 • ${label}</span>` :
        score <= 5 ? `<span class="pill warn">Processing: ${score}/10 • ${label}</span>` :
                     `<span class="pill bad">Processing: ${score}/10 • ${label}</span>`
      );

      const caffeinePill = (markers?.caffeine ? `<span class="pill warn">Caffeine</span>` : ``);
      const ePill = (eDetails.length ? `<span class="pill warn">E-numbers: ${eDetails.length}</span>` : `<span class="pill">E-numbers: none</span>`);
      const sweetPill = (markers?.sweeteners ? `<span class="pill warn">Sweeteners: ${markers.sweeteners}</span>` : ``);

      return `
        <div class="section">
          <div class="sectionTitle">Ingredients Intelligence</div>
          <div class="mini">
            Σημείωση: Η γλώσσα των συστατικών είναι αυτή που δίνει η πηγή (OpenFoodFacts).
          </div>

          <div class="pillRow">
            ${scorePill}
            ${ePill}
            ${sweetPill}
            ${caffeinePill}
          </div>

          <div class="split" style="margin-top:12px;">
            <div class="box">
              <div class="sectionTitle" style="margin:0 0 8px 0;">E-numbers explained</div>
              ${eDetails.length ? eDetails.map(ed => `
                <div class="eRow">
                  <div class="eLeft">
                    <b>${ed.code || "E—"} — ${ed.name || "Food additive"}</b>
                    <small>${ed.meaning_el || ""}</small>
                  </div>
                  <div class="eRole">${ed.role || ""}</div>
                </div>
              `).join("") : `<div class="mini">No E-numbers detected from additives/tags or ingredient text.</div>`}

              ${flags.length ? `<div class="whyFoot" style="margin-top:12px;"><b>Flags</b><br/>${flags.map(f => `• ${f}`).join("<br/>")}</div>` : ``}
            </div>

            <div class="box">
              <div class="sectionTitle" style="margin:0 0 8px 0;">Ingredients list (grouped)</div>

              ${groupOrder.length ? groupOrder.map(cls => `
                <div class="groupTitle">${cls}</div>
                ${groups[cls].map(ing => {
                  const nm = ing?.name || "—";
                  const note = ing?.note || "";
                  const risk = (ing?.risk || "low").toLowerCase();
                  const riskCls = (risk === "high" ? "risk high" : (risk === "medium" ? "risk medium" : "risk low"));
                  return `
                    <div class="ingItem">
                      <div class="ingLeft">
                        <b>${nm}</b>
                        <small>${note}</small>
                      </div>
                      <div class="${riskCls}">${risk}</div>
                    </div>
                  `;
                }).join("")}
              `).join("") : `<div class="mini">No ingredients available.</div>`}
            </div>
          </div>

          <div class="btns">
            <button class="ghost" id="backBtn">Back</button>
            <button class="primary" id="nextBtn">Next</button>
          </div>
        </div>
      `;
    }

    function render(){
      stepTxt.textContent = `${step}/4`;
      barFill.style.width = `${(step/4)*100}%`;

      if (step === 1){
        app.innerHTML = `
          <div class="row">
            <div class="col">
              <div class="section">
                <div class="sectionTitle">Scan</div>
                <div class="mini">Βάλε product id ή barcode.</div>

                ${state.error ? `<div class="err">${state.error}</div>` : ``}

                <div style="margin-top:10px;">
                  <input id="keyInput" placeholder="π.χ. 9002490100070" value="${state.key || ""}"/>
                </div>
                <div class="btns">
                  <button class="primary" id="scanBtn">${state.loading ? "Scanning..." : "Scan"}</button>
                </div>
              </div>
            </div>

            <div class="col">
              <div class="section">
                <div class="sectionTitle">How it works</div>
                <div class="mini">
                  • OpenFoodFacts fetch + normalization<br/>
                  • WHO-first baseline + hybrid nuance<br/>
                  • Ingredients Intelligence + E-numbers explained
                </div>
              </div>
            </div>
          </div>
        `;

        const scanBtn = document.getElementById("scanBtn");
        const keyInput = document.getElementById("keyInput");
        if (scanBtn && keyInput){
          scanBtn.onclick = () => doScan(keyInput.value);
          keyInput.onkeydown = (e) => { if (e.key === "Enter") doScan(keyInput.value); };
        }
        return;
      }

      if (step === 2){
        const d = state.data || {};
        const p = d.product || {};
        const score = d?.vitascore;
        const t = tierFromScore(score);

        // nutrition fields (new vs old)
        const per100 = d?.vitascore_breakdown?.per_100?.inputs || {};
        const unit = d?.meta?.serving?.unit || (p?.quantity?.toLowerCase?.().includes("ml") ? "ml" : "g");
        const sugar = per100.sugar_g_per_100 ?? d?.nutrition_per_100?.sugar_g;
        const salt = per100.salt_g_per_100 ?? d?.nutrition_per_100?.salt_g;
        const sat = per100.saturated_fat_g_per_100 ?? d?.nutrition_per_100?.sat_fat_g;
        const prot = per100.protein_g_per_100 ?? d?.nutrition_per_100?.protein_g;

        app.innerHTML = `
          <div class="section">
            <div class="prodHead">
              ${p?.image_url ? `<img class="prodImg" src="${p.image_url}" alt="product"/>` : `<div class="prodImg"></div>`}
              <div class="prodMeta">
                <b>${p?.name || "Unknown Product"}</b>
                <span>${p?.brand ? p.brand + " • " : ""}${d?.vitascore_version || ""}</span>
              </div>
            </div>

            <div class="section" style="margin-top:12px;">
              <div class="scoreWrap">
                <div>
                  <div class="mini">VitaScore</div>
                  <div class="scoreLine">
                    <div class="score">${score ?? "—"}</div>
                    <div class="scoreMax">/100</div>
                  </div>
                </div>
                <div class="tier" style="background:${t.color}; border-color:${t.border};">${t.label}</div>
              </div>

              <div class="grid2">
                <div class="kv"><small>Sugar</small><b>${fmtNum(sugar)} g/100${unit === "ml" ? "ml" : "g"}</b></div>
                <div class="kv"><small>Salt</small><b>${fmtNum(salt)} g/100${unit === "ml" ? "ml" : "g"}</b></div>
                <div class="kv"><small>Sat. fat</small><b>${fmtNum(sat)} g/100${unit === "ml" ? "ml" : "g"}</b></div>
                <div class="kv"><small>Protein</small><b>${fmtNum(prot)} g/100${unit === "ml" ? "ml" : "g"}</b></div>
              </div>
            </div>

            ${buildWhyScoreHTML(d)}
            ${whoServingBlock(d)}

            <div class="btns">
              <button class="ghost" id="backBtn">Back</button>
              <button class="primary" id="nextBtn">Next</button>
            </div>
          </div>
        `;

        document.getElementById("backBtn").onclick = () => { step = 1; render(); };
        document.getElementById("nextBtn").onclick = () => { step = 3; render(); };
        return;
      }

      if (step === 3){
        app.innerHTML = renderIngredientsIntel(state.data || {});
        document.getElementById("backBtn").onclick = () => { step = 2; render(); };
        document.getElementById("nextBtn").onclick = () => { step = 4; render(); };
        return;
      }

      if (step === 4){
        const d = state.data || {};
        const alerts = Array.isArray(d?.alerts) ? d.alerts : [];
        const dq = d?.data_quality || {};

        app.innerHTML = `
          <div class="section">
            <div class="sectionTitle">Safety & Trust</div>

            ${alerts.length ? `
              <div class="err">
                <b>Alerts:</b><br/>
                ${alerts.map(a => `• ${a}`).join("<br/>")}
              </div>
            ` : `
              <div class="ok"><b>No alerts found.</b></div>
            `}

            <div class="section" style="margin-top:12px;">
              <div class="sectionTitle">Data quality</div>
              <div class="mini">
                Confidence: <b>${dq?.confidence ?? "—"}</b><br/>
                Missing fields: <b>${Array.isArray(dq?.missing_core_fields) ? dq.missing_core_fields.join(", ") : "—"}</b><br/>
                Has serving: <b>${dq?.has_serving ? "yes" : "no"}</b><br/>
                Beverage: <b>${dq?.beverage_detection?.value === true ? "yes" : (dq?.beverage_detection?.value === false ? "no" : "—")}</b><br/>
                Signal: <b>${dq?.beverage_detection?.signal || "—"}</b>
              </div>
            </div>

            <div class="btns">
              <button class="ghost" id="backBtn">Back</button>
              <button class="primary" id="againBtn">Scan another</button>
            </div>
          </div>
        `;
        document.getElementById("backBtn").onclick = () => { step = 3; render(); };
        document.getElementById("againBtn").onclick = () => {
          step = 1;
          state.error = "";
          state.data = null;
          render();
        };
        return;
      }
    }

    async function doScan(key){
      state.key = (key || "").trim();
      if (!state.key){
        state.error = "Please enter a product id or barcode.";
        render();
        return;
      }

      state.loading = true;
      state.error = "";
      render();

      try{
        const res = await fetch(`/scan/${encodeURIComponent(state.key)}`);
        const data = await res.json().catch(()=> ({}));
        if (!res.ok || data?.error){
          state.error = data?.error || `Request failed (${res.status})`;
          state.loading = false;
          render();
          return;
        }
        state.data = data;
        state.loading = false;
        step = 2;
        render();
      }catch(e){
        state.error = "Network error. Is the server running?";
        state.loading = false;
        render();
      }
    }

    render();
  </script>
</body>
</html>
