<!doctype html>
<html lang="el">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>NoesisFood</title>
  <style>
    :root{
      --bg:#0b0f14; --card:#0f1622; --card2:#0c121c; --text:#e8eef7; --muted:#9fb0c3;
      --line:rgba(255,255,255,.08); --accent:#7bd4ff; --btn:#131c2a; --btn2:#1a2740;
      --shadow: 0 12px 40px rgba(0,0,0,.55);
      --r:18px;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial;
      background: radial-gradient(1200px 800px at 20% -10%, rgba(123,212,255,.14), transparent 60%),
                  radial-gradient(900px 700px at 80% 0%, rgba(110,255,190,.08), transparent 55%),
                  var(--bg);
      color:var(--text);
    }
    .wrap{max-width: 920px; margin: 0 auto; padding: 22px 16px 60px;}
    .top{display:flex; gap:14px; align-items:center; justify-content:space-between; margin-bottom: 16px;}
    .brand{display:flex; align-items:center; gap:10px;}
    .logo{
      width:42px; height:42px; border-radius:12px;
      background: linear-gradient(145deg, rgba(123,212,255,.95), rgba(110,255,190,.75));
      box-shadow: var(--shadow);
    }
    .title{display:flex; flex-direction:column; line-height:1.05;}
    .title b{font-size:18px}
    .title span{font-size:12px; color:var(--muted)}
    .step{font-size:12px; color:var(--muted); display:flex; align-items:center; gap:10px;}
    .topRight{display:flex; align-items:center; gap:10px;}
    .langSel{
      border-radius: 10px;
      border:1px solid rgba(255,255,255,.12);
      background: rgba(0,0,0,.18);
      color: var(--text);
      padding:6px 8px;
      font-size:12px;
      font-weight:700;
    }
    .bar{width:160px; height:8px; border-radius:999px; background: rgba(255,255,255,.08); overflow:hidden;}
    .bar > i{display:block; height:100%; width:0%; background: linear-gradient(90deg, rgba(123,212,255,.95), rgba(110,255,190,.9));}

    .card{
      background: linear-gradient(180deg, rgba(255,255,255,.03), rgba(255,255,255,.015));
      border:1px solid rgba(255,255,255,.08);
      border-radius: var(--r);
      box-shadow: var(--shadow);
      overflow:hidden;
    }
    .inner{padding:18px}
    .row{display:flex; gap:14px; flex-wrap:wrap}
    .col{flex:1 1 320px}
    .section{
      background: rgba(0,0,0,.18);
      border:1px solid rgba(255,255,255,.07);
      border-radius: 16px;
      padding:14px;
      margin-top: 12px;
    }
    .sectionTitle{font-weight:800; letter-spacing:.2px; margin-bottom: 10px;}
    .mini{font-size:12px;color:var(--muted);line-height:1.3}
    .btns{display:flex; gap:10px; flex-wrap:wrap; margin-top:12px}
    button{
      cursor:pointer;
      border:1px solid rgba(255,255,255,.10);
      background: linear-gradient(180deg, rgba(255,255,255,.04), rgba(255,255,255,.02));
      color:var(--text);
      padding:10px 12px;
      border-radius: 14px;
      font-weight:700;
    }
    button:hover{border-color: rgba(123,212,255,.35)}
    button.primary{
      background: linear-gradient(180deg, rgba(123,212,255,.32), rgba(123,212,255,.12));
      border-color: rgba(123,212,255,.35);
    }
    button.ghost{background: rgba(255,255,255,.02);}
    input{
      width:100%;
      border-radius: 14px;
      border:1px solid rgba(255,255,255,.10);
      background: rgba(0,0,0,.22);
      padding:12px 12px;
      color:var(--text);
      outline:none;
      font-size:14px;
    }
    input:focus{border-color: rgba(123,212,255,.45)}
    .pillRow{display:flex; gap:8px; flex-wrap:wrap; margin-top:10px}
    .pill{
      font-size:12px;
      padding:6px 10px;
      border-radius: 999px;
      border:1px solid rgba(255,255,255,.10);
      background: rgba(255,255,255,.04);
      color: rgba(232,238,247,.92);
    }
    .pill.good{border-color: rgba(110,255,190,.35); background: rgba(110,255,190,.10)}
    .pill.warn{border-color: rgba(255,210,110,.35); background: rgba(255,210,110,.10)}
    .pill.bad{border-color: rgba(255,120,120,.35); background: rgba(255,120,120,.10)}

    .err{
      background: rgba(255,60,60,.08);
      border:1px solid rgba(255,60,60,.24);
      color: rgba(255,210,210,.95);
      padding:10px 12px;
      border-radius: 14px;
      font-size:13px;
      margin-top: 10px;
    }
    .ok{
      background: rgba(110,255,190,.08);
      border:1px solid rgba(110,255,190,.22);
      color: rgba(210,255,235,.95);
      padding:10px 12px;
      border-radius: 14px;
      font-size:13px;
      margin-top: 10px;
    }

    .prodHead{display:flex; gap:12px; align-items:center;}
    .prodImg{
      width:72px; height:72px; border-radius: 16px;
      background: rgba(255,255,255,.05);
      border:1px solid rgba(255,255,255,.08);
      object-fit: cover;
      flex:0 0 auto;
    }
    .prodMeta b{display:block; font-size:16px}
    .prodMeta span{display:block; color:var(--muted); font-size:12px; margin-top:2px}

    .scoreWrap{display:flex; align-items:center; justify-content:space-between; gap:12px}
    .score{font-size:42px; font-weight:900; letter-spacing:-.8px;}
    .scoreLine{display:flex; align-items:baseline; gap:8px;}
    .scoreMax{font-size:18px; font-weight:900; letter-spacing:-.2px; color:rgba(159,176,195,.95);}
    .tier{
      font-size:12px; font-weight:800;
      padding:6px 10px; border-radius:999px;
      border:1px solid rgba(255,255,255,.10);
    }

    .grid2{display:grid; grid-template-columns: 1fr 1fr; gap:10px; margin-top:10px}
    .kv{
      padding:10px 10px;
      background: rgba(255,255,255,.03);
      border:1px solid rgba(255,255,255,.08);
      border-radius: 14px;
    }
    .kv small{display:block; color:var(--muted); font-size:11px}
    .kv b{display:block; margin-top:4px; font-size:13px}

    .whyGrid{display:grid; grid-template-columns: 1fr; gap:8px;}
    .whyRow{
      padding:10px 10px;
      background: rgba(255,255,255,.03);
      border:1px solid rgba(255,255,255,.08);
      border-radius: 14px;
      display:flex;
      justify-content:space-between;
      gap:10px;
      font-size:13px;
    }
    .whyRow span{color: rgba(232,238,247,.92); font-weight:800}

    .whyFoot{margin-top:10px; font-size:12px; color:var(--muted); line-height:1.35;}

    /* Ingredients UI */
    .split{display:grid; grid-template-columns: 1.1fr .9fr; gap:12px;}
    @media (max-width: 820px){ .split{grid-template-columns: 1fr;} }

    .box{
      background: rgba(255,255,255,.03);
      border:1px solid rgba(255,255,255,.08);
      border-radius: 14px;
      padding:12px;
    }

    .eRow{
      display:flex; justify-content:space-between; gap:10px;
      padding:10px 10px;
      border-radius: 12px;
      border:1px solid rgba(255,255,255,.08);
      background: rgba(0,0,0,.16);
      margin-top:8px;
    }
    .eLeft b{display:block; font-size:13px}
    .eLeft small{display:block; font-size:11px; color:var(--muted); margin-top:3px; line-height:1.35}
    .eRole{font-size:11px; font-weight:900; opacity:.9; align-self:flex-start}

    .ingItem{
      display:flex; justify-content:space-between; gap:10px;
      padding:10px 10px;
      border-radius: 12px;
      border:1px solid rgba(255,255,255,.08);
      background: rgba(0,0,0,.14);
      margin-top:8px;
    }
    .ingLeft b{display:block; font-size:13px}
    .ingLeft small{display:block; font-size:11px; color:var(--muted); margin-top:3px}
    .risk{font-size:11px; font-weight:900; padding:6px 10px; border-radius:999px; border:1px solid rgba(255,255,255,.10);}
    .risk.low{border-color: rgba(110,255,190,.35); background: rgba(110,255,190,.08)}
    .risk.medium{border-color: rgba(255,210,110,.35); background: rgba(255,210,110,.08)}
    .risk.high{border-color: rgba(255,120,120,.35); background: rgba(255,120,120,.08)}

    .groupTitle{
      margin-top:14px;
      font-weight:900;
      font-size:12px;
      letter-spacing:.2px;
      color: rgba(232,238,247,.92);
      opacity:.92;
    }
  </style>
</head>

    function pickInitialLang(){
      const saved = localStorage.getItem("nf_lang");
      if (saved && supportedLangs.includes(saved)) return saved;
      const browser = String(navigator.language || "en").toLowerCase().slice(0, 2);
      return supportedLangs.includes(browser) ? browser : "en";
    }

    function pickInitialIngredientTranslate(){
      return localStorage.getItem("nf_ing_translate") === "1";
    }

    let lang = pickInitialLang();
    state.translateIngredients = pickInitialIngredientTranslate();

    const app = document.getElementById("app");
    const stepTxt = document.getElementById("stepTxt");
    const barFill = document.getElementById("barFill");
    const langSel = document.getElementById("langSel");

    function t(key){
      return i18n[lang]?.[key] || i18n.en[key] || key;
    }

    const INGREDIENT_GLOSSARY_URLS = ["/static/ingredient_glossary.json"];
    let ingredientGlossary = null;
    let ingredientGlossaryEntries = null;
    let ingredientGlossaryAliasRaw = null;
    let ingredientGlossaryAliasNormalized = null;
    let ingredientGlossaryAliasStripped = null;
    let ingredientGlossaryPromise = null;
    let ingredientGlossaryLoadFailed = false;
    let ingredientGlossaryWarned = false;
    let ingredientGlossaryResolvedUrl = null;
    let ingredientGlossaryLoadedLogged = false;
    let ingredientTranslationStats = { translated: 0, total: 0 };

    function stripDiacritics(value){
      return String(value || "")
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g, "");
    }

    function _normalizeIngredientToken(value){
      return String(value || "")
        .replace(/[.,;:!?()[\]{}"'`´’“”\-_/\\|+*=~]/g, " ")
        .split(/\s+/)
        .map(part => stripDiacritics(part))
        .join(" ")
        .toLowerCase()
        .trim()
        .replace(/\s+/g, " ");
    }

    function _normalizeIngredientTokenLoose(value){
      return stripDiacritics(_normalizeIngredientToken(value))
        .replace(/[.,;:!?()[\]{}"'`´’“”\-_/\\|+*=~]/g, " ")
        .trim()
        .replace(/\s+/g, " ");
    }

    function _escapeHtml(value){
      return String(value || "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;");
    }

    function _ingredientLookupKey(value){
      return String(value || "")
        .normalize("NFC")
        .toLowerCase()
        .trim()
        .replace(/\s+/g, " ");
    }

    function _buildGlossaryAliasMaps(obj){
      const entries = {};
      const aliasRaw = {};
      const aliasNormalized = {};
      const aliasStripped = {};

      if (!obj || typeof obj !== "object") return { entries, aliasRaw, aliasNormalized, aliasStripped };

      for (const [canonicalKey, entry] of Object.entries(obj)){
        if (!entry || typeof entry !== "object") continue;
        const translations = {};
        for (const code of supportedLangs){
          if (typeof entry?.translations?.[code] === "string" && entry.translations[code].trim()){
            translations[code] = entry.translations[code].trim();
          }
        }
        if (!Object.keys(translations).length) continue;

        const canonical = _ingredientLookupKey(canonicalKey);
        if (!canonical) continue;

        const aliases = Array.from(new Set([canonicalKey, ...(Array.isArray(entry.aliases) ? entry.aliases : [])]
          .map(value => String(value || "").trim())
          .filter(Boolean)));

        const glossaryEntry = { canonical, translations, aliases };
        entries[canonical] = glossaryEntry;

        for (const alias of aliases){
          const rawKey = _ingredientLookupKey(alias);
          const normalizedKey = _normalizeIngredientToken(alias);
          const strippedKey = _normalizeIngredientTokenLoose(alias);
          if (rawKey) aliasRaw[rawKey] = canonical;
          if (normalizedKey) aliasNormalized[normalizedKey] = canonical;
          if (strippedKey) aliasStripped[strippedKey] = canonical;
        }
      }

      return { entries, aliasRaw, aliasNormalized, aliasStripped };
    }

    async function ensureIngredientGlossaryLoaded(){
      if (ingredientGlossaryEntries && ingredientGlossaryAliasRaw && ingredientGlossaryAliasNormalized && ingredientGlossaryAliasStripped) return true;
      if (ingredientGlossaryPromise) return ingredientGlossaryPromise;
      ingredientGlossaryLoadFailed = false;
      ingredientGlossaryPromise = (async () => {
        const triedUrls = [];
        let lastError = null;

        for (const candidateUrl of INGREDIENT_GLOSSARY_URLS){
          const requestUrl = `${candidateUrl}${candidateUrl.includes("?") ? "&" : "?"}v=${Date.now()}`;
          triedUrls.push(candidateUrl);
          try {
            const response = await fetch(requestUrl);
            if (!response.ok) throw new Error(`HTTP ${response.status}`);
            const obj = await response.json();
            const maps = _buildGlossaryAliasMaps(obj);
            if (Object.keys(maps.entries).length === 0) throw new Error("Glossary JSON empty");

            ingredientGlossary = obj;
            ingredientGlossaryEntries = maps.entries;
            ingredientGlossaryAliasRaw = maps.aliasRaw;
            ingredientGlossaryAliasNormalized = maps.aliasNormalized;
            ingredientGlossaryAliasStripped = maps.aliasStripped;
            ingredientGlossaryResolvedUrl = candidateUrl;
            ingredientGlossaryLoadFailed = false;
            if (!ingredientGlossaryLoadedLogged){
              console.debug(`[ingredients-glossary] loaded from ${candidateUrl} with ${Object.keys(maps.entries).length} entries`);
              ingredientGlossaryLoadedLogged = true;
            }
            render();
            return true;
          } catch (err) {
            lastError = `${candidateUrl}: ${err && err.message ? err.message : err}`;
          }
        }

        throw new Error(`Tried ${triedUrls.join(", ")}; final error: ${lastError || "unknown"}`);
      })()
        .catch((err) => {
          ingredientGlossary = null;
          ingredientGlossaryEntries = null;
          ingredientGlossaryAliasRaw = null;
          ingredientGlossaryAliasNormalized = null;
          ingredientGlossaryAliasStripped = null;
          ingredientGlossaryResolvedUrl = null;
          ingredientGlossaryLoadFailed = true;
          if (!ingredientGlossaryWarned){
            console.warn(`[ingredients-glossary] Failed to load glossary from ${INGREDIENT_GLOSSARY_URLS.join(", ")}. ${err && err.message ? err.message : err}`);
            ingredientGlossaryWarned = true;
          }
          render();
          return false;
        })
        .finally(() => {
          ingredientGlossaryPromise = null;
        });
      return ingredientGlossaryPromise;
    }

    function resolveIngredientGlossaryEntry(value){
      const rawKey = _ingredientLookupKey(value);
      const normalizedKey = _normalizeIngredientToken(value);
      const strippedKey = _normalizeIngredientTokenLoose(value);
      const strippedAsciiKey = _normalizeIngredientTokenLoose(
        String(value || "").normalize("NFD").replace(/[\u0300-\u036f]/g, "")
      );
      const canonical = (ingredientGlossaryAliasRaw || {})[rawKey]
        || (ingredientGlossaryAliasNormalized || {})[normalizedKey]
        || (ingredientGlossaryAliasStripped || {})[strippedKey]
        || (ingredientGlossaryAliasStripped || {})[strippedAsciiKey]
        || "";
      if (!canonical) return null;
      return (ingredientGlossaryEntries || {})[canonical] || null;
    }

    function ingredientDisplayName(name){
      const original = String(name || "").trim();
      if (!original) return { primary: "-", secondary: "", translated: false };
      if (!(supportedLangs.includes(lang) && state.translateIngredients)) {
        return { primary: _escapeHtml(original), secondary: "", translated: false };
      }

      if (/^e\s*\d{3,4}[a-z]?$/i.test(original)) {
        return { primary: _escapeHtml(original), secondary: "", translated: false };
      }

      const glossaryEntry = resolveIngredientGlossaryEntry(original);
      if (!glossaryEntry) {
        return { primary: _escapeHtml(original), secondary: "", translated: false };
      }
      const translated = glossaryEntry.translations?.[lang]
        || glossaryEntry.translations?.en
        || glossaryEntry.translations?.el
        || original;
      const showSecondary = _ingredientLookupKey(translated) !== _ingredientLookupKey(original);
      return {
        primary: _escapeHtml(translated),
        secondary: showSecondary ? _escapeHtml(original) : "",
        translated: true
      };
    }

    function localizedIngredientGroup(cls){
      const key = String(cls || "").trim().toLowerCase();
      const glossaryEntry = resolveIngredientGlossaryEntry(key);
      if (glossaryEntry){
        return glossaryEntry.translations?.[lang] || glossaryEntry.translations?.en || cls || t("group_other");
      }
      if (key === "acidifier") return t("group_acidifier");
      if (key === "colorant") return t("group_colorant");
      if (key === "flavoring" || key === "flavouring") return t("group_flavoring");
      if (key === "other") return t("group_other");
      return cls || t("group_other");
    }

    const fmtNum = (x) => {
      if (x === null || x === undefined || Number.isNaN(Number(x))) return "-";
      const n = Number(x);
      return (Math.round(n * 10) / 10).toString();
    };

    function tierFromScore(score){
      if (score === null || score === undefined) return {label:t("tier_na"), cls:"tier"};
      if (score >= 80) return {label:t("tier_excellent"), cls:"tier", color:"rgba(110,255,190,.18)", border:"rgba(110,255,190,.35)"};
      if (score >= 60) return {label:t("tier_good"), cls:"tier", color:"rgba(123,212,255,.14)", border:"rgba(123,212,255,.35)"};
      if (score >= 40) return {label:t("tier_okay"), cls:"tier", color:"rgba(255,210,110,.12)", border:"rgba(255,210,110,.32)"};
      return {label:t("tier_caution"), cls:"tier", color:"rgba(255,120,120,.12)", border:"rgba(255,120,120,.32)"};
    }

    function inferLanguageCode(text){
      const s = String(text || "").toLowerCase();
      if (!s.trim()) return null;
      if (/[\u0370-\u03ff]/.test(s)) return "EL";
      if (/(\\bund\\b|\\bzutaten\\b|\\bzucker\\b)/.test(s)) return "DE";
      if (/(\\boraz\\b|\\bcukier\\b|\\bskladniki\\b)/.test(s)) return "PL";
      if (/(\\bet\\b|\\bsucre\\b|\\bingredients\\b)/.test(s)) return "FR";
      return null;
    }

    function ingredientLanguageBadge(data){
      const meta = data?.ingredients_meta || {};
      const uiLang = meta?.language ? String(meta.language).toUpperCase() : null;
      let sourceLang = meta?.source_language ? String(meta.source_language).toUpperCase() : null;

      if (!sourceLang){
        const ings = Array.isArray(data?.ingredients) ? data.ingredients : [];
        const textBlob = ings.map(i => i?.name || "").join(" ");
        sourceLang = inferLanguageCode(textBlob);
      }
      if (!sourceLang) sourceLang = t("unknown");

      if (uiLang){
        return `${t("ingredients_ui_label")}: ${uiLang} | ${t("ingredients_source_label")}: ${sourceLang}`;
      }
      return `${t("ingredients_source_language")}: ${sourceLang}`;
    }

    function whoServingBlock(data){
      const who = data?.who_impact;
      if (!who) return ``;

      const sugar = who?.sugar?.g_per_serving ?? who?.sugar_per_serving_g;
      const pctIdeal = who?.sugar?.percent_of_ideal_25g ?? who?.percent_of_ideal;
      const pctUpper = who?.sugar?.percent_of_upper_50g ?? who?.percent_of_upper;

      const flags = [];
      if ((who?.sugar?.percent_of_ideal_25g ?? 0) >= 100 || who?.exceeds_ideal) flags.push(`<span class="pill bad">${t("who_flag_ideal")}</span>`);
      if ((who?.sugar?.percent_of_upper_50g ?? 0) >= 100 || who?.exceeds_upper) flags.push(`<span class="pill bad">${t("who_flag_upper")}</span>`);

      return `
        <div class="section">
          <div class="sectionTitle">${t("who_title")}</div>
          <div class="grid2">
            <div class="kv"><small>${t("who_sugar")}</small><b>${fmtNum(sugar)} g</b></div>
            <div class="kv"><small>${t("who_ideal")}</small><b>${fmtNum(pctIdeal)}%</b></div>
            <div class="kv"><small>${t("who_upper")}</small><b>${fmtNum(pctUpper)}%</b></div>
            <div class="kv"><small>${t("who_limits")}</small><b>${t("who_limits_val")}</b></div>
          </div>
          ${flags.length ? `<div class="pillRow">${flags.join("")}</div>` : ``}
          <div class="whyFoot">${t("who_note")}</div>
        </div>
      `;
    }

    function buildWhyScoreHTML(data){
      const why = Array.isArray(data?.why_this_score) ? data.why_this_score : [];
      const tips = Array.isArray(data?.tips) ? data.tips : [];

      return `
        <div class="section">
          <div class="sectionTitle">${t("why_title")}</div>
          ${why.length ? `<div class="whyGrid">${why.map(line => `<div class="whyRow"><span>${line}</span></div>`).join("")}</div>` : `<div class="mini">${t("why_none")}</div>`}
          ${tips.length ? `<div class="whyFoot" style="margin-top:12px;"><b>${t("tips")}</b><br/>${tips.map(x => `- ${x}`).join("<br/>")}</div>` : ``}
          <div class="whyFoot" style="margin-top:12px;">${t("why_foot")}</div>
        </div>
      `;
    }

    function renderIngredientsIntel(data){
      const ings = Array.isArray(data?.ingredients) ? data.ingredients : [];
      const intel = data?.ingredients_intelligence || null;
      const eDetails = Array.isArray(intel?.e_number_details) ? intel.e_number_details : [];
      const flags = Array.isArray(intel?.flags) ? intel.flags : [];
      const markers = intel?.markers || {};
      const score = intel?.processing_score;
      const label = intel?.processing_label;
      const langBadge = ingredientLanguageBadge(data);

      const groups = {};
      for (const ing of ings){
        const cls = (ing?.class || "Other");
        if (!groups[cls]) groups[cls] = [];
        groups[cls].push(ing);
      }
      const groupOrder = Object.keys(groups).sort((a,b)=> a.localeCompare(b));
      const translationStats = { translated: 0, total: 0 };
      const unmatchedIngredientNames = [];

      const scorePill = (score === null || score === undefined) ? `` : (
        score <= 2 ? `<span class="pill good">${t("processing")}: ${score}/10 | ${label}</span>` :
        score <= 5 ? `<span class="pill warn">${t("processing")}: ${score}/10 | ${label}</span>` :
                     `<span class="pill bad">${t("processing")}: ${score}/10 | ${label}</span>`
      );
      const caffeinePill = (markers?.caffeine ? `<span class="pill warn">${t("caffeine")}</span>` : ``);
      const ePill = (eDetails.length ? `<span class="pill warn">${t("e_numbers")}: ${eDetails.length}</span>` : `<span class="pill">${t("e_numbers")}: ${t("none")}</span>`);
      const sweetPill = (markers?.sweeteners ? `<span class="pill warn">${t("sweeteners")}: ${markers.sweeteners}</span>` : ``);

      const html = `
        <div class="section">
          <div class="sectionTitle">${t("ingredients_title")}</div>
          <div class="mini">${t("ingredients_note")}</div>
          ${supportedLangs.includes(lang) ? `
            <div class="mini" style="margin-top:8px;">
              <label style="display:inline-flex;align-items:center;gap:8px;cursor:pointer;">
                <input id="translateIngredientsToggle" type="checkbox" ${state.translateIngredients ? "checked" : ""}/>
                <span>${t("ingredients_translate_toggle")}</span>
              </label>
              ${(state.translateIngredients && !ingredientGlossaryEntries && !ingredientGlossaryLoadFailed) ? `<div style="margin-top:6px;">${t("ingredients_translate_loading")}</div>` : ``}
              ${state.translateIngredients ? `<div style="margin-top:6px;">${t("ingredients_translate_count")}</div>` : ``}
              ${ingredientGlossaryLoadFailed ? `<div style="margin-top:6px;">${t("ingredients_translate_unavailable")}</div>` : ``}
            </div>
          ` : ``}
          <div class="pillRow"><span class="pill">${langBadge}</span></div>

          <div class="pillRow">
            ${scorePill}
            ${ePill}
            ${sweetPill}
            ${caffeinePill}
          </div>

          <div class="split" style="margin-top:12px;">
            <div class="box">
              <div class="sectionTitle" style="margin:0 0 8px 0;">${t("e_explained")}</div>
              ${eDetails.length ? eDetails.map(ed => `
                <div class="eRow">
                  <div class="eLeft">
                    <b>${ed.code || "E-"} - ${ed.name || t("additive_fallback")}</b>
                    <small>${ed.meaning_el || ""}</small>
                  </div>
                  <div class="eRole">${ed.role || ""}</div>
                </div>
              `).join("") : `<div class="mini">${t("e_none")}</div>`}
              ${flags.length ? `<div class="whyFoot" style="margin-top:12px;"><b>${t("flags")}</b><br/>${flags.map(f => `- ${f}`).join("<br/>")}</div>` : ``}
            </div>

            <div class="box">
              <div class="sectionTitle" style="margin:0 0 8px 0;">${t("ingredients_grouped")}</div>
              ${groupOrder.length ? groupOrder.map(cls => `
                <div class="groupTitle">${localizedIngredientGroup(cls)}</div>
                ${groups[cls].map(ing => {
                  const nm = ingredientDisplayName(ing?.name || "-");
                  translationStats.total += 1;
                  if (nm.translated) translationStats.translated += 1;
                  else if (state.translateIngredients) unmatchedIngredientNames.push(String(ing?.name || "-").trim());
                  const note = ing?.note || "";
                  const risk = (ing?.risk || "low").toLowerCase();
                  const riskLabel = (risk === "high" ? t("risk_high") : (risk === "medium" ? t("risk_medium") : t("risk_low")));
                  const riskCls = (risk === "high" ? "risk high" : (risk === "medium" ? "risk medium" : "risk low"));
                  return `
                    <div class="ingItem">
                      <div class="ingLeft">
                        <b>${nm.primary}</b>
                        ${nm.secondary ? `<small>${nm.secondary}</small>` : ``}
                        ${note ? `<small>${note}</small>` : ``}
                      </div>
                      <div class="${riskCls}">${riskLabel}</div>
                    </div>
                  `;
                }).join("")}
              `).join("") : `<div class="mini">${t("ingredients_none")}</div>`}
            </div>
          </div>

          <div class="btns">
            <button class="ghost" id="backBtn">${t("back")}</button>
            <button class="primary" id="nextBtn">${t("next")}</button>
          </div>
        </div>
      `;
      ingredientTranslationStats = translationStats;
      if (supportedLangs.includes(lang) && state.translateIngredients && ingredientGlossaryEntries && ingredientGlossaryResolvedUrl) {
        const unmatchedPreview = unmatchedIngredientNames.filter(Boolean).slice(0, 10);
        console.debug(
          `[ingredients-glossary] toggle enabled; url=${ingredientGlossaryResolvedUrl}; entries=${Object.keys(ingredientGlossaryEntries).length}; unmatched=${unmatchedPreview.join(" | ")}`
        );
      }
      return html
        .replace("__TRANSLATED_COUNT__", String(ingredientTranslationStats.translated))
        .replace("__TOTAL_COUNT__", String(ingredientTranslationStats.total));
    }

    function render(){
      stepTxt.textContent = `${step}/4`;
      barFill.style.width = `${(step/4)*100}%`;
      document.querySelector(".title span").textContent = t("tagline");

      if (langSel && langSel.value !== lang) langSel.value = lang;

      if (step === 1){

          <div class="row">
            <div class="col">
              <div class="section">
                <div class="sectionTitle">${t("scan_title")}</div>
                <div class="mini">${t("scan_hint")}</div>
                ${state.error ? `<div class="err">${state.error}</div>` : ``}
                <div style="margin-top:10px;">
                  <input id="keyInput" placeholder="${t("scan_placeholder")}" value="${state.key || ""}"/>
                </div>
                <div class="btns">
                  <button class="primary" id="scanBtn">${state.loading ? t("scanning_btn") : t("scan_btn")}</button>
                </div>
              </div>
            </div>

        if (scanBtn && keyInput){
          scanBtn.onclick = () => doScan(keyInput.value);
          keyInput.onkeydown = (e) => { if (e.key === "Enter") doScan(keyInput.value); };
        }

      }

      if (step === 2){
        const d = state.data || {};
        const p = d.product || {};
        const score = d?.vitascore;
        const tier = tierFromScore(score);
        const per100 = d?.vitascore_breakdown?.per_100?.inputs || {};
        const unit = d?.meta?.serving?.unit || (p?.quantity?.toLowerCase?.().includes("ml") ? "ml" : "g");
        const sugar = per100.sugar_g_per_100 ?? d?.nutrition_per_100?.sugar_g;
        const salt = per100.salt_g_per_100 ?? d?.nutrition_per_100?.salt_g;
        const sat = per100.saturated_fat_g_per_100 ?? d?.nutrition_per_100?.sat_fat_g;
        const prot = per100.protein_g_per_100 ?? d?.nutrition_per_100?.protein_g;

        app.innerHTML = `
          <div class="section">
            <div class="prodHead">
              ${p?.image_url ? `<img class="prodImg" src="${p.image_url}" alt="product"/>` : `<div class="prodImg"></div>`}
              <div class="prodMeta">
                <b>${p?.name || t("unknown_product")}</b>
                <span>${p?.brand ? p.brand + " | " : ""}${d?.vitascore_version || ""}</span>
              </div>
            </div>
            <div class="section" style="margin-top:12px;">
              <div class="scoreWrap">
                <div>
                  <div class="mini">${t("vitascore")}</div>
                  <div class="scoreLine"><div class="score">${score ?? "-"}</div><div class="scoreMax">/100</div></div>
                </div>
                <div class="tier" style="background:${tier.color}; border-color:${tier.border};">${tier.label}</div>
              </div>
              <div class="grid2">
                <div class="kv"><small>${t("sugar")}</small><b>${fmtNum(sugar)} g/100${unit === "ml" ? "ml" : "g"}</b></div>
                <div class="kv"><small>${t("salt")}</small><b>${fmtNum(salt)} g/100${unit === "ml" ? "ml" : "g"}</b></div>
                <div class="kv"><small>${t("sat_fat")}</small><b>${fmtNum(sat)} g/100${unit === "ml" ? "ml" : "g"}</b></div>
                <div class="kv"><small>${t("protein")}</small><b>${fmtNum(prot)} g/100${unit === "ml" ? "ml" : "g"}</b></div>
              </div>
            </div>
            ${buildWhyScoreHTML(d)}
            ${whoServingBlock(d)}
            <div class="btns">
              <button class="ghost" id="backBtn">${t("back")}</button>
              <button class="primary" id="nextBtn">${t("next")}</button>
            </div>
          </div>
        `;
        document.getElementById("backBtn").onclick = () => { step = 1; render(); };
        document.getElementById("nextBtn").onclick = () => { step = 3; render(); };
        return;
      }

      if (step === 3){
        app.innerHTML = renderIngredientsIntel(state.data || {});
        const translateToggle = document.getElementById("translateIngredientsToggle");
        if (translateToggle){
          translateToggle.onchange = (e) => {
            const nextEnabled = !!e.target.checked;
            if (!nextEnabled){
              state.translateIngredients = false;
              localStorage.setItem("nf_ing_translate", "0");
              render();
              return;
            }
            state.translateIngredients = true;
            localStorage.setItem("nf_ing_translate", "1");
            render();
            ensureIngredientGlossaryLoaded().then(ok => {
              if (!ok){
                state.translateIngredients = false;
                localStorage.setItem("nf_ing_translate", "0");
                render();
                return;
              }
              render();
            });
          };
        }
        if (supportedLangs.includes(lang) && state.translateIngredients){
          ensureIngredientGlossaryLoaded().then(ok => {
            if (!ok){
              state.translateIngredients = false;
              localStorage.setItem("nf_ing_translate", "0");
              render();
            }
          });
        }
        document.getElementById("backBtn").onclick = () => { step = 2; render(); };
        document.getElementById("nextBtn").onclick = () => { step = 4; render(); };
        return;
      }

      if (step === 4){
        const d = state.data || {};
        const alerts = Array.isArray(d?.alerts) ? d.alerts : [];
        const dq = d?.data_quality || {};
        app.innerHTML = `
          <div class="section">
            <div class="sectionTitle">${t("safety_title")}</div>
            ${alerts.length ? `<div class="err"><b>${t("alerts")}:</b><br/>${alerts.map(a => `- ${a}`).join("<br/>")}</div>` : `<div class="ok"><b>${t("no_alerts")}</b></div>`}
            <div class="section" style="margin-top:12px;">
              <div class="sectionTitle">${t("data_quality")}</div>
              <div class="mini">
                ${t("confidence")}: <b>${dq?.confidence ?? "-"}</b><br/>
                ${t("missing_fields")}: <b>${Array.isArray(dq?.missing_core_fields) ? dq.missing_core_fields.join(", ") : "-"}</b><br/>
                ${t("has_serving")}: <b>${dq?.has_serving ? t("yes") : t("no")}</b><br/>
                ${t("beverage")}: <b>${dq?.beverage_detection?.value === true ? t("yes") : (dq?.beverage_detection?.value === false ? t("no") : "-")}</b><br/>
                ${t("signal")}: <b>${dq?.beverage_detection?.signal || "-"}</b>
              </div>
            </div>
            <div class="btns">
              <button class="ghost" id="backBtn">${t("back")}</button>
              <button class="primary" id="againBtn">${t("scan_another")}</button>
            </div>
          </div>
        `;
        document.getElementById("backBtn").onclick = () => { step = 3; render(); };
        document.getElementById("againBtn").onclick = () => { step = 1; state.error = ""; state.data = null; render(); };
      }
    }

    async function doScan(key){
      state.key = (key || "").trim();
      if (!state.key){
        state.error = t("err_enter_key");
        render();
        return;
      }
      state.loading = true;
      state.error = "";
      render();
      try{
        const res = await fetch(`/scan/${encodeURIComponent(state.key)}?lang=${lang}`);
        const data = await res.json().catch(()=> ({}));
        if (!res.ok || data?.error){
          state.error = data?.error || `Request failed (${res.status})`;
          state.loading = false;
          render();
          return;
        }
        state.data = data;
        state.loading = false;
        step = 2;
        render();
      }catch(e){
        state.error = t("err_network");
        state.loading = false;
        render();
      }
    }

    if (langSel){
      langSel.value = lang;
      langSel.onchange = (e) => {
        const next = String(e.target.value || "en").toLowerCase();
        lang = supportedLangs.includes(next) ? next : "en";
        localStorage.setItem("nf_lang", lang);
        render();
      };
    }

    render();
  </script>
</body>
</html>
