                <div class="kv"><small>${t("compare_col_caffeine")}</small><b>${_comparisonBooleanValue(verdict.left.caffeine)}</b></div>
                <div class="kv"><small>${t("compare_col_sweeteners")}</small><b>${_comparisonBooleanValue(verdict.left.sweeteners)}</b></div>
                <div class="kv"><small>${t("compare_col_colorants")}</small><b>${verdict.left.colorants}</b></div>
                <div class="kv"><small>${t("compare_col_flavourings")}</small><b>${verdict.left.flavourings}</b></div>
              </div>
              <div class="whyFoot" style="margin-top:10px;"><b>${t("compare_col_reasons")}</b><br/>${verdict.left.reasons.length ? verdict.left.reasons.map(item => `- ${_escapeHtml(item.message || "")}`).join("<br/>") : "-"}</div>
            </div>
            <div class="box">
              <div class="prodMeta">
                <b>${_escapeHtml(verdict.right.name)}</b>
                <span>${_escapeHtml(verdict.right.brand)}</span>
              </div>
              <div class="pillRow" style="margin-top:8px;">${rightBadge}</div>
              <div class="grid2" style="margin-top:8px;">
                <div class="kv"><small>${t("compare_col_score")}</small><b>${verdict.right.score > -999 ? verdict.right.score : "-"}</b></div>
                <div class="kv"><small>${t("compare_col_processing")}</small><b>${_escapeHtml(localizeProcessingLabel(verdict.right.processingLabel) || "-")}</b></div>
                <div class="kv"><small>${t("compare_col_additives")}</small><b>${verdict.right.eCount}</b></div>
                <div class="kv"><small>${t("compare_col_caffeine")}</small><b>${_comparisonBooleanValue(verdict.right.caffeine)}</b></div>
                <div class="kv"><small>${t("compare_col_sweeteners")}</small><b>${_comparisonBooleanValue(verdict.right.sweeteners)}</b></div>
                <div class="kv"><small>${t("compare_col_colorants")}</small><b>${verdict.right.colorants}</b></div>
                <div class="kv"><small>${t("compare_col_flavourings")}</small><b>${verdict.right.flavourings}</b></div>
              </div>
              <div class="whyFoot" style="margin-top:10px;"><b>${t("compare_col_reasons")}</b><br/>${verdict.right.reasons.length ? verdict.right.reasons.map(item => `- ${_escapeHtml(item.message || "")}`).join("<br/>") : "-"}</div>
            </div>
          </div>
          ${verdict.reasons.length ? `<div class="whyFoot" style="margin-top:12px;"><b>${t("compare_reason_title")}</b><br/>${verdict.reasons.map(reason => `- ${_escapeHtml(reason)}`).join("<br/>")}</div>` : ``}
        </div>
      `;
    }

    function quickVerdictLabel(score){
      const n = Number(score);
      if (Number.isNaN(n)) return t("quick_verdict_moderate");
      if (n >= 95) return t("quick_verdict_excellent");
      if (n >= 60) return t("quick_verdict_better");
      if (n >= 40) return t("quick_verdict_moderate");
      return t("quick_verdict_burdened");
    }

    function quickReasonItems(data){
      const structured = evaluateScoreExplanations(data);
      return [...structured.negative, ...structured.positive, ...structured.neutral].slice(0, 5);
    }

    function quickSignalItems(data){
      const intel = data?.ingredients_intelligence || {};
      const markers = intel?.markers || {};
      const eCount = Array.isArray(intel?.e_number_details) ? intel.e_number_details.length : 0;
      const flavouringCount = _flavouringCount(intel);
      const items = [];
      if (markers?.sweeteners) items.push(`${t("sweeteners")}: ${markers.sweeteners}`);
      if (markers?.caffeine) items.push(t("caffeine"));
      if (eCount >= 3) items.push(`${t("e_numbers")}: ${eCount}`);
      if (markers?.colorants) items.push(`${t("group_colorant")}: ${markers.colorants}`);
      if (flavouringCount) items.push(`${t("group_flavoring")}: ${flavouringCount}`);
      if (intel?.processing_score !== null && intel?.processing_score !== undefined){
        items.push(`${t("processing")}: ${localizeProcessingLabel(intel?.processing_label || "")}`);
      }
      return items.slice(0, 5);
    }

    function whoServingBlock(data){
      const who = data?.who_impact;
      if (!who) return ``;

      const sugar = who?.sugar?.g_per_serving ?? who?.sugar_per_serving_g;
      const pctIdeal = who?.sugar?.percent_of_ideal_25g ?? who?.percent_of_ideal;
      const pctUpper = who?.sugar?.percent_of_upper_50g ?? who?.percent_of_upper;

      if ((who?.sugar?.percent_of_ideal_25g ?? 0) >= 100 || who?.exceeds_ideal) flags.push(`<span class="pill bad">${t("who_flag_ideal")}</span>`);

    function buildWhyScoreHTML(data){
      const structured = evaluateScoreExplanations(data);
      const why = Array.isArray(data?.why_this_score) ? data.why_this_score : [];
      const tips = Array.isArray(data?.tips) ? data.tips : [];
      const hasStructured = structured.negative.length || structured.positive.length || structured.neutral.length;

      return `
        <div class="section">
          <div class="sectionTitle">${t("why_title")}</div>
          ${hasStructured ? `
            ${structured.negative.length ? `<div class="mini" style="margin:0 0 8px 0;"><b>${t("why_negative_title")}</b></div>${_renderWhyRows(structured.negative)}` : ``}
            ${structured.positive.length ? `<div class="mini" style="margin:${structured.negative.length ? "12px" : "0"} 0 8px 0;"><b>${t("why_positive_title")}</b></div>${_renderWhyRows(structured.positive)}` : ``}
            ${structured.neutral.length ? `<div class="mini" style="margin:${(structured.negative.length || structured.positive.length) ? "12px" : "0"} 0 8px 0;"><b>${t("why_notable_title")}</b></div>${_renderWhyRows(structured.neutral)}` : ``}
          ` : why.length ? `<div class="whyGrid">${why.map(line => `<div class="whyRow"><span>${_escapeHtml(line)}</span></div>`).join("")}</div>` : `<div class="mini">${t("why_none")}</div>`}
          ${!hasStructured && tips.length ? `<div class="whyFoot" style="margin-top:12px;"><b>${t("tips")}</b><br/>${tips.map(x => `- ${_escapeHtml(x)}`).join("<br/>")}</div>` : ``}
          <div class="whyFoot" style="margin-top:12px;">${t("why_foot")}</div>
        </div>
      `;
    }

    function renderIngredientsIntel(data){
      const intel = data?.ingredients_intelligence || null;
      const ings = Array.isArray(intel?.sanitized_ingredients)
        ? intel.sanitized_ingredients
        : (Array.isArray(data?.ingredients) ? data.ingredients : []);
      const eDetails = Array.isArray(intel?.e_number_details) ? intel.e_number_details : [];
      const flags = Array.isArray(intel?.flags) ? intel.flags : [];
      const markers = intel?.markers || {};
      const score = intel?.processing_score;
      const label = intel?.processing_label;
      const langBadge = ingredientLanguageBadge(data);
      const unmatchedCaptureContext = _buildUnmatchedIngredientContext(data);
      const nutritionInsights = evaluateNutritionInsights(data);

      const groups = {};
      const seenGroupDisplay = {};
      const genericGroupLabels = new Set([
        _ingredientLookupKey(t("group_acidifier")),
        _ingredientLookupKey(localizeGlossaryValue("acid", t("group_acidifier"), false)),
        _ingredientLookupKey(t("group_flavoring")),
        "acidifier",
        "acid",
        "flavouring",
        "flavoring",
        "emulsifier",
        "stabilizer",
        "preservative",
        "colorant"
      ]);
      for (const ing of ings){
        const nm = ingredientDisplayName(ing?.name || "-", unmatchedCaptureContext);
        if (!nm.visible) continue;
        const cls = (ing?.class || "Other");
        if (!groups[cls]) groups[cls] = [];
        if (!seenGroupDisplay[cls]) seenGroupDisplay[cls] = new Set();
        const displayKey = String(nm.primary || "").trim().toLowerCase();
        if (displayKey && seenGroupDisplay[cls].has(displayKey)) continue;
        if (displayKey) seenGroupDisplay[cls].add(displayKey);
        groups[cls].push({ ...ing, _display: nm });
      }
      for (const cls of Object.keys(groups)){
        if (groups[cls].length <= 1) continue;
        const hasSpecific = groups[cls].some(ing => !genericGroupLabels.has(_ingredientLookupKey(ing?._display?.primary || "")));
        if (!hasSpecific) continue;
        groups[cls] = groups[cls].filter(ing => !genericGroupLabels.has(_ingredientLookupKey(ing?._display?.primary || "")));
      }
      const groupOrder = Object.keys(groups).sort((a,b)=> a.localeCompare(b));
      const translationStats = { translated: 0, total: 0 };
      const unmatchedIngredientNames = [];

      const scorePill = (score === null || score === undefined) ? `` : (
        score <= 2 ? `<span class="pill good">${t("processing")}: ${score}/10 | ${localizeProcessingLabel(label)}</span>` :
        score <= 5 ? `<span class="pill warn">${t("processing")}: ${score}/10 | ${localizeProcessingLabel(label)}</span>` :
                     `<span class="pill bad">${t("processing")}: ${score}/10 | ${localizeProcessingLabel(label)}</span>`
      );
      const caffeinePill = (markers?.caffeine ? `<span class="pill warn">${t("caffeine")}</span>` : ``);
      const ePill = (eDetails.length ? `<span class="pill warn">${t("e_numbers")}: ${eDetails.length}</span>` : `<span class="pill">${t("e_numbers")}: ${t("none")}</span>`);
      const sweetPill = (markers?.sweeteners ? `<span class="pill warn">${t("sweeteners")}: ${markers.sweeteners}</span>` : ``);

      const html = `
        <div class="section">
          <div class="sectionTitle">${t("ingredients_title")}</div>
          <div class="mini">${t("ingredients_note")}</div>
          ${supportedLangs.includes(lang) ? `
            <div class="mini" style="margin-top:8px;">
              <label style="display:inline-flex;align-items:center;gap:8px;cursor:pointer;">
                <input id="translateIngredientsToggle" type="checkbox" ${state.translateIngredients ? "checked" : ""}/>
                <span>${t("ingredients_translate_toggle")}</span>
              </label>
              ${(state.translateIngredients && !ingredientGlossaryEntries && !ingredientGlossaryLoadFailed) ? `<div style="margin-top:6px;">${t("ingredients_translate_loading")}</div>` : ``}
              ${state.translateIngredients ? `<div style="margin-top:6px;">${t("ingredients_translate_count")}</div>` : ``}
              ${ingredientGlossaryLoadFailed ? `<div style="margin-top:6px;">${t("ingredients_translate_unavailable")}</div>` : ``}
            </div>
          ` : ``}
          <div class="pillRow"><span class="pill">${langBadge}</span></div>

          <div class="pillRow">
            ${scorePill}
            ${ePill}
            ${sweetPill}
            ${caffeinePill}
          </div>

          ${nutritionInsights.length ? `
            <div class="box" style="margin-top:12px;">
              <div class="sectionTitle" style="margin:0 0 8px 0;">${t("insights_title")}</div>
              ${nutritionInsights.map(insight => `
                <div class="eRow">
                  <div class="eLeft">
                    ${insight.label ? `<b>${_escapeHtml(insight.label)}</b>` : ``}
                    <small>${_escapeHtml(insight.message)}</small>
                  </div>
                </div>
              `).join("")}
            </div>
          ` : ``}

          <div class="split" style="margin-top:12px;">
            <div class="box">
              <div class="sectionTitle" style="margin:0 0 8px 0;">${t("e_explained")}</div>
              ${eDetails.length ? eDetails.map(ed => `
                <div class="eRow">
                  <div class="eLeft">
                    <b>${ed.code || "E-"} - ${localizeEAdditiveName(ed)}</b>
                    <small>${localizeEAdditiveMeaning(ed)}</small>
                  </div>
                  <div class="eRole">${localizeEAdditiveRole(ed)}</div>
                </div>
              `).join("") : `<div class="mini">${t("e_none")}</div>`}
              ${flags.length ? `<div class="whyFoot" style="margin-top:12px;"><b>${t("flags")}</b><br/>${flags.map(f => `- ${localizeIntelFlag(f)}`).join("<br/>")}</div>` : ``}
            </div>

            <div class="box">
              <div class="sectionTitle" style="margin:0 0 8px 0;">${t("ingredients_grouped")}</div>
              ${groupOrder.length ? groupOrder.map(cls => `
                <div class="groupTitle">${localizedIngredientGroup(cls)}</div>
                ${groups[cls].filter(ing => {
                  const groupKey = _ingredientLookupKey(localizedIngredientGroup(cls));
                  const itemKey = _ingredientLookupKey(ing?._display?.primary || "");
                  return itemKey !== groupKey;
                }).map(ing => {
                  translationStats.total += 1;
                  if (ing?._display?.translated) translationStats.translated += 1;
                  const note = localizeIngredientNote(ing?.note || "");
                  const risk = (ing?.risk || "low").toLowerCase();
                  const riskLabel = (risk === "high" ? t("risk_high") : (risk === "medium" ? t("risk_medium") : t("risk_low")));
                  const riskCls = (risk === "high" ? "risk high" : (risk === "medium" ? "risk medium" : "risk low"));
                  return `
                    <div class="ingItem">
                      <div class="ingLeft">
                        <b>${ing?._display?.primary || ""}</b>
                        ${note ? `<small>${note}</small>` : ``}
                      </div>
                      <div class="${riskCls}">${riskLabel}</div>
                    </div>
                  `;
                }).join("")}
              `).join("") : `<div class="mini">${t("ingredients_none")}</div>`}
            </div>
          </div>

          <div class="btns">
            <button class="ghost" id="backBtn">${t("back")}</button>
            <button class="primary" id="nextBtn">${t("next")}</button>
          </div>
        </div>
      `;
      ingredientTranslationStats = translationStats;
      if (supportedLangs.includes(lang) && state.translateIngredients && ingredientGlossaryEntries && ingredientGlossaryResolvedUrl) {
        const unmatchedPreview = unmatchedIngredientNames.filter(Boolean).slice(0, 10);
        let unmatchedCount = 0;
        try {
          unmatchedCount = _listCapturedUnknownIngredientTerms().length;
        } catch (_err) {}
        console.debug(
          `[ingredients-glossary] toggle enabled; url=${ingredientGlossaryResolvedUrl}; entries=${Object.keys(ingredientGlossaryEntries).length}; unmatched=${unmatchedPreview.join(" | ")}; unmatched_store=${unmatchedCount}`
        );
      }
      return html
        .replace("__TRANSLATED_COUNT__", String(ingredientTranslationStats.translated))
        .replace("__TOTAL_COUNT__", String(ingredientTranslationStats.total));
    }

    function render(){
      stepTxt.textContent = `${step}/4`;
      barFill.style.width = `${(step/4)*100}%`;
      if (titleMeta) titleMeta.textContent = t("tagline");
      if (stepEl) stepEl.classList.toggle("hidden", step === 1);
      document.documentElement.lang = lang;
      syncLanguageSelector();
      if (step !== 1 && state.scanner?.open){

      if (step > 1 && state.data && !isFinalResolvedProductData(state.data)){

      }

      if (step === 1){
        app.innerHTML = `

                <div class="homeInputRow">
                  <input id="keyInput" inputmode="numeric" enterkeyhint="search" autocapitalize="off" spellcheck="false" placeholder="${t("home_input_placeholder")}" value="${_escapeHtml(state.key || "")}"/>
                  <button class="primary actionButton" id="scanBtn">${state.loading ? t("scanning_btn") : t("home_analyze")}</button>
                </div>
                <div class="helperText">${t("home_helper")}</div>
              </div>

            </div>

              ${renderHomeList("analyses")}
              ${renderHomeList("comparisons")}
              ${renderHomeHowSection()}
            </div>
          </div>

        `;
        const scanBtn = document.getElementById("scanBtn");
        const keyInput = document.getElementById("keyInput");
        const scanCameraBtn = document.getElementById("scanCameraBtn");
        const manualFocusBtn = document.getElementById("manualFocusBtn");
        const scannerCloseBtn = document.getElementById("scannerCloseBtn");
        const scannerManualBtn = document.getElementById("scannerManualBtn");
        if (scanBtn && keyInput){
          scanBtn.onclick = () => doScan(keyInput.value);
          keyInput.onkeydown = (e) => { if (e.key === "Enter") doScan(keyInput.value); };
        }
        if (scanCameraBtn) scanCameraBtn.onclick = () => openScanner();
        if (manualFocusBtn) manualFocusBtn.onclick = () => focusManualEntry();
        if (scannerCloseBtn) scannerCloseBtn.onclick = () => closeScanner();
        if (scannerManualBtn) scannerManualBtn.onclick = () => focusManualEntry();
        if (state.scanner?.open){
          requestAnimationFrame(() => _attachScannerStream(scannerRuntime.sessionId));
        }
        bindEnrichmentActions();
        Array.from(document.querySelectorAll(".historyAnalysisBtn")).forEach(btn => {
          btn.onclick = () => _reopenAnalysisFromHistory(btn.getAttribute("data-key"));
        });
        Array.from(document.querySelectorAll(".historyComparisonBtn")).forEach(btn => {
          btn.onclick = () => _reopenComparisonFromHistory(btn.getAttribute("data-pair-key"));
        });
        return;
      }

      if (step === 2){
        const d = state.data || {};
        const p = d.product || {};
        const compareCandidates = _getComparisonCandidates(state.key);
        const compareTarget = compareCandidates.find(item => String(item?.key || "") === String(state.compareTargetKey || "")) || compareCandidates[0] || null;
        const compareTargetKey = String(compareTarget?.key || "");
        const score = d?.vitascore;
        const baselineScore = d?.vitascore_breakdown?.who_baseline?.score;
        const analysisState = String(d?.analysis_state || d?.meta?.analysis_state || "full_analysis").toLowerCase();
        const analysisConfidence = localizedConfidenceTier(d?.analysis_confidence || d?.meta?.analysis_confidence || "high");
        const assessmentLabel = analysisState === "partial_analysis"
          ? t("partial_assessment")
          : (analysisState === "limited_estimate" ? t("limited_estimate") : t("final_assessment"));
        const assessmentSubline = (analysisState === "partial_analysis" || analysisState === "limited_estimate")
          ? `${analysisState === "limited_estimate" ? t("limited_estimate_note") : t("partial_assessment_note")} | ${t("confidence")}: ${analysisConfidence}`
          : t("vitascore");
        const quickReasons = quickReasonItems(d);
        const quickSignals = quickSignalItems(d);
        const quickVerdict = quickVerdictLabel(score);
        const tier = tierFromScore(score);
        const per100 = d?.vitascore_breakdown?.per_100?.inputs || {};
        const unit = d?.meta?.serving?.unit || (p?.quantity?.toLowerCase?.().includes("ml") ? "ml" : "g");
        const sugar = per100.sugar_g_per_100 ?? d?.nutrition_per_100?.sugar_g;
        const salt = per100.salt_g_per_100 ?? d?.nutrition_per_100?.salt_g;
        const sat = per100.saturated_fat_g_per_100 ?? d?.nutrition_per_100?.sat_fat_g;
        const prot = per100.protein_g_per_100 ?? d?.nutrition_per_100?.protein_g;

        app.innerHTML = `
          <div class="section">
            <div class="prodHead">
              ${p?.image_url ? `<img class="prodImg" src="${p.image_url}" alt="product"/>` : `<div class="prodImg"></div>`}
              <div class="prodMeta">
                <b>${p?.name || t("unknown_product")}</b>
                <span>${p?.brand ? p.brand + " | " : ""}${d?.vitascore_version || ""}</span>
              </div>
            </div>
            <div class="section" style="margin-top:12px;">
              <div class="sectionTitle">${t("quick_verdict_title")}</div>
              <div class="scoreWrap">
                <div>
                  <div class="mini">${assessmentLabel}</div>
                  <div class="scoreLine"><div class="score">${score ?? "-"}</div><div class="scoreMax">/100</div></div>
                  <div class="mini">${assessmentSubline}</div>
                </div>
                <div class="tier" style="background:${tier.color}; border-color:${tier.border};">${tier.label}</div>
              </div>
              <div class="ok" style="margin-top:12px;"><b>${quickVerdict}</b></div>
              <div class="grid2">
                ${(analysisState === "partial_analysis" || analysisState === "limited_estimate") ? `<div class="kv"><small>${t("confidence")}</small><b>${analysisConfidence}</b></div>` : ``}
                <div class="kv"><small>${t("baseline_assessment")}</small><b>${baselineScore ?? "-"}/100</b></div>
                <div class="kv"><small>${t("sugar")}</small><b>${fmtNum(sugar)} g/100${unit === "ml" ? "ml" : "g"}</b></div>
                <div class="kv"><small>${t("salt")}</small><b>${fmtNum(salt)} g/100${unit === "ml" ? "ml" : "g"}</b></div>
                <div class="kv"><small>${t("sat_fat")}</small><b>${fmtNum(sat)} g/100${unit === "ml" ? "ml" : "g"}</b></div>
                <div class="kv"><small>${t("protein")}</small><b>${fmtNum(prot)} g/100${unit === "ml" ? "ml" : "g"}</b></div>
              </div>
              ${quickReasons.length ? `<div class="whyFoot" style="margin-top:12px;"><b>${t("quick_reasons_title")}</b><br/>${quickReasons.map(item => `- ${_escapeHtml(item.message || "")}`).join("<br/>")}</div>` : ``}
              ${quickSignals.length ? `<div class="whyFoot" style="margin-top:12px;"><b>${t("quick_signals_title")}</b><br/>${quickSignals.map(item => `- ${_escapeHtml(item)}`).join("<br/>")}</div>` : ``}
              <div class="whyFoot" style="margin-top:10px;">${t("baseline_helper")} <span class="mini">(${t("baseline_criteria")})</span></div>
              <div class="mini" style="margin-top:8px;">${t("quick_verdict_note")}</div>
            </div>
            ${renderPartialLookupNotice(d)}
            ${renderAnalysisStateNotice(d)}
            ${renderRefreshNotice()}
            ${renderPhotoExtractionNotice(d)}
            ${renderEnrichmentBlock(d)}
            <div class="section" style="margin-top:12px;">
              <div class="sectionTitle">${t("full_details_title")}</div>
              <div class="mini">${t("full_details_note")}</div>
              <div class="btns" style="margin-top:8px;">
                <button class="primary" id="nextBtn">${t("full_details_cta")}</button>
              </div>
            </div>
            <div class="section" style="margin-top:12px;">
              <div class="sectionTitle">${t("compare_title")}</div>
              ${compareCandidates.length ? `
                <div class="mini">${t("compare_with")}</div>
                <div class="btns" style="margin-top:8px;">
                  <select id="compareSelect" style="flex:1;">
                    ${compareCandidates.map(item => `<option value="${_escapeHtml(String(item?.key || ""))}" ${String(item?.key || "") === compareTargetKey ? "selected" : ""}>${_escapeHtml(String(item?.name || t("unknown_product")))}${item?.brand ? ` | ${_escapeHtml(String(item.brand))}` : ""}</option>`).join("")}
                  </select>
                  <button class="ghost" id="compareBtn">${t("compare_action")}</button>
                </div>
                ${compareTarget ? renderComparisonPanel(d, compareTarget.data) : ``}
              ` : `<div class="mini">${t("compare_none")}</div>`}
            </div>
            <div class="btns">
              <button class="ghost" id="backBtn">${t("back")}</button>
            </div>
          </div>
        `;
        ensureScoreExplanationRulesLoaded();
        const compareSelect = document.getElementById("compareSelect");
        const compareBtn = document.getElementById("compareBtn");
        bindEnrichmentActions();
        if (compareSelect){
          compareSelect.onchange = (e) => {
            state.compareTargetKey = String(e.target.value || "");
          };
        }
        if (compareBtn){
          compareBtn.onclick = () => {
            if (compareSelect) state.compareTargetKey = String(compareSelect.value || "");
            const targetEntry = compareCandidates.find(item => String(item?.key || "") === String(state.compareTargetKey || ""));
            if (targetEntry?.data){
              _storeComparisonHistory(d, targetEntry.data, state.key, targetEntry.key);
            }
            render();
          };
        }
        document.getElementById("backBtn").onclick = () => { step = 1; render(); };
        document.getElementById("nextBtn").onclick = () => { step = 3; render(); };
        return;
      }

      if (step === 3){
        app.innerHTML = `
          <div class="section">
            <div class="sectionTitle">${t("full_details_title")}</div>
            <div class="mini">${t("full_details_note")}</div>
          </div>
          ${buildWhyScoreHTML(state.data || {})}
          ${whoServingBlock(state.data || {})}
          ${renderIngredientsIntel(state.data || {})}
        `;
        const eDetails = Array.isArray(state.data?.ingredients_intelligence?.e_number_details) ? state.data.ingredients_intelligence.e_number_details : [];
        if (eDetails.length){
          ensureENumberKnowledgeBaseLoaded();
        }
        ensureNutritionInsightRulesLoaded();
        const translateToggle = document.getElementById("translateIngredientsToggle");
        if (translateToggle){
          translateToggle.onchange = (e) => {
            const nextEnabled = !!e.target.checked;
            if (!nextEnabled){
              state.translateIngredients = false;
              localStorage.setItem("nf_ing_translate", "0");
              render();
              return;
            }
            state.translateIngredients = true;
            localStorage.setItem("nf_ing_translate", "1");
            render();
            ensureIngredientGlossaryLoaded().then(ok => {
              if (!ok){
                state.translateIngredients = false;
                localStorage.setItem("nf_ing_translate", "0");
                render();
                return;
              }
              render();
            });
          };
        }
        if (supportedLangs.includes(lang) && state.translateIngredients){
          ensureIngredientGlossaryLoaded().then(ok => {
            if (!ok){
              state.translateIngredients = false;
              localStorage.setItem("nf_ing_translate", "0");
              render();
            }
          });

        document.getElementById("backBtn").onclick = () => { step = 2; render(); };
        document.getElementById("nextBtn").onclick = () => { step = 4; render(); };

          <div class="section">
            <div class="sectionTitle">${t("safety_title")}</div>
            ${renderSafetyAlertsPanel(d)}
            <div class="section" style="margin-top:12px;">
              <div class="sectionTitle">${t("data_quality")}</div>
              <div class="mini">
                ${t("confidence")}: <b>${dq?.confidence ?? "-"}</b><br/>
                ${t("missing_fields")}: <b>${Array.isArray(dq?.missing_core_fields) ? dq.missing_core_fields.join(", ") : "-"}</b><br/>
                ${t("has_serving")}: <b>${dq?.has_serving ? t("yes") : t("no")}</b><br/>
                ${t("beverage")}: <b>${dq?.beverage_detection?.value === true ? t("yes") : (dq?.beverage_detection?.value === false ? t("no") : "-")}</b><br/>
                ${t("signal")}: <b>${dq?.beverage_detection?.signal || "-"}</b>
              </div>
            </div>
            <div class="btns">
              <button class="ghost" id="backBtn">${t("back")}</button>
              <button class="primary" id="againBtn">${t("scan_another")}</button>
            </div>
          </div>
        `;
        document.getElementById("backBtn").onclick = () => { step = 3; render(); };
        document.getElementById("againBtn").onclick = () => {
          step = 1;
          state.error = "";
          state.errorCode = "";
          state.data = null;
          state.scanStatusMessage = "";
          state.refreshNotice = null;
          state.compareTargetKey = "";
          state.recoveryOpen = false;
          state.recoveryPhotoMessage = "";
          state.photoForm = { ingredient_image_data_url:"", nutrition_image_data_url:"", ingredient_file_name:"", nutrition_file_name:"" };
          render();
        };
      }
    }

    async function doScan(key){
      const nextKey = normalizeLookupKey(key);
      const requestId = beginAnalysisRequest();
      const startedAt = performance.now();
      const cachedResult = _findCachedScanResult(nextKey);
      state.key = nextKey;
      if (!state.key){
        state.error = t("err_enter_key");
        state.errorCode = "INVALID_BARCODE";
        state.scanStatusMessage = "";
        state.data = null;
        state.compareTargetKey = "";
        state.recoveryOpen = false;
        render();
        return;
      }
      if (!isSupportedLookupKey(state.key)){
        state.error = t("err_invalid_barcode");
        state.errorCode = "INVALID_BARCODE";
        state.scanStatusMessage = "";
        state.data = null;
        state.compareTargetKey = "";
        state.recoveryOpen = false;
        render();
        return;
      }
      if (_isUsableCachedScan(cachedResult)){
        state.loading = false;
        state.scanStatusMessage = "";
        state.error = "";
        state.errorCode = "";
        state.data = cachedResult;
        state.recoveryOpen = false;
        state.refreshNotice = null;
        state.recoveryPhotoMessage = "";
        if (!state.compareTargetKey){
          const nextCompare = _getComparisonCandidates(nextKey)[0] || null;
          state.compareTargetKey = String(nextCompare?.key || "");
        }
        step = 2;
        render();
        requestAnimationFrame(() => logScanPerformance(cachedResult, startedAt));
        void (async () => {
          try{
            const { res, data, stale } = await fetchStableScanResult(nextKey, requestId);
            if (stale || !isCurrentAnalysisRequest(requestId) || state.key !== nextKey) return;
            if (!res?.ok || data?.error || isPlaceholderScanResult(data)) return;
            if (!isFinalResolvedProductData(data)) return;
            state.data = data;
            state.error = "";
            state.errorCode = "";
            _storeRecentProduct(data, nextKey);
            _storeAnalysisHistory(data, nextKey);
            render();
            requestAnimationFrame(() => logScanPerformance(data, startedAt));
          }catch(_e){}
        })();
        return;
      }
      state.loading = true;
      state.scanStatusMessage = scanLoadingHint(false);
      state.error = "";
      state.errorCode = "";
      state.data = null;
      state.compareTargetKey = "";
      state.recoveryOpen = false;
      state.refreshNotice = null;
      state.recoveryPhotoMessage = "";
      state.photoForm = { ingredient_image_data_url:"", nutrition_image_data_url:"", ingredient_file_name:"", nutrition_file_name:"" };
      state.photoForm = state.photoForm || { ingredient_image_data_url:"", nutrition_image_data_url:"", ingredient_file_name:"", nutrition_file_name:"" };
      render();
      try{
        const { res, data, stale } = await fetchStableScanResult(state.key, requestId);
        if (stale) return;
        if (!isCurrentAnalysisRequest(requestId) || state.key !== nextKey) return;
        if (isPlaceholderScanResult(data)){
          state.loading = false;
          state.scanStatusMessage = scanLoadingHint(true);
          state.data = null;
          render();
          return;
        }
        if (!res.ok || data?.error){
          state.error = localizeScanError(data, res.status);
          state.errorCode = scanErrorCode(data, res.status);
          state.data = null;
          state.loading = false;
          state.scanStatusMessage = "";
          state.recoveryOpen = isRecoverableScanFailure(state.errorCode);
          render();
          return;
        }
        if (!isFinalResolvedProductData(data)){
          state.data = data;
          state.error = "";
          state.errorCode = "";
          state.loading = false;
          state.scanStatusMessage = "";
          state.recoveryOpen = true;
          step = 1;
          render();
          requestAnimationFrame(() => logScanPerformance(data, startedAt));
          return;
        }
        state.data = data;
        state.errorCode = "";
        state.scanStatusMessage = "";
        state.recoveryOpen = false;
        state.recoveryPhotoMessage = "";
        _storeRecentProduct(data, state.key);
        _storeAnalysisHistory(data, state.key);
        if (!state.compareTargetKey){
          const nextCompare = _getComparisonCandidates(state.key)[0] || null;
          state.compareTargetKey = String(nextCompare?.key || "");
        }
        state.loading = false;
        step = 2;
        render();
        requestAnimationFrame(() => logScanPerformance(data, startedAt));
      }catch(e){
        if (!isCurrentAnalysisRequest(requestId) || state.key !== nextKey) return;
        state.error = t("err_network");
        state.errorCode = "";
        state.loading = false;
        state.scanStatusMessage = "";
        render();
      }
    }

    async function refreshCurrentDataForLanguage(){
      if (!state.key || !state.data) return;
      const requestId = beginAnalysisRequest();
      const currentKey = state.key;
      const preservedStep = step;
      try{
        const res = await fetch(`/scan/${encodeURIComponent(currentKey)}?lang=${lang}`);
        const data = await res.json().catch(()=> ({}));
        if (!isCurrentAnalysisRequest(requestId) || state.key !== currentKey) return;
        if (!res.ok || data?.error) throw new Error(localizeScanError(data, res.status));
        state.data = data;
        if (isFinalResolvedProductData(data)){
          _storeRecentProduct(data, currentKey);
        } else {
          state.recoveryOpen = true;
          step = 1;
        }
      }catch(e){
        if (!isCurrentAnalysisRequest(requestId) || state.key !== currentKey) return;
        console.warn(`[lang-switch] Failed to refresh data for ${lang}: ${e && e.message ? e.message : e}`);
      }finally{
        if (!isCurrentAnalysisRequest(requestId) || state.key !== currentKey) return;
        step = preservedStep;
        render();
      }
    }

    _registerUnknownIngredientDebugHelpers();

    if (langSel){
      syncLanguageSelector();
      langSel.onchange = (e) => {
        const next = String(e.target.value || "en").toLowerCase();
        const resolved = supportedLangs.includes(next) ? next : "en";
        if (resolved === lang){
          syncLanguageSelector();
          return;
        }
        lang = resolved;
        localStorage.setItem("nf_lang", lang);
        render();
        refreshCurrentDataForLanguage();
      };
    }

    render();
  </script>
</body>
</html>
